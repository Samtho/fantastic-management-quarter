// METAS TAB
// ═══════════════════════════════════════════════════════════════════════════════
function MetasTab({ goals, setGoals, logros, setLogros, config }) {
  const t = useTheme();
  const [deleteConfirmId, setDeleteConfirmId]     = useState(null);
  const [showSuggestions, setShowSuggestions]     = useState(false);
  const [showLogros, setShowLogros]               = useState(false);
  const [showLogrosSug, setShowLogrosSug]         = useState(false);
  const [logroDeleteId, setLogroDeleteId]         = useState(null);
  const [logroCopied, setLogroCopied]             = useState(null);
  const [expandedGoalId, setExpandedGoalId]       = useState(null);

  const logrosEnabled = config?.showLogros === true;

  const addGoal  = () => setGoals(p => [...p, { id: uid(), category: 'Producto', text: '', description: '', deadline: '', status: 'pendiente', progress: 0, notes: '' }]);
  const updGoal  = (id, u) => setGoals(p => p.map(g => g.id === id ? { ...g, ...u } : g));
  const delGoal  = (id) => { setGoals(p => p.filter(g => g.id !== id)); setDeleteConfirmId(null); };

  // Add suggested goal (skip if text already exists)
  const addSuggested = (sg) => {
    if (goals.some(g => g.text === sg.text)) return;
    setGoals(p => [...p, { id: uid(), category: sg.category, text: sg.text, description: sg.description || '', deadline: '', status: 'pendiente', progress: 0, notes: '' }]);
  };

  // Logros (XYZ)
  const addLogro      = () => setLogros(p => [...p, { id: uid(), title: '', x: '', y: '', z: '', date: new Date().toISOString().slice(0, 10), tags: '' }]);
  const addSugLogro   = (sl) => {
    if (logros.some(l => l.title === sl.title)) return;
    setLogros(p => [...p, { id: uid(), title: sl.title, x: sl.x, y: sl.y, z: sl.z, date: new Date().toISOString().slice(0, 10), tags: sl.tags || '' }]);
  };
  const updLogro = (id, u) => setLogros(p => p.map(l => l.id === id ? { ...l, ...u } : l));
  const delLogro = (id) => { setLogros(p => p.filter(l => l.id !== id)); setLogroDeleteId(null); };
  const xyzText  = (l) => {
    const parts = [];
    if (l.x) parts.push(l.x);
    if (l.y) parts.push(`medido por ${l.y}`);
    if (l.z) parts.push(`haciendo ${l.z}`);
    return parts.length ? `• Logré ${parts.join(', ')}.` : '';
  };
  const copyLogro = (l) => {
    const txt = xyzText(l);
    if (!txt) return;
    navigator.clipboard.writeText(txt).then(() => {
      setLogroCopied(l.id);
      setTimeout(() => setLogroCopied(null), 2000);
    });
  };

  const byCategory    = GOAL_CATEGORIES.map(cat => ({ cat, items: goals.filter(g => g.category === cat) })).filter(x => x.items.length > 0);
  const completedCount = goals.filter(g => g.status === 'completado').length;
  const pct           = goals.length > 0 ? Math.round((completedCount / goals.length) * 100) : 0;

  // Group suggestions by category
  const sugByCategory = GOAL_CATEGORIES.map(cat => ({
    cat,
    items: SUGGESTED_GOALS.filter(sg => sg.category === cat && !goals.some(g => g.text === sg.text)),
  })).filter(x => x.items.length > 0);

  return (
    <div style={{ maxWidth: 920 }}>
      {/* Header */}
      <div style={{ marginBottom: 16, display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', flexWrap: 'wrap', gap: 10 }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: t.heading, marginBottom: 3 }}>🏆 Mis metas</div>
          <div style={{ fontSize: 12, color: t.textMuted }}>Objetivos personales y de equipo para Q2 2026.</div>
        </div>
        <button onClick={() => setShowSuggestions(p => !p)}
          style={{ fontSize: 11, fontWeight: 600, background: showSuggestions ? t.accent + '22' : t.bgAlt, border: `1px solid ${showSuggestions ? t.accent : t.border}`, borderRadius: 6, color: showSuggestions ? t.accent : t.textMuted, padding: '6px 13px', cursor: 'pointer' }}>
          {showSuggestions ? '✕ Cerrar sugerencias' : '⚡ Ver sugerencias Q2'}
        </button>
      </div>

      {/* ── Suggestions panel ─────────────────────────────────────────── */}
      {showSuggestions && (
        <div style={{ background: t.bgDeep, border: `1px solid ${t.accent}44`, borderRadius: 10, padding: '14px 16px', marginBottom: 20 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.accent, textTransform: 'uppercase', letterSpacing: 0.6, marginBottom: 12 }}>
            ⚡ Sugerencias para tu rol — elige las que te sirvan
          </div>
          {sugByCategory.length === 0 && (
            <div style={{ fontSize: 12, color: t.textDim, fontStyle: 'italic' }}>Ya has añadido todas las sugerencias disponibles.</div>
          )}
          {sugByCategory.map(({ cat, items }) => (
            <div key={cat} style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.6, marginBottom: 7 }}>{cat}</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                {items.map((sg, idx) => (
                  <div key={idx} style={{ display: 'flex', gap: 8, alignItems: 'flex-start', background: t.bgAlt, borderRadius: 6, padding: '8px 10px', border: `1px solid ${t.border}` }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: t.text, marginBottom: 2 }}>{sg.text}</div>
                      {sg.description && <div style={{ fontSize: 10, color: t.textMuted, lineHeight: 1.5 }}>{sg.description}</div>}
                    </div>
                    <button onClick={() => addSuggested(sg)}
                      style={{ flexShrink: 0, fontSize: 10, fontWeight: 700, background: t.accent, border: 'none', borderRadius: 4, color: '#fff', padding: '4px 10px', cursor: 'pointer' }}>
                      + Añadir
                    </button>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Progress bar */}
      {goals.length > 0 && (
        <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: '12px 16px', marginBottom: 18, display: 'flex', gap: 14, alignItems: 'center' }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
              <span style={{ fontSize: 11, color: t.textMuted }}>Progreso global</span>
              <span style={{ fontSize: 11, fontWeight: 700, color: t.text }}>{completedCount}/{goals.length} completadas</span>
            </div>
            <div style={{ height: 8, background: t.bgDeep, borderRadius: 4, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${pct}%`, background: pct >= 80 ? '#22c55e' : pct >= 40 ? '#3b82f6' : '#f59e0b', borderRadius: 4, transition: 'width 0.3s' }} />
            </div>
          </div>
          <div style={{ fontSize: 22, fontWeight: 800, color: pct >= 80 ? '#22c55e' : pct >= 40 ? '#3b82f6' : '#f59e0b', minWidth: 46, textAlign: 'right' }}>{pct}%</div>
          <button onClick={addGoal} style={{ background: t.accent, border: 'none', borderRadius: 6, color: '#fff', fontSize: 11, fontWeight: 700, padding: '7px 14px', cursor: 'pointer' }}>+ Meta</button>
        </div>
      )}

      {goals.length === 0 && (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, padding: '48px 0' }}>
          <div style={{ fontSize: 36 }}>🏆</div>
          <div style={{ fontSize: 15, fontWeight: 700, color: t.heading }}>Sin metas aún</div>
          <div style={{ fontSize: 12, color: t.textMuted, maxWidth: 400, textAlign: 'center', lineHeight: 1.6 }}>Define tus objetivos para Q2. Pulsa "Ver sugerencias Q2" para cargar ejemplos reales basados en tu rol.</div>
          <button onClick={addGoal} style={{ background: t.accent, border: 'none', borderRadius: 6, color: '#fff', fontSize: 12, fontWeight: 600, padding: '9px 20px', cursor: 'pointer' }}>+ Añadir primera meta</button>
        </div>
      )}

      {/* ── Goals by category ──────────────────────────────────────────── */}
      {byCategory.map(({ cat, items }) => (
        <div key={cat} style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 8, borderBottom: `1px solid ${t.border}`, paddingBottom: 5 }}>{cat}</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {items.map(g => {
              const st     = GOAL_STATUSES.find(s => s.id === g.status) || GOAL_STATUSES[0];
              const isOpen = expandedGoalId === g.id;
              return (
                <div key={g.id} style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: '11px 14px' }}>
                  {/* Title row */}
                  <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start', marginBottom: 6 }}>
                    <div style={{ width: 10, height: 10, borderRadius: '50%', background: st.color, flexShrink: 0, marginTop: 4 }} />
                    <input value={g.text} onChange={e => updGoal(g.id, { text: e.target.value })}
                      placeholder="Describe tu meta..."
                      style={{ flex: 1, fontSize: 13, fontWeight: 600, color: t.text, background: 'transparent', border: 'none', outline: 'none', padding: 0, textDecoration: g.status === 'completado' ? 'line-through' : 'none', fontFamily: 'inherit' }} />
                    <button onClick={() => setExpandedGoalId(isOpen ? null : g.id)}
                      title={isOpen ? 'Colapsar' : 'Ver / editar descripción'}
                      style={{ fontSize: 11, background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', padding: '0 4px', flexShrink: 0 }}>
                      {isOpen ? '▲' : '▼'}
                    </button>
                    {deleteConfirmId === g.id ? (
                      <div style={{ display: 'flex', gap: 4, alignItems: 'center', flexShrink: 0 }}>
                        <span style={{ fontSize: 10, color: '#ef4444', fontWeight: 600 }}>¿Eliminar?</span>
                        <button onClick={() => delGoal(g.id)} style={{ background: '#ef4444', border: 'none', borderRadius: 3, color: '#fff', fontSize: 10, fontWeight: 700, padding: '2px 6px', cursor: 'pointer' }}>Sí</button>
                        <button onClick={() => setDeleteConfirmId(null)} style={{ background: 'none', border: `1px solid ${t.border}`, borderRadius: 3, color: t.textMuted, fontSize: 10, padding: '2px 6px', cursor: 'pointer' }}>No</button>
                      </div>
                    ) : (
                      <button onClick={() => setDeleteConfirmId(g.id)} style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 14, flexShrink: 0 }}>×</button>
                    )}
                  </div>

                  {/* Description (always show if present, expand to edit) */}
                  {(g.description || isOpen) && (
                    <div style={{ paddingLeft: 18, marginBottom: 7 }}>
                      <textarea value={g.description || ''} onChange={e => updGoal(g.id, { description: e.target.value })}
                        placeholder="Descripción opcional: contexto, criterios de éxito, dependencias..."
                        rows={isOpen ? 2 : 1}
                        style={{ width: '100%', fontSize: 11, color: t.textMuted, background: isOpen ? t.bgDeep : 'transparent', border: isOpen ? `1px solid ${t.border}` : 'none', outline: 'none', borderRadius: 4, padding: isOpen ? '5px 7px' : '0', fontFamily: 'inherit', resize: 'vertical', lineHeight: 1.5 }} />
                    </div>
                  )}

                  {/* Controls row */}
                  <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap', paddingLeft: 18 }}>
                    <select value={g.category} onChange={e => updGoal(g.id, { category: e.target.value })}
                      style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '3px 6px' }}>
                      {GOAL_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                    <select value={g.status} onChange={e => updGoal(g.id, { status: e.target.value })}
                      style={{ fontSize: 10, background: st.color + '22', border: `1px solid ${st.color}66`, borderRadius: 4, color: st.color, padding: '3px 6px', fontWeight: 700 }}>
                      {GOAL_STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                    </select>
                    <input type="date" value={g.deadline || ''} onChange={e => updGoal(g.id, { deadline: e.target.value })}
                      style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: g.deadline ? t.text : t.textDim, padding: '3px 6px' }} />
                    <div style={{ display: 'flex', gap: 5, alignItems: 'center', flex: 1, minWidth: 160 }}>
                      <div style={{ flex: 1, height: 6, background: t.bgDeep, borderRadius: 3, overflow: 'hidden', minWidth: 60 }}>
                        <div style={{ height: '100%', width: `${g.progress || 0}%`, background: st.color, borderRadius: 3, transition: 'width 0.2s' }} />
                      </div>
                      <input type="number" min="0" max="100" value={g.progress || 0}
                        onChange={e => updGoal(g.id, { progress: Math.min(100, Math.max(0, Number(e.target.value) || 0)) })}
                        style={{ width: 44, fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '2px 4px', textAlign: 'right' }} />
                      <span style={{ fontSize: 10, color: t.textDim }}>%</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {goals.length > 0 && (
        <div style={{ marginTop: 10, paddingTop: 12, borderTop: `1px solid ${t.border}` }}>
          <button onClick={addGoal} style={{ fontSize: 11, background: 'none', border: `1px solid ${t.border}`, borderRadius: 5, color: t.textMuted, padding: '5px 14px', cursor: 'pointer' }}>+ Añadir meta</button>
        </div>
      )}

      {/* ══════════════════════════════════════════════════════════════════
          🏅 LOGROS — PERSONAL (fórmula XYZ de Google)
          Solo visible si config.showLogros === true
      ══════════════════════════════════════════════════════════════════ */}
      {logrosEnabled && (
        <div style={{ marginTop: 32, borderTop: `2px solid ${t.border}`, paddingTop: 20 }}>
          {/* Header */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: showLogros ? 14 : 0 }}>
            <button onClick={() => setShowLogros(p => !p)}
              style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>
              <span style={{ fontSize: 16, fontWeight: 800, color: t.heading }}>🏅 Mis Logros</span>
              <span style={{ fontSize: 10, color: '#8b5cf6', background: '#7c3aed18', border: '1px solid #8b5cf644', borderRadius: 10, padding: '2px 8px' }}>para LinkedIn</span>
              <span style={{ fontSize: 12, color: t.textDim }}>{showLogros ? '▲' : '▼'}</span>
            </button>
            {showLogros && (
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={() => setShowLogrosSug(p => !p)}
                  style={{ fontSize: 11, fontWeight: 600, background: showLogrosSug ? '#8b5cf622' : t.bgAlt, border: `1px solid ${showLogrosSug ? '#8b5cf6' : t.border}`, borderRadius: 6, color: showLogrosSug ? '#8b5cf6' : t.textMuted, padding: '5px 12px', cursor: 'pointer' }}>
                  {showLogrosSug ? '✕ Cerrar ejemplos' : '⚡ Ver ejemplos'}
                </button>
                <button onClick={addLogro}
                  style={{ fontSize: 11, fontWeight: 700, background: '#8b5cf6', border: 'none', borderRadius: 6, color: '#fff', padding: '5px 12px', cursor: 'pointer' }}>
                  + Nuevo logro
                </button>
              </div>
            )}
          </div>

          {showLogros && (
            <>
              {/* XYZ explanation */}
              <div style={{ background: '#7c3aed11', border: '1px solid #8b5cf644', borderRadius: 8, padding: '9px 13px', marginBottom: 14, fontSize: 11, color: t.textMuted, lineHeight: 1.6 }}>
                <span style={{ fontWeight: 700, color: '#8b5cf6' }}>Fórmula XYZ de Google:</span>{' '}
                "Logré <span style={{ fontWeight: 600 }}>X</span> (resultado) medido por <span style={{ fontWeight: 600 }}>Y</span> (métrica) haciendo <span style={{ fontWeight: 600 }}>Z</span> (acción)."
                {' '}Genera el bullet point listo para LinkedIn automáticamente.
              </div>

              {/* ── Suggestions panel ── */}
              {showLogrosSug && (
                <div style={{ background: t.bgDeep, border: '1px solid #8b5cf644', borderRadius: 10, padding: '13px 15px', marginBottom: 16 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: '#8b5cf6', textTransform: 'uppercase', letterSpacing: 0.6, marginBottom: 11 }}>
                    ⚡ Ejemplos basados en tu rol y proyectos Q2
                  </div>
                  {SUGGESTED_LOGROS.filter(sl => !logros.some(l => l.title === sl.title)).length === 0 && (
                    <div style={{ fontSize: 12, color: t.textDim, fontStyle: 'italic' }}>Ya has añadido todos los ejemplos disponibles.</div>
                  )}
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {SUGGESTED_LOGROS.filter(sl => !logros.some(l => l.title === sl.title)).map((sl, idx) => (
                      <div key={idx} style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 7, padding: '9px 11px', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 12, fontWeight: 700, color: '#8b5cf6', marginBottom: 5 }}>{sl.title}</div>
                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 6 }}>
                            <div><span style={{ fontSize: 9, fontWeight: 700, color: '#8b5cf6', textTransform: 'uppercase' }}>X</span> <span style={{ fontSize: 10, color: t.textMuted }}>{sl.x}</span></div>
                            <div><span style={{ fontSize: 9, fontWeight: 700, color: '#8b5cf6', textTransform: 'uppercase' }}>Y</span> <span style={{ fontSize: 10, color: t.textMuted }}>{sl.y}</span></div>
                            <div><span style={{ fontSize: 9, fontWeight: 700, color: '#8b5cf6', textTransform: 'uppercase' }}>Z</span> <span style={{ fontSize: 10, color: t.textMuted }}>{sl.z}</span></div>
                          </div>
                        </div>
                        <button onClick={() => addSugLogro(sl)}
                          style={{ flexShrink: 0, fontSize: 10, fontWeight: 700, background: '#8b5cf6', border: 'none', borderRadius: 4, color: '#fff', padding: '4px 10px', cursor: 'pointer' }}>
                          + Añadir
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {logros.length === 0 && !showLogrosSug && (
                <div style={{ textAlign: 'center', padding: '24px 0', color: t.textDim, fontSize: 12 }}>
                  Sin logros registrados aún. Pulsa "⚡ Ver ejemplos" para cargar sugerencias basadas en tus proyectos.
                </div>
              )}

              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {logros.map(l => {
                  const preview = xyzText(l);
                  return (
                    <div key={l.id} style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: '13px 14px' }}>
                      {/* Title + date + delete */}
                      <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 10 }}>
                        <input value={l.title || ''} onChange={e => updLogro(l.id, { title: e.target.value })}
                          placeholder="Título del logro (ej. Renovación Automática CC lanzada)"
                          style={{ flex: 1, fontSize: 13, fontWeight: 700, color: '#8b5cf6', background: 'transparent', border: 'none', outline: 'none', padding: 0, fontFamily: 'inherit' }} />
                        <input type="date" value={l.date || ''} onChange={e => updLogro(l.id, { date: e.target.value })}
                          style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textDim, padding: '3px 6px', flexShrink: 0 }} />
                        {logroDeleteId === l.id ? (
                          <div style={{ display: 'flex', gap: 4, alignItems: 'center', flexShrink: 0 }}>
                            <button onClick={() => delLogro(l.id)} style={{ background: '#ef4444', border: 'none', borderRadius: 3, color: '#fff', fontSize: 10, fontWeight: 700, padding: '2px 6px', cursor: 'pointer' }}>Sí</button>
                            <button onClick={() => setLogroDeleteId(null)} style={{ background: 'none', border: `1px solid ${t.border}`, borderRadius: 3, color: t.textMuted, fontSize: 10, padding: '2px 6px', cursor: 'pointer' }}>No</button>
                          </div>
                        ) : (
                          <button onClick={() => setLogroDeleteId(l.id)} style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 14 }}>×</button>
                        )}
                      </div>

                      {/* XYZ fields */}
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 10 }}>
                        <div>
                          <label style={{ display: 'block', fontSize: 9, fontWeight: 700, color: '#8b5cf6', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 3 }}>X — Logré</label>
                          <input value={l.x || ''} onChange={e => updLogro(l.id, { x: e.target.value })}
                            placeholder="ej. lanzar Renovación Automática CC"
                            style={{ width: '100%', fontSize: 11, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '5px 7px' }} />
                        </div>
                        <div>
                          <label style={{ display: 'block', fontSize: 9, fontWeight: 700, color: '#8b5cf6', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 3 }}>Y — Medido por</label>
                          <input value={l.y || ''} onChange={e => updLogro(l.id, { y: e.target.value })}
                            placeholder="ej. reducir renovaciones manuales en 80%"
                            style={{ width: '100%', fontSize: 11, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '5px 7px' }} />
                        </div>
                        <div>
                          <label style={{ display: 'block', fontSize: 9, fontWeight: 700, color: '#8b5cf6', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 3 }}>Z — Haciendo</label>
                          <input value={l.z || ''} onChange={e => updLogro(l.id, { z: e.target.value })}
                            placeholder="ej. diseñar el PRD, coordinar 3 sprints"
                            style={{ width: '100%', fontSize: 11, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '5px 7px' }} />
                        </div>
                      </div>

                      {/* Tags */}
                      <div style={{ marginBottom: preview ? 10 : 0 }}>
                        <input value={l.tags || ''} onChange={e => updLogro(l.id, { tags: e.target.value })}
                          placeholder="Etiquetas: Product Launch, Payments, Q2 2026..."
                          style={{ width: '100%', fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '4px 7px' }} />
                      </div>

                      {/* LinkedIn preview + copy */}
                      {preview && (
                        <div style={{ background: '#7c3aed11', border: '1px solid #8b5cf644', borderRadius: 6, padding: '8px 10px', display: 'flex', alignItems: 'center', gap: 8 }}>
                          <div style={{ flex: 1, fontSize: 11, color: t.text, lineHeight: 1.5, fontStyle: 'italic' }}>{preview}</div>
                          <button onClick={() => copyLogro(l)}
                            style={{ flexShrink: 0, fontSize: 10, fontWeight: 700, background: logroCopied === l.id ? '#22c55e' : '#8b5cf6', border: 'none', borderRadius: 4, color: '#fff', padding: '4px 10px', cursor: 'pointer', transition: 'background 0.2s' }}>
                            {logroCopied === l.id ? '✓ Copiado' : '📋 Copiar'}
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {logros.length > 0 && (
                <div style={{ marginTop: 10 }}>
                  <button onClick={addLogro}
                    style={{ fontSize: 11, background: 'none', border: '1px solid #8b5cf644', borderRadius: 5, color: '#8b5cf6', padding: '5px 14px', cursor: 'pointer' }}>
                    + Añadir logro
                  </button>
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════════════════════
// ONBOARDING WIZARD — shown on first launch (no saved state in localStorage)
// ═══════════════════════════════════════════════════════════════════════════════
const TEAM_COLORS = ['#3b82f6','#8b5cf6','#06b6d4','#f59e0b','#f43f5e','#22c55e','#ec4899','#f97316'];
const QUARTER_PRESETS = {
  Q1: { months: [0,2],  label: 'Q1', startDay: 2 },
  Q2: { months: [3,5],  label: 'Q2', startDay: 1 },
  Q3: { months: [6,8],  label: 'Q3', startDay: 1 },
  Q4: { months: [9,11], label: 'Q4', startDay: 1 },
};

function OnboardingWizard({ onComplete }) {
  const [step, setStep]       = useState(1);
  const [company, setCompany] = useState('');
  const [channel, setChannel] = useState('');
  const [stakeholder, setStakeholder] = useState('');
  const [quarter, setQuarter] = useState('Q2');
  const [year, setYear]       = useState(new Date().getFullYear().toString());
  const [members, setMembers] = useState([
    { name: '', color: TEAM_COLORS[0], type: 'internal', note: '' },
    { name: '', color: TEAM_COLORS[1], type: 'internal', note: '' },
  ]);

  const addMember = () => {
    if (members.length >= 8) return;
    setMembers(p => [...p, { name: '', color: TEAM_COLORS[p.length % TEAM_COLORS.length], type: 'internal', note: '' }]);
  };
  const updateMember = (i, field, val) => setMembers(p => p.map((m, idx) => idx === i ? { ...m, [field]: val } : m));
  const removeMember = (i) => setMembers(p => p.filter((_, idx) => idx !== i));

  const computeQuarterStart = () => {
    const y = parseInt(year) || new Date().getFullYear();
    const preset = QUARTER_PRESETS[quarter];
    const d = new Date(y, preset.months[0], preset.startDay);
    return d.toISOString().slice(0, 10);
  };

  const handleFinish = () => {
    const quarterStart = computeQuarterStart();
    const newTeam = members
      .filter(m => m.name.trim())
      .map((m, i) => ({
        id: m.name.toLowerCase().replace(/\s+/g, '-') + '-' + i,
        name: m.name.trim(),
        color: m.color,
        since: '',
        capMult: 1.0,
        note: m.note.trim(),
        type: m.type,
        monthlyCost: 0, hourlyRate: 0, customSizes: null, absences: [],
      }));
    const newConfig = {
      ...DEFAULT_CONFIG,
      companyName: company.trim() || 'My Company',
      channelName: channel.trim() || 'My Channel',
      stakeholderName: stakeholder.trim() || 'Stakeholder',
      carloViewLabel: `Vista de ${stakeholder.trim() || 'Stakeholder'}`,
      quarterLabel: quarter,
      quarterYear: year,
      quarterStart,
      columnNames: { confirmed: quarter, deciding: quarter, deferred: 'Diferidas' },
    };
    onComplete({ team: newTeam, config: newConfig });
  };

  const C = {
    bg: '#0f172a', bgAlt: '#1e293b', bgCard: '#162033', border: '#334155',
    text: '#e2e8f0', muted: '#94a3b8', accent: '#3b82f6', heading: '#f8fafc',
  };
  const btnPrimary = { background: C.accent, border: 'none', borderRadius: 8, color: '#fff', fontWeight: 700, fontSize: 13, padding: '10px 24px', cursor: 'pointer' };
  const btnSecondary = { background: 'none', border: `1px solid ${C.border}`, borderRadius: 8, color: C.muted, fontWeight: 600, fontSize: 13, padding: '10px 24px', cursor: 'pointer' };
  const inputStyle = { width: '100%', background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 7, color: C.text, fontSize: 13, padding: '9px 13px', outline: 'none', boxSizing: 'border-box' };
  const labelStyle = { fontSize: 11, fontWeight: 600, color: C.muted, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 5, display: 'block' };

  const TOTAL_STEPS = 3;

  return (
    <div style={{ position: 'fixed', inset: 0, background: C.bg, zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'Noto Sans', sans-serif" }}>
      <div style={{ width: '100%', maxWidth: 520, background: C.bgAlt, borderRadius: 16, padding: '40px 44px', border: `1px solid ${C.border}` }}>

        {/* Header */}
        <div style={{ marginBottom: 32 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: C.accent, textTransform: 'uppercase', letterSpacing: 4, marginBottom: 10 }}>
            PI PLANNING LITE · Paso {step} de {TOTAL_STEPS}
          </div>
          <div style={{ width: '100%', height: 3, background: C.bgCard, borderRadius: 2, marginBottom: 20 }}>
            <div style={{ width: `${(step / TOTAL_STEPS) * 100}%`, height: '100%', background: C.accent, borderRadius: 2, transition: 'width 0.3s' }} />
          </div>
          {step === 1 && <div style={{ fontSize: 22, fontWeight: 800, color: C.heading }}>Configura tu proyecto</div>}
          {step === 2 && <div style={{ fontSize: 22, fontWeight: 800, color: C.heading }}>Tu equipo</div>}
          {step === 3 && <div style={{ fontSize: 22, fontWeight: 800, color: C.heading }}>El quarter</div>}
          <div style={{ fontSize: 13, color: C.muted, marginTop: 6 }}>
            {step === 1 && 'Nombre de tu empresa, producto y el stakeholder principal al que reportas.'}
            {step === 2 && 'Añade los miembros del equipo. Podrás modificarlos después en el tab Capacidad.'}
            {step === 3 && 'Define el quarter y la fecha de inicio para calcular los sprints automáticamente.'}
          </div>
        </div>

        {/* Step 1 — Project basics */}
        {step === 1 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
            <div>
              <label style={labelStyle}>Empresa / Organización</label>
              <input style={inputStyle} value={company} onChange={e => setCompany(e.target.value)} placeholder="Ej: Acme Corp, Startup Labs..." />
            </div>
            <div>
              <label style={labelStyle}>Producto / Canal</label>
              <input style={inputStyle} value={channel} onChange={e => setChannel(e.target.value)} placeholder="Ej: Mobile App, E-commerce, Plataforma SaaS..." />
            </div>
            <div>
              <label style={labelStyle}>Stakeholder principal <span style={{ color: C.muted, fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}>— la persona a quien presentas</span></label>
              <input style={inputStyle} value={stakeholder} onChange={e => setStakeholder(e.target.value)} placeholder="Ej: Ana (CPO), Marco (CEO), Director de Producto..." />
            </div>
          </div>
        )}

        {/* Step 2 — Team */}
        {step === 2 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {members.map((m, i) => (
              <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                <input
                  type="color"
                  value={m.color}
                  onChange={e => updateMember(i, 'color', e.target.value)}
                  style={{ width: 32, height: 32, border: 'none', borderRadius: 6, cursor: 'pointer', background: 'none', padding: 0 }}
                />
                <input
                  style={{ ...inputStyle, flex: 2 }}
                  value={m.name}
                  onChange={e => updateMember(i, 'name', e.target.value)}
                  placeholder={`Miembro ${i + 1} — nombre`}
                />
                <select
                  value={m.type}
                  onChange={e => updateMember(i, 'type', e.target.value)}
                  style={{ ...inputStyle, flex: 1, width: 'auto' }}
                >
                  <option value="internal">Interno</option>
                  <option value="external">Externo</option>
                </select>
                {members.length > 1 && (
                  <button onClick={() => removeMember(i)} style={{ background: 'none', border: 'none', color: '#ef4444', fontSize: 18, cursor: 'pointer', lineHeight: 1 }}>×</button>
                )}
              </div>
            ))}
            {members.length < 8 && (
              <button onClick={addMember} style={{ ...btnSecondary, marginTop: 4, textAlign: 'left', width: 'fit-content', fontSize: 12 }}>
                + Añadir miembro
              </button>
            )}
            <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>
              Puedes saltarte este paso y añadir el equipo desde el tab Capacidad más tarde.
            </div>
          </div>
        )}

        {/* Step 3 — Quarter */}
        {step === 3 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
            <div style={{ display: 'flex', gap: 12 }}>
              <div style={{ flex: 1 }}>
                <label style={labelStyle}>Quarter</label>
                <select style={inputStyle} value={quarter} onChange={e => setQuarter(e.target.value)}>
                  <option value="Q1">Q1</option>
                  <option value="Q2">Q2</option>
                  <option value="Q3">Q3</option>
                  <option value="Q4">Q4</option>
                </select>
              </div>
              <div style={{ flex: 1 }}>
                <label style={labelStyle}>Año</label>
                <input style={inputStyle} value={year} onChange={e => setYear(e.target.value)} placeholder="2026" />
              </div>
            </div>
            <div style={{ background: C.bgCard, borderRadius: 8, padding: '14px 16px', border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 12, color: C.muted, marginBottom: 6 }}>Inicio calculado: <span style={{ color: C.text, fontWeight: 600 }}>{computeQuarterStart()}</span></div>
              <div style={{ fontSize: 11, color: C.muted }}>
                El tool generará 7 sprints de 2 semanas a partir de esa fecha. Podrás ajustar las fechas exactas desde el panel de Config.
              </div>
            </div>
            <div style={{ background: '#0c2340', borderRadius: 8, padding: '14px 16px', border: '1px solid #1e3a6e' }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: '#93c5fd', marginBottom: 4 }}>¡Todo listo!</div>
              <div style={{ fontSize: 12, color: '#64748b', lineHeight: 1.6 }}>
                Al hacer clic en <strong style={{ color: '#e2e8f0' }}>Empezar</strong> se configurará tu herramienta con:
                <div style={{ marginTop: 6, display: 'flex', flexDirection: 'column', gap: 2 }}>
                  <span>🏢 <strong style={{ color: '#e2e8f0' }}>{company || 'My Company'}</strong> · {channel || 'My Channel'}</span>
                  <span>👤 Stakeholder: <strong style={{ color: '#e2e8f0' }}>{stakeholder || 'Stakeholder'}</strong></span>
                  <span>📅 <strong style={{ color: '#e2e8f0' }}>{quarter} {year}</strong> — {members.filter(m=>m.name.trim()).length} miembro(s)</span>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Navigation */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 32 }}>
          <div>
            {step > 1 && <button style={btnSecondary} onClick={() => setStep(p => p - 1)}>← Atrás</button>}
          </div>
          <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
            {step === 2 && <button style={{ ...btnSecondary, fontSize: 12 }} onClick={() => setStep(3)}>Saltar →</button>}
            {step < TOTAL_STEPS && (
              <button style={btnPrimary} onClick={() => setStep(p => p + 1)} disabled={step === 1 && !company.trim() && !channel.trim()}>
                Siguiente →
              </button>
            )}
            {step === TOTAL_STEPS && (
              <button style={{ ...btnPrimary, background: '#22c55e' }} onClick={handleFinish}>
                ✓ Empezar
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  // ── Load from localStorage on mount ──────────────────────────────────────
  // Try v4 first; if empty, migrate from v3 (fixing customSizes format)
  const parseLS = (key) => { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; } };
  const migrateTeamCustomSizes = (rawTeam) => (rawTeam || []).map(m => {
    const cs = m.customSizes;
    if (!cs) return m;
    // Old flat format { S, M, L, XL } → new nested format { sizes, sprints }
    if (cs.S !== undefined && !cs.sizes) return { ...m, customSizes: { sizes: cs, sprints: [] } };
    return m;
  });
  const savedV4 = parseLS(LS_KEY);
  const savedV3 = null; // no legacy migration in template
  // Use v4 only if it was explicitly saved by this app (has _migrated flag).
  // Otherwise fall back to v3 — v4 may have been written with default data
  // before the migration code was in place.
  const saved = (() => {
    if (savedV4 && savedV4._migrated) return savedV4;
    if (savedV3) return { ...savedV3, team: migrateTeamCustomSizes(savedV3.team) };
    return savedV4 || {};
  })();

  // Migrate epics: ensure all epics have required fields
  const migrateEpics = (rawEpics) => rawEpics.map(e => ({ ...e }));

  const [tab, setTab] = useState('epicas');
  const [showConfig, setShowConfig] = useState(false);
  const [jumpToEpicId, setJumpToEpicId] = useState(null);
  const [demoMode, setDemoMode] = useState('off'); // 'off' | 'replace' | 'blur'
  const [epics, setEpics] = useState(migrateEpics(saved.epics || INITIAL_EPICS));
  const [team, setTeam] = useState(saved.team || INITIAL_TEAM);
  const [stakeholders, setStakeholders] = useState(saved.stakeholders || INITIAL_STAKEHOLDERS);
  const [sprintVelocity, setSprintVelocity] = useState(saved.sprintVelocity || {});
  const [closedSprints, setClosedSprints] = useState(saved.closedSprints || {});
  const [agenda, setAgenda] = useState(saved.agenda || INITIAL_AGENDA);
  const [okrs, setOkrs] = useState(saved.okrs || INITIAL_OKRS);
  const [weeklySync, setWeeklySync] = useState(saved.weeklySync || INITIAL_WEEKLY_SYNCS);
  const [revenue, setRevenue] = useState(saved.revenue || INITIAL_REVENUE);
  const [goals, setGoals]   = useState(saved.goals  || INITIAL_GOALS);
  const [logros, setLogros] = useState(saved.logros || INITIAL_LOGROS);
  const [theme, setTheme] = useState(saved.theme || 'light');
  // Merge saved config with DEFAULT_CONFIG so new keys always get their defaults
  const [config, setConfig] = useState(() => {
    const c = { ...DEFAULT_CONFIG, ...(saved.config || {}) };
    if (c.quarterStart) applyQuarterStart(c.quarterStart);
    return c;
  });
  // Show onboarding if no saved state exists (first launch)
  const isFirstLaunch = !saved || !saved._migrated;
  const [showOnboarding, setShowOnboarding] = useState(isFirstLaunch);

  const handleOnboardingComplete = ({ team: newTeam, config: newConfig }) => {
    setTeam(newTeam);
    setConfig(newConfig);
    if (newConfig.quarterStart) applyQuarterStart(newConfig.quarterStart);
    setShowOnboarding(false);
  };

  const [sidebar, setSidebar] = useState(false);
  const [showCosts, setShowCosts] = useState(false);
  const [saveFlash, setSaveFlash] = useState(false);
  const titleTimer = useRef(null);

  // ── Always sync SPRINT_DATES before render ────────────────────────────────
  // applyQuarterStart mutates a global array (not React state), so React can't
  // detect the change. Calling it here on every render is the safest approach:
  // it guarantees the Timeline and Capacity components always see correct dates.
  if (config.quarterStart) applyQuarterStart(config.quarterStart);

  // ── Re-apply quarter start when config changes (belt-and-suspenders) ─────
  useEffect(() => {
    if (config.quarterStart) applyQuarterStart(config.quarterStart);
  }, [config.quarterStart]);

  // ── Persist to localStorage on every change ───────────────────────────────
  useEffect(() => {
    localStorage.setItem(LS_KEY, JSON.stringify({ epics, team, stakeholders, agenda, okrs, weeklySync, revenue, goals, logros, config, theme, sprintVelocity, closedSprints, _migrated: true }));
  }, [epics, team, stakeholders, agenda, okrs, weeklySync, revenue, goals, logros, config, theme, sprintVelocity, closedSprints]);

  const handleTitleDblClick = () => {
    setShowCosts(p => !p);
    if (!showCosts) setTab('costs');
  };

  const t = THEMES[theme];
  const confirmed = epics.filter(e => e.status === 'confirmed').length;
  const deciding = epics.filter(e => e.status === 'deciding').length;
  const active = epics.filter(e => e.status !== 'deferred');
  const load = totalLoad(active, config);
  const { total: cap } = teamCap(team, config);
  const pct = cap > 0 ? Math.round((load / cap) * 100) : 0;
  const globalConf = weightedConfidence(active, config);
  const totalHUs = active.reduce((s, e) => s + e.stories.length, 0);
  const doneHUs  = active.reduce((s, e) => s + e.stories.filter(st => st.done).length, 0);

  const exportState = () => {
    const state = { epics, team, stakeholders, agenda, okrs, weeklySync, revenue, goals, logros, config, theme, sprintVelocity, _exported: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `pi-planning-${(config.channelName || 'state').toLowerCase().replace(/\s+/g,'-')}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const importState = (file) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const s = JSON.parse(ev.target.result);
        // Apply sprint dates BEFORE state updates so the next render uses correct SPRINT_DATES.
        // (applyQuarterStart mutates the global SPRINT_DATES array synchronously.)
        if (s.config && s.config.quarterStart) applyQuarterStart(s.config.quarterStart);
        if (s.epics) setEpics(s.epics);
        if (s.team) setTeam(s.team);
        if (s.agenda) setAgenda(s.agenda);
        if (s.okrs) setOkrs(s.okrs);
        // Merge imported config with DEFAULT_CONFIG so no keys are lost
        if (s.config) setConfig({ ...DEFAULT_CONFIG, ...s.config });
        if (s.theme) setTheme(s.theme);
        if (s.weeklySync) setWeeklySync(s.weeklySync);
        if (s.revenue) setRevenue(s.revenue);
        if (s.goals)  setGoals(s.goals);
        if (s.logros) setLogros(s.logros);
        if (s.stakeholders) setStakeholders(s.stakeholders);
        if (s.sprintVelocity) setSprintVelocity(s.sprintVelocity);
      } catch (err) { alert('Error al importar: ' + err.message); }
    };
    reader.readAsText(file);
  };

  const manualSave = () => {
    localStorage.setItem(LS_KEY, JSON.stringify({ epics, team, stakeholders, agenda, okrs, weeklySync, revenue, goals, logros, config, theme, sprintVelocity, closedSprints, _migrated: true }));
    setSaveFlash(true);
    setTimeout(() => setSaveFlash(false), 1800);
  };

  const resetToDefaults = () => {
    if (confirm('¿Resetear todo el estado al estado inicial? Esto borrará todos los cambios (incluyendo costos).')) {
      localStorage.removeItem(LS_KEY);
      setEpics(INITIAL_EPICS); setTeam(INITIAL_TEAM); setAgenda(INITIAL_AGENDA);
      setOkrs(INITIAL_OKRS); setWeeklySync(INITIAL_WEEKLY_SYNCS); setConfig(DEFAULT_CONFIG);
    }
  };

  const ALL_TABS = [
    { id: 'epicas',    label: '🗺️ Épicas Q2' },
    { id: 'capacidad', label: '📊 Capacidad' },
    { id: 'timeline',  label: '📅 Timeline' },
    { id: 'okrs',      label: '🎯 OKRs' },
    { id: 'semanal',   label: '📋 Semanal' },
    { id: 'revenue',   label: '📈 Revenue' },
    { id: 'metas',     label: '🏆 Metas' },
  ];
  if (showCosts) ALL_TABS.push({ id: 'costs', label: '💰 Costos' });
  const hiddenTabs = config.hiddenTabs || [];
  const tabs = ALL_TABS.filter(tb => !hiddenTabs.includes(tb.id));

  // ── Demo mode display data (never mutates real state) ──────────────────────
  const displayEpics = demoMode === 'replace' ? demoifyEpics(epics) : epics;
  const displayTeam  = demoMode === 'replace' ? demoifyTeam(team)   : team;
  const displayOkrs  = demoMode === 'replace' ? demoifyOkrs(okrs)   : okrs;
  const blurClass    = demoMode === 'blur' ? 'demo-blur-active' : '';

  const cycleDemo = () => setDemoMode(m => m === 'off' ? 'replace' : m === 'replace' ? 'blur' : 'off');
  const demoLabel = demoMode === 'off' ? '🎥 Demo' : demoMode === 'replace' ? '🎭 Datos genéricos' : '🫧 Blur activo';
  const demoBg    = demoMode === 'off' ? '#334155' : demoMode === 'replace' ? '#7c3aed' : '#0369a1';

  return (
    <ThemeContext.Provider value={t}>
      {showOnboarding && <OnboardingWizard onComplete={handleOnboardingComplete} />}
      <div className={blurClass} style={{ background: t.bg, height: '100vh', display: 'flex', flexDirection: 'column', color: t.text, fontFamily: "'Noto Sans', sans-serif" }}>
        {/* Header */}
        <div style={{ background: t.bgAlt, borderBottom: `1px solid ${t.border}`, padding: '8px 18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8, flexShrink: 0 }}>
          <div onDoubleClick={handleTitleDblClick} style={{ cursor: 'default', userSelect: 'none' }}>
            <div className="demo-sensitive" style={{ fontSize: 8, color: t.textDim, textTransform: 'uppercase', letterSpacing: 1 }}>{config.companyName || 'My Company'} · {config.channelName || 'My Channel'}</div>
            <h1 className="demo-sensitive" style={{ fontSize: 16, fontWeight: 700, color: t.heading, lineHeight: 1.2 }}>PI Planning Lite — {config.quarterLabel || 'Q?'} {config.quarterYear || ''}</h1>
          </div>
          <div style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
            <Stat label="Épicas Q2" value={confirmed} color="#3b82f6" />
            {/* Carga — mismo tratamiento visual que Stat: número → barra fina → label */}
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 18, fontWeight: 800, color: pct > 90 ? '#ef4444' : pct > 70 ? '#f59e0b' : '#22c55e', lineHeight: 1 }}>{pct}%</div>
              <div style={{ width: 48, height: 4, background: t.bgDeep, borderRadius: 2, margin: '4px auto 3px', overflow: 'hidden' }}>
                <div style={{ width: `${Math.min(pct, 100)}%`, height: '100%', background: pct > 90 ? '#ef4444' : pct > 70 ? '#f59e0b' : '#22c55e', borderRadius: 2, transition: 'width 0.4s' }} />
              </div>
              <div style={{ fontSize: 9, color: '#64748b', textTransform: 'uppercase', letterSpacing: 0.5 }}>Carga</div>
            </div>
            <Stat label="Confianza" value={`${globalConf}%`} color={confColor(globalConf)} />
            <div style={{ textAlign: 'right', fontSize: 10, color: t.textFaint, lineHeight: 1.4 }}>
              <div>Sprint cierra <span style={{ color: '#f59e0b', fontWeight: 700 }}>27 mar</span></div>
              <div>Q2 arranca <span style={{ color: '#22c55e', fontWeight: 700 }}>31 mar</span></div>
            </div>
            <button onClick={manualSave}
              style={{ background: saveFlash ? '#16a34a' : t.bgAlt, border: `1px solid ${saveFlash ? '#16a34a' : t.border}`, borderRadius: 5, color: saveFlash ? '#fff' : t.textMuted, fontSize: 11, fontWeight: 600, cursor: 'pointer', padding: '4px 10px', transition: 'all 0.2s', minWidth: 72 }}
              title="Guardar en el navegador">{saveFlash ? '✓ Guardado' : '💾 Guardar'}</button>
            <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
              style={{ background: t.bg, border: `1px solid ${t.border}`, borderRadius: 5, color: t.text, fontSize: 14, cursor: 'pointer', padding: '3px 7px' }}
              title="Cambiar tema">{theme === 'dark' ? '☀️' : '🌙'}</button>
            <button onClick={() => setShowConfig(p => !p)}
              style={{ background: showConfig ? t.accent + '22' : t.bg, border: `1px solid ${showConfig ? t.accent : t.border}`, borderRadius: 5, color: showConfig ? t.accent : t.textMuted, fontSize: 15, cursor: 'pointer', padding: '3px 7px' }}
              title="Configuración">⚙️</button>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ background: t.bgAlt, borderBottom: `1px solid ${t.border}`, padding: '0 18px', display: 'flex', flexShrink: 0 }}>
          {tabs.map(tb => (
            <button key={tb.id} onClick={() => setTab(tb.id)} style={{
              background: 'none', border: 'none', cursor: 'pointer', padding: '8px 14px',
              fontSize: 12, fontWeight: tab === tb.id ? 700 : 400,
              color: tab === tb.id ? t.heading : t.textMuted,
              borderBottom: `2px solid ${tab === tb.id ? t.accent : 'transparent'}`, marginBottom: -1,
            }}>{tb.label}</button>
          ))}
        </div>

        {/* Body */}
        <div style={{ flex: 1, display: 'flex', overflow: 'hidden', position: 'relative' }}>
          <Sidebar agenda={agenda} setAgenda={setAgenda} open={sidebar} onToggle={() => setSidebar(!sidebar)} />
          {/* All tabs always mounted — display:none preserves scroll + UI state when switching */}
          <div style={{ flex: 1, overflow: 'auto', position: 'relative' }}>
            <div style={{ display: tab === 'epicas' ? 'block' : 'none', padding: 16 }}>
              <KanbanTab epics={displayEpics} setEpics={setEpics} team={displayTeam} stakeholders={stakeholders} theme={theme} config={config} jumpToEpicId={jumpToEpicId} onJumpHandled={() => setJumpToEpicId(null)} />
            </div>
            <div style={{ display: tab === 'capacidad' ? 'block' : 'none', padding: 16 }}>
              <CapacidadTab epics={displayEpics} team={displayTeam} config={config} sprintVelocity={sprintVelocity} setSprintVelocity={setSprintVelocity} closedSprints={closedSprints} setClosedSprints={setClosedSprints} />
            </div>
            <div style={{ display: tab === 'timeline' ? 'flex' : 'none', flexDirection: 'column', position: 'absolute', inset: 0 }}>
              <TimelineTab epics={displayEpics} setEpics={setEpics} team={displayTeam} stakeholders={stakeholders} config={config} onNavigateToEpic={(id) => { setTab('epicas'); setJumpToEpicId(id); }} closedSprints={closedSprints} />
            </div>
            <div style={{ display: tab === 'okrs' ? 'block' : 'none', padding: 16 }}>
              <OKRsTab okrs={displayOkrs} setOkrs={setOkrs} epics={displayEpics} team={displayTeam} />
            </div>
            <div style={{ display: tab === 'semanal' ? 'block' : 'none', padding: 16 }}>
              <SemanalTab weeklySync={weeklySync} setWeeklySync={setWeeklySync} team={displayTeam} epics={displayEpics} config={config} />
            </div>
            <div style={{ display: tab === 'revenue' ? 'block' : 'none', padding: 16 }}>
              <RevenueTab epics={displayEpics} revenue={revenue} setRevenue={setRevenue} />
            </div>
            <div style={{ display: tab === 'metas' ? 'block' : 'none', padding: 16 }}>
              <MetasTab goals={goals} setGoals={setGoals} logros={logros} setLogros={setLogros} config={config} />
            </div>
            {showCosts && (
              <div style={{ display: tab === 'costs' ? 'block' : 'none', padding: 16 }}>
                <CostPanel team={team} setTeam={setTeam} config={config} setConfig={setConfig} epics={epics} />
              </div>
            )}
          </div>

          {/* ── Config full-screen overlay ────────────────────────────── */}
          {showConfig && (
            <div style={{ position: 'fixed', inset: 0, zIndex: 200, background: t.bg, display: 'flex', flexDirection: 'column' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '11px 20px', borderBottom: `1px solid ${t.border}`, background: t.bgAlt, flexShrink: 0 }}>
                <span style={{ fontSize: 15, fontWeight: 700, color: t.heading }}>⚙️ Configuración</span>
                <button onClick={() => setShowConfig(false)} style={{ background: 'none', border: `1px solid ${t.border}`, borderRadius: 6, color: t.textMuted, cursor: 'pointer', fontSize: 14, padding: '3px 10px' }}>✕ Cerrar</button>
              </div>
              <div style={{ flex: 1, overflow: 'auto', padding: '20px 32px' }}>
                <ConfigPanel config={config} setConfig={setConfig} team={team} setTeam={setTeam} stakeholders={stakeholders} setStakeholders={setStakeholders} exportState={exportState} importState={importState} resetToDefaults={resetToDefaults} demoMode={demoMode} setDemoMode={setDemoMode} />
              </div>
            </div>
          )}
        </div>
      </div>
    </ThemeContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
