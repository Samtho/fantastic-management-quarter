// TIMELINE TAB — GANTT WITH DRAG
// ═══════════════════════════════════════════════════════════════════════════════
function TimelineTab({ epics, setEpics, team, stakeholders, config, onNavigateToEpic, closedSprints }) {
  const t = useTheme();
  const allPeople = [...team, ...(stakeholders || [])];
  const [expEpics, setExpEpics] = useState({});
  const [showOwnerInitials, setShowOwnerInitials] = useState(true);
  const [drag, setDrag] = useState(null);
  const [padL, setPadL] = useState(220);
  const [filterOwners, setFilterOwners] = useState([]);
  const [filterSprint, setFilterSprint] = useState(null);
  const colW = 160;

  const startResizeCol = useCallback((e) => {
    e.preventDefault();
    e.stopPropagation();
    const startX = e.clientX;
    const startPadL = padL;
    const onMove = (ev) => {
      const newPadL = Math.min(500, Math.max(120, startPadL + (ev.clientX - startX)));
      setPadL(newPadL);
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }, [padL]);
  const epicH = config.epicRowH || 40;
  const storyH = Math.round(epicH * 0.6);

  // Dynamic owner list: only people who have at least one HU assigned (any sprint)
  const assignedOwnerIds = useMemo(() => {
    const ids = new Set();
    epics.forEach(e => {
      if (e.status !== 'deferred') e.stories.forEach(s => { if (s.owner) ids.add(s.owner); });
    });
    return [...ids];
  }, [epics]);

  const allScheduled = epics.filter(e => e.ss && e.status !== 'deferred');
  // Apply owner filter: keep epics that have ≥1 story owned by any selected owner
  const ownerFiltered = filterOwners.length > 0
    ? allScheduled.filter(e => e.stories.some(s => filterOwners.includes(s.owner)))
    : allScheduled;
  // Apply sprint filter: keep epics that have ≥1 story assigned to the selected sprint
  const vis = filterSprint
    ? ownerFiltered.filter(e => e.stories.some(s => s.sprint === filterSprint))
    : ownerFiltered;
  const unscheduled = epics.filter(e => !e.ss && e.status !== 'deferred');

  const DIVIDER_H = 28;
  const rows = [];
  vis.forEach(epic => {
    rows.push({ type: 'epic', epic });
    if (config.showStories && expEpics[epic.id]) {
      // Sort stories by sprint before rendering — earlier sprints first, unassigned last
      const sortedStories = [...epic.stories].sort((a, b) => {
        const ai = a.sprint != null ? (SI[a.sprint] ?? 999) : 999;
        const bi = b.sprint != null ? (SI[b.sprint] ?? 999) : 999;
        return ai - bi;
      });
      sortedStories.forEach(story => rows.push({ type: 'story', story, epic }));
    }
  });
  if (unscheduled.length > 0) {
    rows.push({ type: 'divider', label: `Sin programar (${unscheduled.length})` });
    unscheduled.forEach(epic => rows.push({ type: 'epic-unscheduled', epic }));
  }

  const rowH = (r) => r.type === 'epic' || r.type === 'epic-unscheduled' ? epicH : r.type === 'divider' ? DIVIDER_H : storyH;
  const totalH = rows.reduce((s, r) => s + rowH(r), 0);
  const totalW = padL + (SPRINTS.length + Q3_COLS) * colW;

  const startDrag = useCallback((e, epicId, type) => {
    e.preventDefault();
    const epic = epics.find(x => x.id === epicId);
    if (!epic || !epic.ss) return;
    // Prevent moving epics that span any closed sprint
    const epicSprintIds = SPRINTS.slice(SI[epic.ss], (SI[epic.se || epic.ss] ?? SI[epic.ss]) + 1).map(s => s.id);
    if (epicSprintIds.some(sid => closedSprints?.[sid])) return;
    const origS = SI[epic.ss];
    const origE = SI[epic.se || epic.ss];
    const startX = e.clientX;

    const state = { epicId, type, startX, origS, origE, newS: origS, newE: origE };
    setDrag(state);

    const onMove = (ev) => {
      const delta = Math.round((ev.clientX - startX) / colW);
      let nS = origS, nE = origE;
      if (type === 'move') {
        const dur = origE - origS;
        nS = Math.max(0, Math.min(SPRINTS.length - 1 - dur, origS + delta));
        nE = nS + dur;
      } else if (type === 'left') {
        nS = Math.max(0, Math.min(origE, origS + delta));
        nE = origE;
      } else if (type === 'right') {
        nS = origS;
        nE = Math.max(origS, Math.min(SPRINTS.length - 1, origE + delta));
      }
      setDrag(prev => prev ? { ...prev, newS: nS, newE: nE } : null);
    };

    const onUp = () => {
      setDrag(prev => {
        if (prev) {
          setEpics(p => p.map(x => x.id === prev.epicId ? { ...x, ss: SPRINTS[prev.newS].id, se: SPRINTS[prev.newE].id } : x));
        }
        return null;
      });
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };

    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }, [epics, colW, padL, setEpics]);

  const depLines = [];
  if (config.showDeps) {
    vis.forEach(epic => {
      (epic.deps || []).forEach(depId => {
        const dep = vis.find(e => e.id === depId);
        if (!dep || !dep.ss) return;
        const fi = rows.findIndex(r => r.type === 'epic' && r.epic.id === depId);
        const ti = rows.findIndex(r => r.type === 'epic' && r.epic.id === epic.id);
        if (fi < 0 || ti < 0) return;
        let fy = 0; for (let i = 0; i < fi; i++) fy += rowH(rows[i]);
        let ty = 0; for (let i = 0; i < ti; i++) ty += rowH(rows[i]);
        const dse = SI[dep.se || dep.ss];
        const ess = SI[epic.ss];
        depLines.push({ x1: padL + (dse + 1) * colW, y1: fy + epicH / 2, x2: padL + ess * colW, y2: ty + epicH / 2, key: `${depId}-${epic.id}` });
      });
    });
  }

  const allExpanded = vis.length > 0 && vis.every(e => !!expEpics[e.id]);
  const toggleAllEpics = () => {
    if (allExpanded) {
      setExpEpics({});
    } else {
      const all = {};
      vis.forEach(e => { all[e.id] = true; });
      setExpEpics(all);
    }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      {/* ── Toolbar ─────────────────────────────────────────────────────── */}
      <div style={{ padding: '10px 16px 6px 16px', flexShrink: 0 }}>
        {/* Title + subtitle */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
          <div>
            <h2 style={{ fontSize: 15, fontWeight: 700, color: t.heading, marginBottom: 1 }}>Timeline Q2 2026</h2>
            <div style={{ fontSize: 10, color: t.textMuted }}>Arrastra las barras para mover. Usa los bordes para extender/reducir.</div>
          </div>
        </div>
        {/* Filter + controls row — left: expand + owners · right: sprint chips + carga */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, flexWrap: 'wrap' }}>
          {/* LEFT: expand toggle + owner filter */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
            {config.showStories && (
              <button onClick={toggleAllEpics} title={allExpanded ? 'Colapsar todas las HUs' : 'Expandir todas las HUs'}
                style={{ fontSize: 12, background: 'none', border: `1px solid ${t.border}`, borderRadius: 5, color: allExpanded ? t.accent : t.textFaint, padding: '3px 7px', cursor: 'pointer', lineHeight: 1 }}>
                {allExpanded ? '▲' : '▼'}
              </button>
            )}
            {assignedOwnerIds.length > 0 && (
              <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                <span style={{ fontSize: 9, color: t.textDim, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.4 }}>Dev:</span>
                {assignedOwnerIds.map(oid => {
                  const person = allPeople.find(p => p.id === oid);
                  if (!person) return null;
                  const active = filterOwners.includes(oid);
                  const initial = person.name.charAt(0).toUpperCase();
                  return (
                    <button key={oid} onClick={() => setFilterOwners(prev => active ? prev.filter(x => x !== oid) : [...prev, oid])}
                      title={`${active ? 'Quitar filtro' : 'Filtrar por'}: ${person.name}`}
                      style={{ width: 22, height: 22, borderRadius: '50%', background: active ? person.color : person.color + '33', border: `2px solid ${active ? person.color : person.color + '66'}`, color: active ? '#fff' : person.color, fontSize: 9, fontWeight: 800, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 0, flexShrink: 0, lineHeight: 1 }}>
                      {initial}
                    </button>
                  );
                })}
                {filterOwners.length > 0 && (
                  <button onClick={() => setFilterOwners([])} title="Quitar filtro de personas"
                    style={{ fontSize: 9, background: 'none', border: `1px solid ${t.border}`, borderRadius: 4, color: t.textFaint, padding: '2px 5px', cursor: 'pointer' }}>✕</button>
                )}
              </div>
            )}
          </div>
          {/* RIGHT: sprint filter + carga toggle + active filter summary */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
            {(filterOwners.length > 0 || filterSprint) && (
              <span style={{ fontSize: 9, color: t.textFaint, fontStyle: 'italic' }}>
                Mostrando {vis.length} de {allScheduled.length} épicas
              </span>
            )}
            <div style={{ display: 'flex', gap: 3, alignItems: 'center' }}>
              <span style={{ fontSize: 9, color: t.textDim, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.4 }}>Sprint:</span>
              {SPRINTS.map(s => {
                const active = filterSprint === s.id;
                return (
                  <button key={s.id} onClick={() => setFilterSprint(active ? null : s.id)}
                    title={`${active ? 'Quitar filtro' : 'Filtrar por'} ${s.full}`}
                    style={{ fontSize: 9, fontWeight: 700, background: active ? t.accent : 'none', border: `1px solid ${active ? t.accent : t.border}`, borderRadius: 4, color: active ? '#fff' : t.textMuted, padding: '2px 6px', cursor: 'pointer' }}>
                    {s.label}
                  </button>
                );
              })}
            </div>
            <button onClick={() => setShowOwnerInitials(p => !p)} title="Mostrar/ocultar inicial del responsable en HUs"
              style={{ fontSize: 10, fontWeight: 600, background: showOwnerInitials ? t.accent + '22' : 'none', border: `1px solid ${showOwnerInitials ? t.accent : t.border}`, borderRadius: 5, color: showOwnerInitials ? t.accent : t.textFaint, padding: '3px 8px', cursor: 'pointer' }}>
              ⚖️ Carga
            </button>
          </div>
        </div>
      </div>
      <div style={{ flex: 1, overflow: 'auto', margin: '0 16px 16px 16px', border: `1px solid ${t.border}`, borderRadius: 8, background: t.bgAlt, position: 'relative' }}>
        <div style={{ minWidth: totalW, position: 'relative', height: totalH + 24 }}>
          <div style={{ display: 'flex', position: 'sticky', top: 0, zIndex: 10, background: t.bgAlt, borderBottom: `1px solid ${t.border}` }}>
            <div style={{ width: padL, flexShrink: 0, padding: '10px 12px', fontSize: 10, fontWeight: 700, color: t.textDim, position: 'relative', userSelect: 'none' }}>
              ÉPICA
              <div onMouseDown={startResizeCol}
                style={{ position: 'absolute', right: 0, top: 0, width: 6, height: '100%', cursor: 'col-resize', background: 'transparent', zIndex: 20 }}
                title="Arrastra para redimensionar">
                <div style={{ position: 'absolute', right: 2, top: '25%', height: '50%', width: 2, background: t.border, borderRadius: 1 }} />
              </div>
            </div>
            {SPRINTS.map(s => (
              <div key={s.id} style={{ width: colW, flexShrink: 0, padding: '6px 8px', textAlign: 'center', borderLeft: `1px solid ${s.current ? '#f59e0b' : t.border}`, background: s.current ? '#f59e0b18' : 'transparent', position: 'relative' }}>
                {s.current && <div style={{ position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)', fontSize: 7, fontWeight: 800, background: '#f59e0b', color: '#000', padding: '1px 6px', borderRadius: '0 0 3px 3px', letterSpacing: 0.5, textTransform: 'uppercase', whiteSpace: 'nowrap' }}>Actual</div>}
                <div style={{ fontSize: 13, fontWeight: 700, color: s.current ? '#f59e0b' : t.heading, marginTop: s.current ? 10 : 0 }}>{s.full}</div>
                <div style={{ fontSize: 10, color: t.textFaint }}>{s.dates}</div>
              </div>
            ))}
            {/* Q3 zone header */}
            <div style={{ width: Q3_COLS * colW, flexShrink: 0, padding: '6px 8px', textAlign: 'center', borderLeft: `2px dashed ${t.border}`, background: t.bgDeep, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: t.textDim }}>Q3 2026</span>
              <span style={{ fontSize: 10, color: t.textFaint }}>Jul →</span>
            </div>
          </div>

          <div style={{ position: 'relative' }}>
            {SPRINTS.map((s, i) => (
              <div key={s.id} style={{ position: 'absolute', left: padL + i * colW, top: 0, width: 1, height: Math.max(totalH, 200), background: t.border, zIndex: 1 }} />
            ))}
            {/* Q3 shaded zone */}
            <div style={{ position: 'absolute', left: padL + SPRINTS.length * colW, top: 0, width: Q3_COLS * colW, height: Math.max(totalH, 200), background: t.bgDeep, opacity: 0.8, borderLeft: `2px dashed ${t.border}`, zIndex: 1, pointerEvents: 'none' }}>
              <span style={{ position: 'absolute', top: 8, left: '50%', transform: 'translateX(-50%)', fontSize: 10, fontWeight: 700, color: t.textFaint, letterSpacing: 1, whiteSpace: 'nowrap' }}>Q3 →</span>
            </div>

            {depLines.length > 0 && (
              <svg style={{ position: 'absolute', top: 0, left: 0, width: totalW, height: Math.max(totalH, 200), pointerEvents: 'none', zIndex: 5 }}>
                <defs><marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0 0 L7 2.5 L0 5z" fill={config.depColor || '#f59e0b'} /></marker></defs>
                {depLines.map(l => {
                  const mx = (l.x1 + l.x2) / 2;
                  return <path key={l.key} d={`M${l.x1} ${l.y1} C${mx} ${l.y1},${mx} ${l.y2},${l.x2} ${l.y2}`} fill="none" stroke={config.depColor || '#f59e0b'} strokeWidth="2" strokeDasharray="5 3" markerEnd="url(#ah)" opacity="0.7" />;
                })}
              </svg>
            )}

            {/* ── Línea "Hoy" ───────────────────────────────────────── */}
            {(() => {
              const tx = getTodayX(padL, colW);
              if (tx === null) return null;
              const lc = config.todayLineColor || '#f43f5e';
              const lw = config.todayLineWidth || 2;
              const ls = config.todayLineStyle || 'solid';
              // Use borderLeft so dashed/dotted styles render correctly (background ignores style)
              return (
                <div style={{ position: 'absolute', left: tx, top: 0, width: 0, height: Math.max(totalH, 200), borderLeft: `${lw}px ${ls} ${lc}`, zIndex: 6, pointerEvents: 'none', opacity: 0.9 }}>
                  <div style={{ position: 'absolute', top: 0, left: 3, background: lc, color: '#fff', fontSize: 8, fontWeight: 800, padding: '2px 5px', borderRadius: '0 3px 3px 3px', whiteSpace: 'nowrap', letterSpacing: 0.5 }}>HOY</div>
                </div>
              );
            })()}

            {/* ── Row separators between epic groups ────────────────── */}
            {(() => {
              const seps = [];
              let yo = 0;
              rows.forEach((row, ri) => {
                if (ri > 0 && (row.type === 'epic' || row.type === 'epic-unscheduled' || row.type === 'divider')) {
                  seps.push(
                    <div key={`rsep-${ri}`} style={{ position: 'absolute', left: 0, top: yo, width: totalW, height: 0, borderTop: `${config.rowSepWidth || 1}px ${config.rowSepStyle || 'solid'} ${config.rowSepColor || '#334155'}`, zIndex: 4, pointerEvents: 'none', opacity: 0.75 }} />
                  );
                }
                yo += rowH(row);
              });
              return seps;
            })()}

            {rows.map((row, ri) => {
              let yo = 0; for (let i = 0; i < ri; i++) yo += rowH(rows[i]);
              const h = rowH(row);

              if (row.type === 'epic') {
                const epic = row.epic;
                const isDrag = drag && drag.epicId === epic.id;
                const sIdx = isDrag ? drag.newS : SI[epic.ss];
                const eIdx = isDrag ? drag.newE : SI[epic.se || epic.ss];
                const bL = padL + sIdx * colW + 3;
                const bW = (eIdx - sIdx + 1) * colW - 6;
                const ownerColor = allPeople.find(m => m.id === epic.owners[0])?.color || '#64748b';
                const oc = epic.color || ownerColor;
                // Check if this epic spans any closed sprint (locks dragging)
                const epicSprintRange = SPRINTS.slice(sIdx, eIdx + 1).map(s => s.id);
                const epicIsLocked = epicSprintRange.some(sid => closedSprints?.[sid]);
                const doneStories = epic.stories.filter(s => s.done).length;
                const totalStories = epic.stories.length;
                const progPct = totalStories > 0 ? Math.round((doneStories / totalStories) * 100) : 0;
                const showProgress = !epic.noProgress && totalStories > 0;
                const isComplete = totalStories > 0 && doneStories === totalStories;
                const carryOverCount = epic.stories.filter(s => !s.done && s.sprint && isPastSprint(s.sprint)).length;

                return (
                  <div key={epic.id} style={{ position: 'absolute', top: yo, left: 0, width: totalW, height: h, display: 'flex', alignItems: 'center', borderBottom: `1px solid ${t.border}22` }}>
                    <div style={{ width: padL, flexShrink: 0, padding: '0 8px', display: 'flex', alignItems: 'center', gap: 5, overflow: 'hidden' }}>
                      {config.showStories && (
                        <span onClick={() => setExpEpics(p => ({ ...p, [epic.id]: !p[epic.id] }))}
                          style={{ fontSize: 9, color: t.textDim, cursor: 'pointer', flexShrink: 0 }}>{expEpics[epic.id] ? '▼' : '▶'}</span>
                      )}
                      <input type="color" value={oc}
                        onChange={e => setEpics(p => p.map(x => x.id === epic.id ? { ...x, color: e.target.value } : x))}
                        title="Cambiar color"
                        style={{ width: 14, height: 14, border: 'none', borderRadius: 3, cursor: 'pointer', padding: 0, flexShrink: 0, background: 'transparent' }} />
                      <span style={{ fontSize: config.epicLabelSize || 12, fontWeight: 700, color: isComplete ? '#22c55e' : t.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{epic.label}</span>
                      {isComplete && <span style={{ fontSize: 9, fontWeight: 800, background: '#15803d', color: '#bbf7d0', padding: '1px 5px', borderRadius: 4, flexShrink: 0 }}>✓ DONE</span>}
                      {!isComplete && <SizeBadge size={epic.size} small />}
                      {carryOverCount > 0 && <span title={`${carryOverCount} HU${carryOverCount > 1 ? 's' : ''} sin cerrar en sprint pasado`} style={{ fontSize: 9, fontWeight: 800, background: '#ef444422', border: '1px solid #ef444466', color: '#ef4444', padding: '1px 5px', borderRadius: 4, flexShrink: 0 }}>⚠{carryOverCount}</span>}
                    </div>
                    <div style={{ position: 'absolute', left: bL, top: 5, height: h - 10, width: bW,
                      background: isComplete ? '#15803d44' : `${oc}22`,
                      border: isComplete ? '1.5px solid #22c55e' : epicIsLocked ? `1.5px solid ${oc}bb` : `1px solid ${oc}88`,
                      borderRadius: 4, overflow: 'hidden', zIndex: 3, userSelect: 'none' }}>
                      {/* Progress fill — full green when complete */}
                      {isComplete && <div style={{ position: 'absolute', top: 0, left: 0, height: '100%', width: '100%', background: '#22c55e33', pointerEvents: 'none' }} />}
                      {showProgress && !isComplete && <div style={{ position: 'absolute', top: 0, left: 0, height: '100%', width: `${progPct}%`, background: `${oc}55`, transition: 'width 0.3s', pointerEvents: 'none' }} />}
                      {!epicIsLocked && <div onMouseDown={e => startDrag(e, epic.id, 'left')}
                        style={{ position: 'absolute', left: 0, top: 0, width: 7, height: '100%', cursor: 'ew-resize', borderRadius: '4px 0 0 4px', background: isDrag && drag.type === 'left' ? `${oc}66` : 'transparent', zIndex: 2 }} />}
                      <div onMouseDown={!epicIsLocked ? e => startDrag(e, epic.id, 'move') : undefined}
                        style={{ position: 'absolute', left: 7, right: 7, top: 0, bottom: 0, cursor: epicIsLocked ? 'default' : 'grab', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 8px', overflow: 'hidden', zIndex: 1 }}>
                        <span style={{ fontSize: Math.max(9, (config.epicLabelSize || 12) - 1), fontWeight: 600, color: isComplete ? '#22c55e' : oc, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{epic.label}</span>
                        {isComplete
                          ? <span style={{ fontSize: 11, fontWeight: 800, color: '#22c55e', flexShrink: 0, marginLeft: 6 }}>✓</span>
                          : epicIsLocked
                            ? <span style={{ fontSize: 10, color: oc, flexShrink: 0, marginLeft: 6, opacity: 0.7 }}>🔒</span>
                            : showProgress && <span style={{ fontSize: 10, fontWeight: 700, color: oc, flexShrink: 0, marginLeft: 6, background: `${oc}22`, padding: '1px 5px', borderRadius: 4 }}>{doneStories}/{totalStories}</span>
                        }
                      </div>
                      {!epicIsLocked && <div onMouseDown={e => startDrag(e, epic.id, 'right')}
                        style={{ position: 'absolute', right: 0, top: 0, width: 7, height: '100%', cursor: 'ew-resize', borderRadius: '0 4px 4px 0', background: isDrag && drag.type === 'right' ? `${oc}66` : 'transparent', zIndex: 2 }} />}
                    </div>
                  </div>
                );
              } else if (row.type === 'divider') {
                return (
                  <div key={`divider-${ri}`} style={{ position: 'absolute', top: yo, left: 0, width: totalW, height: h, display: 'flex', alignItems: 'center', background: t.bgDeep, borderTop: `1px dashed ${t.border}`, borderBottom: `1px dashed ${t.border}`, zIndex: 2 }}>
                    <div style={{ width: padL, flexShrink: 0, padding: '0 12px', display: 'flex', alignItems: 'center', gap: 6 }}>
                      <span style={{ fontSize: 9, fontWeight: 700, color: t.textFaint, textTransform: 'uppercase', letterSpacing: 1 }}>⚠ {row.label}</span>
                    </div>
                    <div style={{ flex: 1, height: 1, borderTop: `1px dashed ${t.border}`, opacity: 0.5 }} />
                  </div>
                );
              } else if (row.type === 'epic-unscheduled') {
                const epic = row.epic;
                const ownerColor = allPeople.find(m => m.id === epic.owners[0])?.color || '#64748b';
                const oc = epic.color || ownerColor;
                return (
                  <div key={epic.id} onClick={() => onNavigateToEpic && onNavigateToEpic(epic.id)} title="Ir a épica"
                    style={{ position: 'absolute', top: yo, left: 0, width: totalW, height: h, display: 'flex', alignItems: 'center', borderBottom: `1px solid ${t.border}11`, opacity: 0.65, cursor: 'pointer' }}>
                    <div style={{ width: padL, flexShrink: 0, padding: '0 8px', display: 'flex', alignItems: 'center', gap: 5, overflow: 'hidden' }}>
                      <input type="color" value={oc}
                        onChange={e => setEpics(p => p.map(x => x.id === epic.id ? { ...x, color: e.target.value } : x))}
                        style={{ width: 14, height: 14, border: 'none', borderRadius: 3, cursor: 'pointer', padding: 0, flexShrink: 0, background: 'transparent' }} />
                      <span style={{ fontSize: config.epicLabelSize || 12, fontWeight: 700, color: t.textMuted, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{epic.label}</span>
                      <SizeBadge size={epic.size} small />
                    </div>
                    <div style={{ position: 'absolute', left: padL + 8, top: '50%', transform: 'translateY(-50%)', fontSize: 9, color: t.textFaint, fontStyle: 'italic' }}>
                      Asigna sprint en Épicas Q2 →
                    </div>
                  </div>
                );
              } else {
                const story = row.story;
                const epic = row.epic;
                const oc = allPeople.find(m => m.id === story.owner)?.color || '#64748b';
                const navToEpic = () => onNavigateToEpic && onNavigateToEpic(epic.id);
                if (!story.sprint) return (
                  <div key={story.id} onClick={navToEpic} title="Ir a épica"
                    style={{ position: 'absolute', top: yo, left: 0, width: totalW, height: h, display: 'flex', alignItems: 'center', borderBottom: `1px solid ${t.border}11`, cursor: 'pointer' }}>
                    <div style={{ width: padL, padding: '0 10px 0 30px', fontSize: 9, color: t.textDim, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                      {story.done ? '✓' : '○'} {story.title}
                    </div>
                  </div>
                );
                const si = SI[story.sprint];
                const bl = padL + si * colW + 6;
                const bw = colW - 12;
                return (
                  <div key={story.id} onClick={navToEpic} title={`→ ${epic.label}`}
                    style={{ position: 'absolute', top: yo, left: 0, width: totalW, height: h, display: 'flex', alignItems: 'center', borderBottom: `1px solid ${t.border}11`, cursor: 'pointer' }}>
                    <div style={{ width: padL, padding: '0 10px 0 30px', fontSize: 9, color: story.done ? t.textDim : t.textMuted, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', textDecoration: story.done ? 'line-through' : 'none' }}>
                      {story.done ? '✓' : '○'} {story.title} <SizeBadge size={story.size} small />
                    </div>
                    <div style={{ position: 'absolute', left: bl, top: 3, height: h - 6, width: bw, background: `${oc}22`, border: `1px solid ${oc}44`, borderRadius: 3, display: 'flex', alignItems: 'center', padding: '0 4px 0 5px', gap: 3, zIndex: 3, overflow: 'hidden' }}>
                      <span style={{ fontSize: 8, color: oc, flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', minWidth: 0 }}>{story.title}</span>
                      {showOwnerInitials && story.owner && (
                        <div style={{
                          width: Math.max(11, Math.min(storyH - 8, 16)), height: Math.max(11, Math.min(storyH - 8, 16)),
                          borderRadius: '50%', background: oc, border: '1.5px solid rgba(255,255,255,0.25)',
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          fontSize: 7, fontWeight: 800, color: '#fff', flexShrink: 0, lineHeight: 1,
                        }} title={allPeople.find(m => m.id === story.owner)?.name || story.owner}>
                          {(allPeople.find(m => m.id === story.owner)?.name?.[0] || story.owner?.[0] || '?').toUpperCase()}
                        </div>
                      )}
                    </div>
                  </div>
                );
              }
            })}
            <div style={{ height: Math.max(totalH, 200) }} />
          </div>
        </div>
      </div>
      {vis.length === 0 && <div style={{ padding: 30, textAlign: 'center', color: t.textDim }}>Asigna sprint de inicio en Épicas Q2 para ver el timeline.</div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// COST PANEL (HIDDEN — double-click title to reveal)
// ═══════════════════════════════════════════════════════════════════════════════
function CostPanel({ team, setTeam, config, setConfig, epics }) {
  const t = useTheme();
  const costs = calcCosts(team, config);
  const eCosts = epicCosts(epics, team, config);
  const totalEpicCost = eCosts.reduce((s, e) => s + e.cost, 0);
  const fmt = n => n.toLocaleString('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });

  return (
    <div style={{ maxWidth: 960 }}>
      <h2 style={{ fontSize: 15, fontWeight: 700, color: t.heading, marginBottom: 3 }}>💰 Costos del Equipo Q2</h2>
      <div style={{ fontSize: 11, color: t.textMuted, marginBottom: 4 }}>
        Panel privado. Solo visible al activar el modo costos (doble-clic en título).
      </div>
      <div style={{ fontSize: 10, color: '#f59e0b', marginBottom: 16 }}>⚠ Los valores configurados aquí no se exportan en el JSON por defecto. Configura antes de compartir.</div>

      {/* Hours per sprint config */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, marginBottom: 14 }}>
        <Label>Horas base por sprint (antes de multiplicador)</Label>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <input type="number" min="1" value={config.hoursPerSprint || 80}
            onChange={e => setConfig(p => ({ ...p, hoursPerSprint: Math.max(1, parseInt(e.target.value) || 80) }))}
            style={{ width: 80, fontSize: 13, fontWeight: 700, color: t.heading, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, padding: '5px 8px', textAlign: 'center' }} />
          <span style={{ fontSize: 11, color: t.textMuted }}>horas/sprint (2 semanas, 10 días lab.)</span>
        </div>
      </div>

      {/* Per member costs */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, marginBottom: 14 }}>
        <Label>Costos por miembro</Label>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {team.map(m => (
            <div key={m.id} style={{ display: 'flex', gap: 8, alignItems: 'center', padding: '6px 0', borderBottom: `1px solid ${t.border}22` }}>
              <div style={{ width: 7, height: 7, borderRadius: '50%', background: m.color, flexShrink: 0 }} />
              <span style={{ fontSize: 11, fontWeight: 600, color: t.text, width: 110, flexShrink: 0 }}>{m.name}</span>
              <select value={m.type || 'internal'} onChange={e => setTeam(p => p.map(x => x.id === m.id ? { ...x, type: e.target.value } : x))}
                style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '3px 5px', width: 75 }}>
                <option value="internal">Interno</option>
                <option value="external">Externo</option>
              </select>
              {(m.type || 'internal') === 'internal' ? (
                <div style={{ display: 'flex', gap: 4, alignItems: 'center', flex: 1 }}>
                  <span style={{ fontSize: 9, color: t.textDim }}>€/mes:</span>
                  <input type="number" min="0" value={m.monthlyCost || 0}
                    onChange={e => setTeam(p => p.map(x => x.id === m.id ? { ...x, monthlyCost: parseFloat(e.target.value) || 0 } : x))}
                    style={{ width: 80, fontSize: 11, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 6px' }} />

                </div>
              ) : (
                <div style={{ display: 'flex', gap: 4, alignItems: 'center', flex: 1 }}>

                    onChange={e => setTeam(p => p.map(x => x.id === m.id ? { ...x, hourlyRate: parseFloat(e.target.value) || 0 } : x))}

              )}
            </div>
          ))}
        </div>
      </div>

      {/* Summary */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
        <Label>Resumen de costos Q2 ({SPRINTS.length} sprints)</Label>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
          <div style={{ textAlign: 'center', padding: 10, background: t.bg, borderRadius: 6 }}>

          </div>
          <div style={{ textAlign: 'center', padding: 10, background: t.bg, borderRadius: 6 }}>

          </div>
          <div style={{ textAlign: 'center', padding: 10, background: t.bg, borderRadius: 6 }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: '#3b82f6' }}>{fmt(costs.totalQ2)}</div>
            <div style={{ fontSize: 10, color: t.textMuted }}>Total Q2</div>
          </div>
        </div>
        <div style={{ marginTop: 12 }}>
          <Label>Desglose por miembro (Q2 completo)</Label>
          {costs.members.map(cm => (
            <div key={cm.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '3px 0', fontSize: 11 }}>
              <span style={{ color: t.text }}>{cm.name} <span style={{ color: t.textDim, fontSize: 9 }}>({cm.type === 'external' ? 'externo' : 'interno'})</span></span>
              <span style={{ fontWeight: 700, color: t.heading }}>{fmt(cm.totalQ2)}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Cost per epic */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, marginTop: 14 }}>
        <Label>Costo estimado por épica (confirmadas + por decidir)</Label>
        <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 10 }}>
          Basado en: horas por talla × tarifa efectiva del owner asignado a cada HU. Épicas sin costos configurados mostrarán €0.
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 45px 55px 55px 65px 80px', gap: 6, padding: '4px 6px', fontSize: 9, fontWeight: 700, color: t.textDim, textTransform: 'uppercase', letterSpacing: 0.4 }}>
            <span>Épica</span><span style={{ textAlign: 'center' }}>Talla</span><span style={{ textAlign: 'center' }}>Conf.</span><span style={{ textAlign: 'center' }}>HUs</span><span style={{ textAlign: 'right' }}>Horas</span><span style={{ textAlign: 'right' }}>Costo est.</span>
          </div>
          {eCosts.map((ec, i) => {
            const pctOfTotal = totalEpicCost > 0 ? Math.round((ec.cost / totalEpicCost) * 100) : 0;
            return (
              <div key={ec.id} style={{ display: 'grid', gridTemplateColumns: '1fr 45px 55px 55px 65px 80px', gap: 6, padding: '5px 6px', background: i % 2 === 0 ? t.bg : 'transparent', borderRadius: 4, alignItems: 'center' }}>
                <span style={{ fontSize: 11, fontWeight: 600, color: t.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{ec.label}</span>
                <span style={{ textAlign: 'center' }}><SizeBadge size={ec.size} small /></span>
                <span style={{ textAlign: 'center', fontSize: 10, fontWeight: 700, color: confColor(ec.confidence) }}>{ec.confidence}%</span>
                <span style={{ textAlign: 'center', fontSize: 10, color: t.textMuted }}>{ec.stories}</span>
                <span style={{ textAlign: 'right', fontSize: 10, color: t.textMuted }}>{ec.hours}h</span>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: ec.cost > 0 ? t.heading : t.textDim }}>{fmt(ec.cost)}</div>
                  {ec.cost > 0 && <div style={{ fontSize: 8, color: t.textFaint }}>{pctOfTotal}% del total</div>}
                </div>
              </div>
            );
          })}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 45px 55px 55px 65px 80px', gap: 6, padding: '6px 6px', borderTop: `2px solid ${t.border}`, marginTop: 4 }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: t.heading }}>Total épicas activas</span>
            <span /><span /><span />
            <span style={{ textAlign: 'right', fontSize: 10, fontWeight: 700, color: t.textMuted }}>{eCosts.reduce((s, e) => s + e.hours, 0)}h</span>
            <span style={{ textAlign: 'right', fontSize: 12, fontWeight: 800, color: '#3b82f6' }}>{fmt(totalEpicCost)}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

            const activeSprints = cs.sprints || []; // [] = todos

            const toggleCustom = () => setTeam(p => p.map(x => x.id === m.id
              ? { ...x, customSizes: hasCustom ? null : { sizes: { ...config.sizes }, sprints: [] } }

            }));

            const selectAllSprints = () => setTeam(p => p.map(x => x.id === m.id
              ? { ...x, customSizes: { ...x.customSizes, sprints: [] } } : x));

            // Q2 pts: sum across sprints using per-sprint capacity
            const q2pts = Math.round(SPRINTS.reduce((sum, sp) => {
              const sz = hasCustom
                ? ((activeSprints.length === 0 || activeSprints.includes(sp.id)) ? effectiveSizes : config.sizes)

              return sum + sz.S * m.capMult;
            }, 0) * 10) / 10;

                    <span style={{ fontSize: 10, color: t.textFaint, width: 28 }}>{Math.round(m.capMult * 100)}%</span>
                  </div>
                  <input value={m.note} onChange={e => setTeam(p => p.map(x => x.id === m.id ? { ...x, note: e.target.value } : x))} placeholder="Nota..."
                    style={{ flex: 1, fontSize: 10, color: t.textMuted, background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 6px' }} />
                  <button onClick={toggleCustom} title={hasCustom ? 'Desactivar' : 'Activar capacidad personalizada'}
                    style={{ fontSize: 9, fontWeight: 700, padding: '3px 8px', borderRadius: 4, cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0,
                      background: hasCustom ? m.color + '22' : t.bgAlt,
                      border: `1px solid ${hasCustom ? m.color : t.border}`,
                      color: hasCustom ? m.color : t.textMuted }}>
                    {hasCustom ? `✦ Custom (${scopeLabel})` : '○ Global'}
                  </button>
                  <button onClick={() => { if (team.length > 1 && confirm(`¿Eliminar a ${m.name}?`)) setTeam(p => p.filter(x => x.id !== m.id)); }}
                    style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: 14, flexShrink: 0 }}>×</button>
                </div>

                {/* Ausencias por sprint — días exactos */}
                {(() => {
                  const abs = m.absences || [];
                  // Normalize legacy string entries to {sprintId, days: 10}
                  const normAbs = abs.map(a => typeof a === 'string' ? { sprintId: a, days: 10 } : a);
                  const getEntry = (spId) => normAbs.find(a => a.sprintId === spId) || null;
                  const totalAbsDays = normAbs.reduce((s, a) => s + (a.days || 0), 0);

                  const setDays = (spId, days) => setTeam(p => p.map(x => {
                    if (x.id !== m.id) return x;
                    const cur = (x.absences || []).map(a => typeof a === 'string' ? { sprintId: a, days: 10 } : a);
                    if (days <= 0) return { ...x, absences: cur.filter(a => a.sprintId !== spId) };
                    const exists = cur.find(a => a.sprintId === spId);
                    const next = exists
                      ? cur.map(a => a.sprintId === spId ? { ...a, days } : a)
                      : [...cur, { sprintId: spId, days }];
                    return { ...x, absences: next };
                  }));

                  return (
                    <div style={{ marginTop: 6, paddingTop: 6, borderTop: `1px solid ${t.border}22` }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5 }}>
                        <span style={{ fontSize: 9, color: t.textDim, fontWeight: 700 }}>🏖 Ausencias por sprint</span>
                        <span style={{ fontSize: 9, color: t.textFaint }}>(días exactos · 0 = presente · 10 = sprint completo)</span>
                        {totalAbsDays > 0 && <span style={{ fontSize: 9, color: '#ef4444', marginLeft: 'auto', fontWeight: 700 }}>−{totalAbsDays}d total</span>}
                      </div>
                      <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                        {SPRINTS.map(sp => {
                          const entry = getEntry(sp.id);
                          const days = entry ? entry.days : 0;
                          const isPartial = days > 0 && days < 10;
                          const isFull = days >= 10;
                          return (
                            <div key={sp.id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
                              background: isFull ? '#ef444418' : isPartial ? '#f59e0b18' : t.bgAlt,
                              border: `1px solid ${isFull ? '#ef444466' : isPartial ? '#f59e0b66' : t.border}`,
                              borderRadius: 5, padding: '4px 6px', minWidth: 46 }}>
                              <span style={{ fontSize: 9, fontWeight: 700, color: isFull ? '#ef4444' : isPartial ? '#f59e0b' : t.textDim }}>
                                {sp.label}{sp.current ? '★' : ''}
                              </span>
                              <input type="number" min="0" max="10" step="1" value={days}
                                onChange={e => setDays(sp.id, Math.min(10, Math.max(0, parseInt(e.target.value) || 0)))}
                                title={`Días ausente en ${sp.full} (0–10)`}
                                style={{ width: 34, fontSize: 11, fontWeight: 700, textAlign: 'center',
                                  color: isFull ? '#ef4444' : isPartial ? '#f59e0b' : t.textMuted,
                                  background: 'transparent', border: 'none', outline: 'none', padding: 0 }} />
                              <span style={{ fontSize: 8, color: t.textFaint }}>días</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}

                {/* Rows 2+: size inputs + sprint selector — only when custom is on */}
                {hasCustom && (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8, paddingTop: 8, borderTop: `1px solid ${t.border}` }}>
                    {/* Size inputs */}
                    <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
                      <span style={{ fontSize: 9, color: m.color, fontWeight: 700, width: 68, flexShrink: 0 }}>HUs/sprint:</span>
                      {SIZES.map(size => (
                        <div key={size} style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
                          <span style={{ fontSize: 10, fontWeight: 700, color: SIZE_COLORS[size], width: 14 }}>{size}</span>
                          <input type="number" min="1" max="99" value={effectiveSizes[size]}
                            onChange={e => updateCustomSize(size, e.target.value)}
                            style={{ width: 44, fontSize: 12, fontWeight: 700, color: t.text, background: t.bgAlt,
                              border: `1px solid ${SIZE_COLORS[size]}88`, borderRadius: 4, padding: '3px 6px', textAlign: 'center' }} />
                        </div>
                      ))}
                      <span style={{ fontSize: 9, color: t.textFaint, marginLeft: 4 }}>→ {q2pts} pts Q2</span>
                      <button onClick={() => setTeam(p => p.map(x => x.id === m.id ? { ...x, customSizes: { ...x.customSizes, sizes: { ...config.sizes } } } : x))}
                        style={{ fontSize: 9, background: 'none', border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '2px 6px', cursor: 'pointer', marginLeft: 'auto' }}>
                        Copiar global
                      </button>
                    </div>
                    {/* Sprint selector */}
                    <div style={{ display: 'flex', gap: 5, alignItems: 'center', flexWrap: 'wrap' }}>
                      <span style={{ fontSize: 9, color: m.color, fontWeight: 700, width: 68, flexShrink: 0 }}>Sprints:</span>
                      {/* "Todos" pill */}
                      <button onClick={selectAllSprints}
                        style={{ fontSize: 9, fontWeight: 700, padding: '2px 8px', borderRadius: 4, cursor: 'pointer',
                          background: allSelected ? m.color + '33' : t.bgAlt,
                          border: `1px solid ${allSelected ? m.color : t.border}`,
                          color: allSelected ? m.color : t.textMuted }}>
                        Todos
                      </button>
                      {SPRINTS.map(sp => {
                        const isOn = !allSelected && activeSprints.includes(sp.id);
                        return (
                          <button key={sp.id} onClick={() => toggleSprint(sp.id)}
                            style={{ fontSize: 9, fontWeight: 700, padding: '2px 8px', borderRadius: 4, cursor: 'pointer',
                              background: isOn ? m.color + '33' : t.bgAlt,
                              border: `1px solid ${isOn ? m.color : t.border}`,
                              color: isOn ? m.color : t.textMuted }}>
                            {sp.label}{sp.current ? ' ★' : ''}
                          </button>
                        );
                      })}
                      <span style={{ fontSize: 9, color: t.textFaint, marginLeft: 2 }}>
                        {allSelected ? 'aplica a todo Q2' : activeSprints.length === 0 ? '—' : `→ resto usa global`}
                      </span>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <button onClick={() => setTeam(p => [...p, { id: uid(), name: 'Nuevo miembro', color: '#94a3b8', since: '', capMult: 1.0, note: '', type: 'internal', monthlyCost: 0, hourlyRate: 0, customSizes: null, absences: [] }])}
          style={{ marginTop: 8, fontSize: 11, background: t.accent, border: 'none', borderRadius: 5, color: '#fff', padding: '5px 14px', cursor: 'pointer', fontWeight: 600 }}>
          + Añadir miembro
        </button>
      </div>

      {/* PM / Responsables no-dev */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, gridColumn: '1 / -1' }}>
        <Label>PM / Responsables no-dev</Label>
        <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 8 }}>
          Aparecen como owners en épicas e historias, pero <strong>no cuentan en los cálculos de capacidad</strong>.
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {(stakeholders || []).map(s => (
            <div key={s.id} style={{ display: 'flex', gap: 8, alignItems: 'center', background: t.bg, border: `1px solid ${t.border}`, borderRadius: 6, padding: '6px 10px' }}>
              <input type="color" value={s.color}
                onChange={e => setStakeholders(p => p.map(x => x.id === s.id ? { ...x, color: e.target.value } : x))}
                style={{ width: 22, height: 22, border: 'none', borderRadius: 4, cursor: 'pointer', padding: 0, flexShrink: 0 }} />
              <input value={s.name}
                onChange={e => setStakeholders(p => p.map(x => x.id === s.id ? { ...x, name: e.target.value } : x))}
                style={{ flex: 1, fontSize: 12, background: 'transparent', border: 'none', color: t.text, outline: 'none', fontFamily: 'inherit' }} />
              <span style={{ fontSize: 9, color: t.textFaint, background: s.color + '22', border: `1px solid ${s.color}44`, borderRadius: 10, padding: '1px 8px', fontWeight: 700 }}>no-dev</span>
              <button onClick={() => setStakeholders(p => p.filter(x => x.id !== s.id))}
                style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: 14, flexShrink: 0 }}>×</button>
            </div>
          ))}
        </div>
        <button onClick={() => setStakeholders(p => [...p, { id: uid(), name: 'Nuevo responsable', color: '#a855f7' }])}
          style={{ marginTop: 8, fontSize: 11, background: t.accent, border: 'none', borderRadius: 5, color: '#fff', padding: '5px 14px', cursor: 'pointer', fontWeight: 600 }}>
          + Añadir responsable
        </button>
      </div>

      {/* Demo mode — spans both columns */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, gridColumn: '1 / -1' }}>
        <Label>Modo Demo (grabación de pantalla)</Label>
        <div style={{ fontSize: 11, color: t.textMuted, marginBottom: 10 }}>
          Oculta datos sensibles para capturas o vídeos de demo.
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {[
            { value: 'off',     label: '⏹ Desactivado',       bg: t.bgDeep,  border: t.border },
            { value: 'replace', label: '🎭 Datos genéricos',   bg: '#4c1d95', border: '#7c3aed' },
            { value: 'blur',    label: '🫧 Blur',              bg: '#0c4a6e', border: '#0369a1' },
          ].map(opt => (
            <button key={opt.value} onClick={() => setDemoMode(opt.value)}
              style={{ fontSize: 11, fontWeight: 700, padding: '7px 14px', borderRadius: 6, cursor: 'pointer',
                background: demoMode === opt.value ? opt.bg : t.bgDeep,
                border: `2px solid ${demoMode === opt.value ? opt.border : t.border}`,
                color: demoMode === opt.value ? '#fff' : t.textMuted,
                transition: 'all 0.15s' }}>
              {opt.label}
            </button>
          ))}
        </div>
        {demoMode !== 'off' && (
          <div style={{ fontSize: 10, color: '#f59e0b', fontWeight: 600, marginTop: 8 }}>
            {demoMode === 'replace' ? '⚠ Mostrando datos genéricos — los datos reales no se modifican' : '⚠ Blur activo — pasa el cursor sobre texto para verlo'}
          </div>
        )}
      </div>

      {/* Carlo view label — spans both columns */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, gridColumn: '1 / -1' }}>
        <Label>Nombre del botón de presentación (pestaña Semanal)</Label>
        <div style={{ fontSize: 11, color: t.textMuted, marginBottom: 8 }}>
          Personaliza el nombre del botón de vista de presentación en la pestaña Semanal.
        </div>
        <input
          type="text"
          value={config.carloViewLabel || 'Vista de Stakeholder'}
          onChange={e => setConfig(p => ({ ...p, carloViewLabel: e.target.value }))}
          placeholder="Vista de Carlo"
          style={{ fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, padding: '6px 10px', width: 280, outline: 'none' }}
        />
      </div>

      {/* Export/Import — spans both columns */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, gridColumn: '1 / -1' }}>
        <Label>Persistencia</Label>
        <div style={{ fontSize: 11, color: '#22c55e', marginBottom: 8 }}>✓ Auto-guardado activo — todo (épicas, equipo, costos, OKRs) se guarda automáticamente en este navegador.</div>
        <div style={{ fontSize: 11, color: t.textMuted, marginBottom: 10 }}>Exporta a JSON para hacer backup o compartir con otro dispositivo.</div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <button onClick={exportState} style={{ fontSize: 11, background: '#22c55e', border: 'none', borderRadius: 5, color: '#fff', padding: '6px 14px', cursor: 'pointer', fontWeight: 600 }}>
            ⬇ Exportar JSON
          </button>
          <button onClick={() => fileRef.current?.click()} style={{ fontSize: 11, background: t.accent, border: 'none', borderRadius: 5, color: '#fff', padding: '6px 14px', cursor: 'pointer', fontWeight: 600 }}>
            ⬆ Importar JSON
          </button>
          <button onClick={resetToDefaults} style={{ fontSize: 11, background: 'transparent', border: `1px solid #ef4444`, borderRadius: 5, color: '#ef4444', padding: '6px 14px', cursor: 'pointer', fontWeight: 600 }}>
            🗑 Resetear todo
          </button>
          <input ref={fileRef} type="file" accept=".json" style={{ display: 'none' }} onChange={e => { if (e.target.files[0]) importState(e.target.files[0]); e.target.value = ''; }} />
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// OKRs / KPIs TAB
// ═══════════════════════════════════════════════════════════════════════════════
function OKRsTab({ okrs, setOkrs, epics, team }) {
  const t = useTheme();
  const [editObjId, setEditObjId] = useState(null);
  const [editKrId, setEditKrId] = useState(null);

  const addObjective = () => setOkrs(p => [...p, { id: uid(), title: 'Nuevo objetivo', description: '', keyResults: [] }]);
  const delObjective = id => setOkrs(p => p.filter(o => o.id !== id));
  const updObj = (id, u) => setOkrs(p => p.map(o => o.id === id ? { ...o, ...u } : o));
  const addKR = (oid) => setOkrs(p => p.map(o => o.id === oid ? { ...o, keyResults: [...o.keyResults, { id: uid(), title: 'Nuevo key result', target: 1, current: 0, unit: 'feature', epicId: '', owner: '', status: 'pending' }] } : o));
  const delKR = (oid, kid) => setOkrs(p => p.map(o => o.id === oid ? { ...o, keyResults: o.keyResults.filter(k => k.id !== kid) } : o));
  const updKR = (oid, kid, u) => setOkrs(p => p.map(o => o.id === oid ? { ...o, keyResults: o.keyResults.map(k => k.id === kid ? { ...k, ...u } : k) } : o));

  // Overall completion across all KRs
  const allKRs = okrs.flatMap(o => o.keyResults);
  const doneKRs = allKRs.filter(k => k.status === 'done').length;
  const onTrackKRs = allKRs.filter(k => k.status === 'on-track').length;
  const atRiskKRs = allKRs.filter(k => k.status === 'at-risk').length;

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 4 }}>
        <div>
          <h2 style={{ fontSize: 15, fontWeight: 700, color: t.heading }}>OKRs · Q2 2026</h2>
          <div style={{ fontSize: 11, color: t.textMuted, marginTop: 2 }}>Objetivos y Key Results del quarter. Vincula cada KR con una épica del backlog.</div>
        </div>
        <button onClick={addObjective} style={{ fontSize: 11, background: t.accent, border: 'none', borderRadius: 5, color: '#fff', padding: '6px 14px', cursor: 'pointer', fontWeight: 600, flexShrink: 0 }}>+ Objetivo</button>
      </div>

      {/* Summary bar */}
      {allKRs.length > 0 && (
        <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: '8px 14px', marginBottom: 16, display: 'flex', gap: 16, alignItems: 'center', flexWrap: 'wrap' }}>
          <span style={{ fontSize: 10, color: t.textFaint }}>KEY RESULTS ({allKRs.length} total)</span>
          <div style={{ display: 'flex', gap: 10, fontSize: 10 }}>
            <span style={{ color: '#3b82f6', fontWeight: 700 }}>✓ {doneKRs} completados</span>
            <span style={{ color: '#22c55e', fontWeight: 700 }}>↗ {onTrackKRs} en curso</span>
            <span style={{ color: '#f59e0b', fontWeight: 700 }}>⚠ {atRiskKRs} en riesgo</span>
          </div>
        </div>
      )}

      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        {okrs.map((obj, oi) => {
          const objDone = obj.keyResults.filter(k => k.status === 'done').length;
          const objTotal = obj.keyResults.length;
          const objPct = objTotal > 0 ? Math.round((objDone / objTotal) * 100) : 0;
          return (
            <div key={obj.id} style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 10, overflow: 'hidden' }}>
              {/* Objective header */}
              <div style={{ padding: '10px 14px', background: t.bgDeep, borderBottom: `1px solid ${t.border}` }}>
                <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                  <div style={{ width: 22, height: 22, borderRadius: 6, background: t.accent, color: '#fff', fontSize: 11, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>O{oi + 1}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    {editObjId === obj.id ? (
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                        <input value={obj.title} onChange={e => updObj(obj.id, { title: e.target.value })} autoFocus
                          style={{ fontSize: 13, fontWeight: 700, color: t.text, background: t.bgAlt, border: `1px solid ${t.accent}`, borderRadius: 4, padding: '3px 7px', width: '100%' }} />
                        <input value={obj.description} onChange={e => updObj(obj.id, { description: e.target.value })} placeholder="Descripción del objetivo..."
                          style={{ fontSize: 11, color: t.textMuted, background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 7px', width: '100%' }} />
                        <button onClick={() => setEditObjId(null)} style={{ alignSelf: 'flex-end', fontSize: 10, background: t.accent, border: 'none', borderRadius: 3, color: '#fff', padding: '2px 10px', cursor: 'pointer' }}>OK</button>
                      </div>
                    ) : (
                      <div onDoubleClick={() => setEditObjId(obj.id)}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: t.heading }}>{obj.title}</div>
                        {obj.description && <div style={{ fontSize: 10, color: t.textMuted, marginTop: 2 }}>{obj.description}</div>}
                      </div>
                    )}
                  </div>
                  <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexShrink: 0 }}>
                    {objTotal > 0 && (
                      <div style={{ textAlign: 'right' }}>
                        <div style={{ fontSize: 16, fontWeight: 800, color: objPct === 100 ? '#22c55e' : t.heading }}>{objPct}%</div>
                        <div style={{ fontSize: 8, color: t.textDim }}>{objDone}/{objTotal} KR</div>
                      </div>
                    )}
                    <button onClick={() => setEditObjId(editObjId === obj.id ? null : obj.id)} style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 13 }}>✎</button>
                    <button onClick={() => { if (confirm(`¿Eliminar objetivo "${obj.title}"?`)) delObjective(obj.id); }} style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: 15 }}>×</button>
                  </div>
                </div>
                {objTotal > 0 && (
                  <div style={{ marginTop: 6, height: 4, background: t.bg, borderRadius: 2, overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${objPct}%`, background: '#3b82f6', borderRadius: 2 }} />
                  </div>
                )}
              </div>

              {/* Key Results */}
              <div style={{ padding: '8px 14px', display: 'flex', flexDirection: 'column', gap: 6 }}>
                {obj.keyResults.length === 0 && (
                  <div style={{ fontSize: 11, color: t.textDim, fontStyle: 'italic', padding: '6px 0' }}>Sin key results. Añade uno para este objetivo.</div>
                )}
                {obj.keyResults.map((kr, ki) => {
                  const krs = KR_STATUSES.find(s => s.id === kr.status) || KR_STATUSES[0];
                  const pct = kr.target > 0 ? Math.min(100, Math.round((kr.current / kr.target) * 100)) : 0;
                  const linkedEpic = epics.find(e => e.id === kr.epicId);
                  const linkedOwner = team.find(m => m.id === kr.owner);
                  return (
                    <div key={kr.id} style={{ background: t.bg, border: `1px solid ${t.border}`, borderRadius: 6, padding: '8px 10px' }}>
                      {editKrId === kr.id ? (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                          <input value={kr.title} onChange={e => updKR(obj.id, kr.id, { title: e.target.value })} autoFocus placeholder="Título del KR..."
                            style={{ fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.accent}`, borderRadius: 4, padding: '4px 7px', width: '100%' }} />
                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr 1fr', gap: 5 }}>
                            <div>
                              <Label>Actual</Label>
                              <input type="number" value={kr.current} onChange={e => updKR(obj.id, kr.id, { current: parseFloat(e.target.value) || 0 })}
                                style={{ width: '100%', fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 5px' }} />
                            </div>
                            <div>
                              <Label>Target</Label>
                              <input type="number" value={kr.target} onChange={e => updKR(obj.id, kr.id, { target: parseFloat(e.target.value) || 1 })}
                                style={{ width: '100%', fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 5px' }} />
                            </div>
                            <div>
                              <Label>Unidad</Label>
                              <input value={kr.unit} onChange={e => updKR(obj.id, kr.id, { unit: e.target.value })} placeholder="feature, %, #..."
                                style={{ width: '100%', fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 5px' }} />
                            </div>
                            <div>
                              <Label>Estado</Label>
                              <select value={kr.status} onChange={e => updKR(obj.id, kr.id, { status: e.target.value })}
                                style={{ width: '100%', fontSize: 10, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 4px' }}>
                                {KR_STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                              </select>
                            </div>
                            <div>
                              <Label>Owner</Label>
                              <select value={kr.owner} onChange={e => updKR(obj.id, kr.id, { owner: e.target.value })}
                                style={{ width: '100%', fontSize: 10, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 4px' }}>
                                <option value="">—</option>
                                {team.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                              </select>
                            </div>
                          </div>
                          <div>
                            <Label>Épica vinculada</Label>
                            <select value={kr.epicId} onChange={e => updKR(obj.id, kr.id, { epicId: e.target.value })}
                              style={{ width: '100%', fontSize: 11, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '4px 6px' }}>
                              <option value="">Sin épica vinculada</option>
                              {epics.filter(e => e.status !== 'deferred').map(e => <option key={e.id} value={e.id}>{e.label}</option>)}
                            </select>
                          </div>
                          <button onClick={() => setEditKrId(null)} style={{ alignSelf: 'flex-end', fontSize: 10, background: t.accent, border: 'none', borderRadius: 3, color: '#fff', padding: '3px 12px', cursor: 'pointer' }}>OK</button>
                        </div>
                      ) : (
                        <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                          <div style={{ width: 18, height: 18, borderRadius: 4, background: krs.color + '22', border: `1px solid ${krs.color}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 8, fontWeight: 800, color: krs.color, flexShrink: 0 }}>KR</div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 11, fontWeight: 600, color: t.text, marginBottom: 4 }}>{kr.title}</div>
                            <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: 4 }}>
                              <div style={{ flex: 1, height: 5, background: t.border, borderRadius: 2, overflow: 'hidden' }}>
                                <div style={{ height: '100%', width: `${pct}%`, background: krs.color, borderRadius: 2, transition: 'width 0.3s' }} />
                              </div>
                              <span style={{ fontSize: 10, fontWeight: 700, color: krs.color, minWidth: 30 }}>{pct}%</span>
                            </div>
                            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', fontSize: 9, color: t.textFaint }}>
                              <span>{kr.current} / {kr.target} {kr.unit}</span>
                              <span style={{ color: krs.color, fontWeight: 600 }}>● {krs.label}</span>
                              {linkedOwner && <span>👤 {linkedOwner.name}</span>}
                              {linkedEpic && <span style={{ color: '#3b82f6' }}>🔗 {linkedEpic.label}</span>}
                            </div>
                          </div>
                          <div style={{ display: 'flex', gap: 2, flexShrink: 0 }}>
                            <button onClick={() => setEditKrId(kr.id)} style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 11 }}>✎</button>
                            <button onClick={() => delKR(obj.id, kr.id)} style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 14 }}>×</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                <button onClick={() => addKR(obj.id)} style={{ fontSize: 10, background: 'transparent', border: `1px dashed ${t.border}`, borderRadius: 5, color: t.textMuted, padding: '5px 10px', cursor: 'pointer', marginTop: 2 }}>
                  + Key Result
                </button>
              </div>
            </div>
          );
        })}

        {okrs.length === 0 && (
          <div style={{ textAlign: 'center', padding: 40, color: t.textDim }}>
            <div style={{ fontSize: 24, marginBottom: 8 }}>🎯</div>
            <div style={{ fontSize: 13, fontWeight: 600 }}>Sin objetivos definidos</div>
            <div style={{ fontSize: 11, marginTop: 4 }}>Añade el primer objetivo Q2 para empezar a medir el progreso del quarter.</div>
          </div>
        )}
      </div>
    </div>
  );
}
