            <span>Épica</span><span style={{ textAlign: 'center' }}>Talla</span><span style={{ textAlign: 'center' }}>Conf.</span><span style={{ textAlign: 'center' }}>HUs</span><span style={{ textAlign: 'right' }}>Horas</span><span style={{ textAlign: 'right' }}>Costo est.</span>
          </div>
          {eCosts.map((ec, i) => {
            const pctOfTotal = totalEpicCost > 0 ? Math.round((ec.cost / totalEpicCost) * 100) : 0;
            return (
              <div key={ec.id} style={{ display: 'grid', gridTemplateColumns: '1fr 45px 55px 55px 65px 80px', gap: 6, padding: '5px 6px', background: i % 2 === 0 ? t.bg : 'transparent', borderRadius: 4, alignItems: 'center' }}>
                <span style={{ fontSize: 11, fontWeight: 600, color: t.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{ec.label}</span>
                <span style={{ textAlign: 'center' }}><SizeBadge size={ec.size} small /></span>
                <span style={{ textAlign: 'center', fontSize: 10, fontWeight: 700, color: confColor(ec.confidence) }}>{ec.confidence}%</span>
                <span style={{ textAlign: 'center', fontSize: 10, color: t.textMuted }}>{ec.stories}</span>
                <span style={{ textAlign: 'right', fontSize: 10, color: t.textMuted }}>{ec.hours}h</span>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: ec.cost > 0 ? t.heading : t.textDim }}>{fmt(ec.cost)}</div>
                  {ec.cost > 0 && <div style={{ fontSize: 8, color: t.textFaint }}>{pctOfTotal}% del total</div>}
                </div>
              </div>
            );
          })}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 45px 55px 55px 65px 80px', gap: 6, padding: '6px 6px', borderTop: `2px solid ${t.border}`, marginTop: 4 }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: t.heading }}>Total épicas activas</span>
            <span /><span /><span />
            <span style={{ textAlign: 'right', fontSize: 10, fontWeight: 700, color: t.textMuted }}>{eCosts.reduce((s, e) => s + e.hours, 0)}h</span>
            <span style={{ textAlign: 'right', fontSize: 12, fontWeight: 800, color: '#3b82f6' }}>{fmt(totalEpicCost)}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// CONFIG PANEL
// ═══════════════════════════════════════════════════════════════════════════════
function ConfigPanel({ config, setConfig, team, setTeam, exportState, importState, resetToDefaults, demoMode, setDemoMode }) {
  const t = useTheme();
  const fileRef = useRef(null);

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, alignItems: 'start' }}>
      <div style={{ gridColumn: '1 / -1', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <h2 style={{ fontSize: 15, fontWeight: 700, color: t.heading }}>Configuración</h2>
      </div>

      {/* Buffer */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
        <Label>Buffer para imprevistos</Label>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <input type="range" min="0" max="40" value={config.bufferPct} onChange={e => setConfig(p => ({ ...p, bufferPct: parseInt(e.target.value) }))} style={{ flex: 1 }} />
          <span style={{ fontSize: 13, fontWeight: 700, color: t.heading, width: 45, textAlign: 'right' }}>{config.bufferPct}%</span>
        </div>
      </div>

      {/* Sizes */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
        <Label>Capacidad por talla (HUs por dev al 100% por sprint)</Label>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
          {SIZES.map(s => (
            <div key={s} style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 12, fontWeight: 800, color: SIZE_COLORS[s], marginBottom: 4 }}>{s}</div>
              <input type="number" min="1" value={config.sizes[s]}
                onChange={e => setConfig(p => ({ ...p, sizes: { ...p.sizes, [s]: Math.max(1, parseInt(e.target.value) || 1) } }))}
                style={{ width: '100%', textAlign: 'center', fontSize: 14, fontWeight: 700, color: t.heading, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, padding: '6px' }} />
              <div style={{ fontSize: 9, color: t.textDim, marginTop: 2 }}>HU/dev/sprint</div>
            </div>
          ))}
        </div>
      </div>

      {/* Column names */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
        <Label>Nombres de columnas Kanban</Label>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {[{ key: 'confirmed', color: '#3b82f6' }, { key: 'deferred', color: '#374151' }].map(({ key, color }) => (
            <div key={key} style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <div style={{ width: 10, height: 10, borderRadius: 2, background: color, flexShrink: 0 }} />
              <input value={config.columnNames[key]} onChange={e => setConfig(p => ({ ...p, columnNames: { ...p.columnNames, [key]: e.target.value } }))}
                style={{ flex: 1, fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, padding: '5px 8px' }} />
            </div>
          ))}
        </div>
      </div>

      {/* Visible tabs */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
        <Label>Pestañas visibles</Label>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {[
            { id: 'epicas',    label: '🗺️ Épicas Q2' },
            { id: 'capacidad', label: '📊 Capacidad' },
            { id: 'timeline',  label: '📅 Timeline' },
            { id: 'okrs',      label: '🎯 OKRs' },
            { id: 'semanal',   label: '📋 Semanal' },
            { id: 'revenue',   label: '📈 Revenue' },
            { id: 'metas',     label: '🏆 Metas' },
          ].map(tb => {
            const hidden = (config.hiddenTabs || []).includes(tb.id);
            return (
              <label key={tb.id} style={{ display: 'flex', gap: 6, alignItems: 'center', fontSize: 12, color: t.text, cursor: 'pointer' }}>
                <input type="checkbox" checked={!hidden}
                  onChange={() => setConfig(p => {
                    const current = p.hiddenTabs || [];
                    const next = hidden ? current.filter(id => id !== tb.id) : [...current, tb.id];
                    return { ...p, hiddenTabs: next };
                  })} />
                {tb.label}
              </label>
            );
          })}
        </div>
      </div>

      {/* Privacidad */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
        <Label>Privacidad</Label>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          <label style={{ display: 'flex', gap: 6, alignItems: 'flex-start', fontSize: 12, color: t.text, cursor: 'pointer' }}>
            <input type="checkbox" style={{ marginTop: 2 }}
              checked={config.showLogros || false}
              onChange={e => setConfig(p => ({ ...p, showLogros: e.target.checked }))} />
            <span>
              Mostrar sección <strong>🏅 Logros</strong> en la pestaña Metas
              <span style={{ display: 'block', fontSize: 10, color: t.textDim, marginTop: 1 }}>Desactivado por defecto. Útil cuando compartes pantalla y no quieres que sea visible.</span>
            </span>
          </label>
        </div>
      </div>

      {/* Timeline */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
        <Label>Opciones de Timeline</Label>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          <label style={{ display: 'flex', gap: 6, alignItems: 'center', fontSize: 12, color: t.text, cursor: 'pointer' }}>
            <input type="checkbox" checked={config.showDeps} onChange={e => setConfig(p => ({ ...p, showDeps: e.target.checked }))} />
            Mostrar líneas de dependencia
          </label>
          <label style={{ display: 'flex', gap: 6, alignItems: 'center', fontSize: 12, color: t.text, cursor: 'pointer' }}>
            <input type="checkbox" checked={config.showStories} onChange={e => setConfig(p => ({ ...p, showStories: e.target.checked }))} />
            Permitir expandir HUs
          </label>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginTop: 2 }}>
            <span style={{ fontSize: 12, color: t.text, whiteSpace: 'nowrap' }}>Altura de filas:</span>
            <input type="range" min="28" max="72" step="4" value={config.epicRowH || 40}
              onChange={e => setConfig(p => ({ ...p, epicRowH: parseInt(e.target.value) }))}
              style={{ flex: 1 }} />
            <span style={{ fontSize: 12, fontWeight: 700, color: t.heading, width: 36, textAlign: 'right' }}>{config.epicRowH || 40}px</span>
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <span style={{ fontSize: 12, color: t.text, whiteSpace: 'nowrap' }}>Tamaño texto épicas:</span>
            <input type="range" min="9" max="18" step="1" value={config.epicLabelSize || 12}
              onChange={e => setConfig(p => ({ ...p, epicLabelSize: parseInt(e.target.value) }))}
              style={{ flex: 1 }} />
            <span style={{ fontSize: 12, fontWeight: 700, color: t.heading, width: 36, textAlign: 'right' }}>{config.epicLabelSize || 12}px</span>
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <span style={{ fontSize: 12, color: t.text, whiteSpace: 'nowrap' }}>Color dependencias:</span>
            <input type="color" value={config.depColor || '#f59e0b'}
              onChange={e => setConfig(p => ({ ...p, depColor: e.target.value }))}
              style={{ width: 36, height: 28, border: 'none', borderRadius: 4, cursor: 'pointer', padding: 0, background: 'none' }} />
            <span style={{ fontSize: 11, color: t.textMuted, fontFamily: 'monospace' }}>{config.depColor || '#f59e0b'}</span>
            <button onClick={() => setConfig(p => ({ ...p, depColor: '#f59e0b' }))}
              style={{ fontSize: 10, background: 'none', border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '3px 8px', cursor: 'pointer' }}>
              Reset
            </button>
          </div>
        </div>
      </div>

      {/* Team management — spans both columns */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, gridColumn: '1 / -1' }}>
        <Label>Equipo de desarrollo</Label>
        <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 8 }}>
          Activa "Cap. propia" por miembro para definir cuántas HUs por sprint puede completar independientemente de la tabla global.
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {team.map(m => {
            const hasCustom = !!m.customSizes;
            const cs = m.customSizes || { sizes: config.sizes, sprints: [] };
            const effectiveSizes = cs.sizes;
            const activeSprints = cs.sprints || []; // [] = todos

            const toggleCustom = () => setTeam(p => p.map(x => x.id === m.id
              ? { ...x, customSizes: hasCustom ? null : { sizes: { ...config.sizes }, sprints: [] } }
              : x));

            const updateCustomSize = (size, val) => setTeam(p => p.map(x => x.id === m.id
              ? { ...x, customSizes: { ...x.customSizes, sizes: { ...x.customSizes.sizes, [size]: Math.max(1, parseInt(val) || 1) } } }
              : x));

            const toggleSprint = (spId) => setTeam(p => p.map(x => {
              if (x.id !== m.id) return x;
              const cur = x.customSizes.sprints || [];
              const next = cur.includes(spId) ? cur.filter(s => s !== spId) : [...cur, spId];
              return { ...x, customSizes: { ...x.customSizes, sprints: next } };
            }));

            const selectAllSprints = () => setTeam(p => p.map(x => x.id === m.id
              ? { ...x, customSizes: { ...x.customSizes, sprints: [] } } : x));

            // Q2 pts: sum across sprints using per-sprint capacity
            const q2pts = Math.round(SPRINTS.reduce((sum, sp) => {
              const sz = hasCustom
                ? ((activeSprints.length === 0 || activeSprints.includes(sp.id)) ? effectiveSizes : config.sizes)
                : config.sizes;
              return sum + sz.S * m.capMult;
            }, 0) * 10) / 10;

            const allSelected = activeSprints.length === 0;
            const scopeLabel = allSelected
              ? 'todos los sprints'
              : `${activeSprints.length} sprint${activeSprints.length > 1 ? 's' : ''}`;

            return (
              <div key={m.id} style={{ background: t.bgDeep, border: `1px solid ${hasCustom ? m.color + '66' : t.border}`, borderRadius: 7, padding: '8px 10px' }}>
                {/* Row 1: color, name, capMult, note, toggle, delete */}
                <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: hasCustom ? 8 : 0 }}>
                  <input type="color" value={m.color} onChange={e => setTeam(p => p.map(x => x.id === m.id ? { ...x, color: e.target.value } : x))}
                    style={{ width: 22, height: 22, border: 'none', borderRadius: 4, cursor: 'pointer', padding: 0, flexShrink: 0 }} />
                  <input value={m.name} onChange={e => setTeam(p => p.map(x => x.id === m.id ? { ...x, name: e.target.value } : x))}
                    style={{ width: 130, fontSize: 12, color: t.text, background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 6px' }} />
                  <div style={{ display: 'flex', gap: 2, alignItems: 'center' }}>
                    <input type="range" min="10" max="100" step="10" value={Math.round(m.capMult * 100)}
                      onChange={e => setTeam(p => p.map(x => x.id === m.id ? { ...x, capMult: parseInt(e.target.value) / 100 } : x))}
                      style={{ width: 60 }} />
                    <span style={{ fontSize: 10, color: t.textFaint, width: 28 }}>{Math.round(m.capMult * 100)}%</span>
                  </div>
                  <input value={m.note} onChange={e => setTeam(p => p.map(x => x.id === m.id ? { ...x, note: e.target.value } : x))} placeholder="Nota..."
                    style={{ flex: 1, fontSize: 10, color: t.textMuted, background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 6px' }} />
                  <button onClick={toggleCustom} title={hasCustom ? 'Desactivar' : 'Activar capacidad personalizada'}
                    style={{ fontSize: 9, fontWeight: 700, padding: '3px 8px', borderRadius: 4, cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0,
                      background: hasCustom ? m.color + '22' : t.bgAlt,
                      border: `1px solid ${hasCustom ? m.color : t.border}`,
                      color: hasCustom ? m.color : t.textMuted }}>
                    {hasCustom ? `✦ Custom (${scopeLabel})` : '○ Global'}
                  </button>
                  <button onClick={() => { if (team.length > 1 && confirm(`¿Eliminar a ${m.name}?`)) setTeam(p => p.filter(x => x.id !== m.id)); }}
                    style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: 14, flexShrink: 0 }}>×</button>
                </div>

                {/* Rows 2+: size inputs + sprint selector — only when custom is on */}
                {hasCustom && (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8, paddingTop: 8, borderTop: `1px solid ${t.border}` }}>
                    {/* Size inputs */}
                    <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
                      <span style={{ fontSize: 9, color: m.color, fontWeight: 700, width: 68, flexShrink: 0 }}>HUs/sprint:</span>
                      {SIZES.map(size => (
                        <div key={size} style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
                          <span style={{ fontSize: 10, fontWeight: 700, color: SIZE_COLORS[size], width: 14 }}>{size}</span>
                          <input type="number" min="1" max="99" value={effectiveSizes[size]}
                            onChange={e => updateCustomSize(size, e.target.value)}
                            style={{ width: 44, fontSize: 12, fontWeight: 700, color: t.text, background: t.bgAlt,
                              border: `1px solid ${SIZE_COLORS[size]}88`, borderRadius: 4, padding: '3px 6px', textAlign: 'center' }} />
                        </div>
                      ))}
                      <span style={{ fontSize: 9, color: t.textFaint, marginLeft: 4 }}>→ {q2pts} pts Q2</span>
                      <button onClick={() => setTeam(p => p.map(x => x.id === m.id ? { ...x, customSizes: { ...x.customSizes, sizes: { ...config.sizes } } } : x))}
                        style={{ fontSize: 9, background: 'none', border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '2px 6px', cursor: 'pointer', marginLeft: 'auto' }}>
                        Copiar global
                      </button>
                    </div>
                    {/* Sprint selector */}
                    <div style={{ display: 'flex', gap: 5, alignItems: 'center', flexWrap: 'wrap' }}>
                      <span style={{ fontSize: 9, color: m.color, fontWeight: 700, width: 68, flexShrink: 0 }}>Sprints:</span>
                      {/* "Todos" pill */}
                      <button onClick={selectAllSprints}
                        style={{ fontSize: 9, fontWeight: 700, padding: '2px 8px', borderRadius: 4, cursor: 'pointer',
                          background: allSelected ? m.color + '33' : t.bgAlt,
                          border: `1px solid ${allSelected ? m.color : t.border}`,
                          color: allSelected ? m.color : t.textMuted }}>
                        Todos
                      </button>
                      {SPRINTS.map(sp => {
                        const isOn = !allSelected && activeSprints.includes(sp.id);
                        return (
                          <button key={sp.id} onClick={() => toggleSprint(sp.id)}
                            style={{ fontSize: 9, fontWeight: 700, padding: '2px 8px', borderRadius: 4, cursor: 'pointer',
                              background: isOn ? m.color + '33' : t.bgAlt,
                              border: `1px solid ${isOn ? m.color : t.border}`,
                              color: isOn ? m.color : t.textMuted }}>
                            {sp.label}{sp.current ? ' ★' : ''}
                          </button>
                        );
                      })}
                      <span style={{ fontSize: 9, color: t.textFaint, marginLeft: 2 }}>
                        {allSelected ? 'aplica a todo Q2' : activeSprints.length === 0 ? '—' : `→ resto usa global`}
                      </span>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <button onClick={() => setTeam(p => [...p, { id: uid(), name: 'Nuevo miembro', color: '#94a3b8', since: '', capMult: 1.0, note: '', type: 'internal', monthlyCost: 0, hourlyRate: 0, customSizes: null }])}
          style={{ marginTop: 8, fontSize: 11, background: t.accent, border: 'none', borderRadius: 5, color: '#fff', padding: '5px 14px', cursor: 'pointer', fontWeight: 600 }}>
          + Añadir miembro
        </button>
      </div>

      {/* Demo mode — spans both columns */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, gridColumn: '1 / -1' }}>
        <Label>Modo Demo (grabación de pantalla)</Label>
        <div style={{ fontSize: 11, color: t.textMuted, marginBottom: 10 }}>
          Oculta datos sensibles de Giunti para capturas o vídeos de demo.
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {[
            { value: 'off',     label: '⏹ Desactivado',       bg: t.bgDeep,  border: t.border },
            { value: 'replace', label: '🎭 Datos genéricos',   bg: '#4c1d95', border: '#7c3aed' },
            { value: 'blur',    label: '🫧 Blur',              bg: '#0c4a6e', border: '#0369a1' },
          ].map(opt => (
            <button key={opt.value} onClick={() => setDemoMode(opt.value)}
              style={{ fontSize: 11, fontWeight: 700, padding: '7px 14px', borderRadius: 6, cursor: 'pointer',
                background: demoMode === opt.value ? opt.bg : t.bgDeep,
                border: `2px solid ${demoMode === opt.value ? opt.border : t.border}`,
                color: demoMode === opt.value ? '#fff' : t.textMuted,
                transition: 'all 0.15s' }}>
              {opt.label}
            </button>
          ))}
        </div>
        {demoMode !== 'off' && (
          <div style={{ fontSize: 10, color: '#f59e0b', fontWeight: 600, marginTop: 8 }}>
            {demoMode === 'replace' ? '⚠ Mostrando datos genéricos — los datos reales no se modifican' : '⚠ Blur activo — pasa el cursor sobre texto para verlo'}
          </div>
        )}
      </div>

      {/* Export/Import — spans both columns */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, gridColumn: '1 / -1' }}>
        <Label>Persistencia</Label>
        <div style={{ fontSize: 11, color: '#22c55e', marginBottom: 8 }}>✓ Auto-guardado activo — todo (épicas, equipo, costos, OKRs) se guarda automáticamente en este navegador.</div>
        <div style={{ fontSize: 11, color: t.textMuted, marginBottom: 10 }}>Exporta a JSON para hacer backup o compartir con otro dispositivo.</div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <button onClick={exportState} style={{ fontSize: 11, background: '#22c55e', border: 'none', borderRadius: 5, color: '#fff', padding: '6px 14px', cursor: 'pointer', fontWeight: 600 }}>
            ⬇ Exportar JSON
          </button>
          <button onClick={() => fileRef.current?.click()} style={{ fontSize: 11, background: t.accent, border: 'none', borderRadius: 5, color: '#fff', padding: '6px 14px', cursor: 'pointer', fontWeight: 600 }}>
            ⬆ Importar JSON
          </button>
          <button onClick={resetToDefaults} style={{ fontSize: 11, background: 'transparent', border: `1px solid #ef4444`, borderRadius: 5, color: '#ef4444', padding: '6px 14px', cursor: 'pointer', fontWeight: 600 }}>
            🗑 Resetear todo
          </button>
          <input ref={fileRef} type="file" accept=".json" style={{ display: 'none' }} onChange={e => { if (e.target.files[0]) importState(e.target.files[0]); e.target.value = ''; }} />
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// OKRs / KPIs TAB
// ═══════════════════════════════════════════════════════════════════════════════
function OKRsTab({ okrs, setOkrs, epics, team }) {
  const t = useTheme();
  const [editObjId, setEditObjId] = useState(null);
  const [editKrId, setEditKrId] = useState(null);

  const addObjective = () => setOkrs(p => [...p, { id: uid(), title: 'Nuevo objetivo', description: '', keyResults: [] }]);
  const delObjective = id => setOkrs(p => p.filter(o => o.id !== id));
  const updObj = (id, u) => setOkrs(p => p.map(o => o.id === id ? { ...o, ...u } : o));
  const addKR = (oid) => setOkrs(p => p.map(o => o.id === oid ? { ...o, keyResults: [...o.keyResults, { id: uid(), title: 'Nuevo key result', target: 1, current: 0, unit: 'feature', epicId: '', owner: '', status: 'pending' }] } : o));
  const delKR = (oid, kid) => setOkrs(p => p.map(o => o.id === oid ? { ...o, keyResults: o.keyResults.filter(k => k.id !== kid) } : o));
  const updKR = (oid, kid, u) => setOkrs(p => p.map(o => o.id === oid ? { ...o, keyResults: o.keyResults.map(k => k.id === kid ? { ...k, ...u } : k) } : o));

  // Overall completion across all KRs
  const allKRs = okrs.flatMap(o => o.keyResults);
  const doneKRs = allKRs.filter(k => k.status === 'done').length;
  const onTrackKRs = allKRs.filter(k => k.status === 'on-track').length;
  const atRiskKRs = allKRs.filter(k => k.status === 'at-risk').length;

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 4 }}>
        <div>
          <h2 style={{ fontSize: 15, fontWeight: 700, color: t.heading }}>OKRs · Q2 2026</h2>
          <div style={{ fontSize: 11, color: t.textMuted, marginTop: 2 }}>Objetivos y Key Results del quarter. Vincula cada KR con una épica del backlog.</div>
        </div>
        <button onClick={addObjective} style={{ fontSize: 11, background: t.accent, border: 'none', borderRadius: 5, color: '#fff', padding: '6px 14px', cursor: 'pointer', fontWeight: 600, flexShrink: 0 }}>+ Objetivo</button>
      </div>

      {/* Summary bar */}
      {allKRs.length > 0 && (
        <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: '8px 14px', marginBottom: 16, display: 'flex', gap: 16, alignItems: 'center', flexWrap: 'wrap' }}>
          <span style={{ fontSize: 10, color: t.textFaint }}>KEY RESULTS ({allKRs.length} total)</span>
          <div style={{ display: 'flex', gap: 10, fontSize: 10 }}>
            <span style={{ color: '#3b82f6', fontWeight: 700 }}>✓ {doneKRs} completados</span>
            <span style={{ color: '#22c55e', fontWeight: 700 }}>↗ {onTrackKRs} en curso</span>
            <span style={{ color: '#f59e0b', fontWeight: 700 }}>⚠ {atRiskKRs} en riesgo</span>
          </div>
        </div>
      )}

      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        {okrs.map((obj, oi) => {
          const objDone = obj.keyResults.filter(k => k.status === 'done').length;
          const objTotal = obj.keyResults.length;
          const objPct = objTotal > 0 ? Math.round((objDone / objTotal) * 100) : 0;
          return (
            <div key={obj.id} style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 10, overflow: 'hidden' }}>
              {/* Objective header */}
              <div style={{ padding: '10px 14px', background: t.bgDeep, borderBottom: `1px solid ${t.border}` }}>
                <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                  <div style={{ width: 22, height: 22, borderRadius: 6, background: t.accent, color: '#fff', fontSize: 11, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>O{oi + 1}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    {editObjId === obj.id ? (
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                        <input value={obj.title} onChange={e => updObj(obj.id, { title: e.target.value })} autoFocus
                          style={{ fontSize: 13, fontWeight: 700, color: t.text, background: t.bgAlt, border: `1px solid ${t.accent}`, borderRadius: 4, padding: '3px 7px', width: '100%' }} />
                        <input value={obj.description} onChange={e => updObj(obj.id, { description: e.target.value })} placeholder="Descripción del objetivo..."
                          style={{ fontSize: 11, color: t.textMuted, background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 7px', width: '100%' }} />
                        <button onClick={() => setEditObjId(null)} style={{ alignSelf: 'flex-end', fontSize: 10, background: t.accent, border: 'none', borderRadius: 3, color: '#fff', padding: '2px 10px', cursor: 'pointer' }}>OK</button>
                      </div>
                    ) : (
                      <div onDoubleClick={() => setEditObjId(obj.id)}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: t.heading }}>{obj.title}</div>
                        {obj.description && <div style={{ fontSize: 10, color: t.textMuted, marginTop: 2 }}>{obj.description}</div>}
                      </div>
                    )}
                  </div>
                  <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexShrink: 0 }}>
                    {objTotal > 0 && (
                      <div style={{ textAlign: 'right' }}>
                        <div style={{ fontSize: 16, fontWeight: 800, color: objPct === 100 ? '#22c55e' : t.heading }}>{objPct}%</div>
                        <div style={{ fontSize: 8, color: t.textDim }}>{objDone}/{objTotal} KR</div>
                      </div>
                    )}
                    <button onClick={() => setEditObjId(editObjId === obj.id ? null : obj.id)} style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 13 }}>✎</button>
                    <button onClick={() => { if (confirm(`¿Eliminar objetivo "${obj.title}"?`)) delObjective(obj.id); }} style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: 15 }}>×</button>
                  </div>
                </div>
                {objTotal > 0 && (
                  <div style={{ marginTop: 6, height: 4, background: t.bg, borderRadius: 2, overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${objPct}%`, background: '#3b82f6', borderRadius: 2 }} />
                  </div>
                )}
              </div>

              {/* Key Results */}
              <div style={{ padding: '8px 14px', display: 'flex', flexDirection: 'column', gap: 6 }}>
                {obj.keyResults.length === 0 && (
                  <div style={{ fontSize: 11, color: t.textDim, fontStyle: 'italic', padding: '6px 0' }}>Sin key results. Añade uno para este objetivo.</div>
                )}
                {obj.keyResults.map((kr, ki) => {
                  const krs = KR_STATUSES.find(s => s.id === kr.status) || KR_STATUSES[0];
                  const pct = kr.target > 0 ? Math.min(100, Math.round((kr.current / kr.target) * 100)) : 0;
                  const linkedEpic = epics.find(e => e.id === kr.epicId);
                  const linkedOwner = team.find(m => m.id === kr.owner);
                  return (
                    <div key={kr.id} style={{ background: t.bg, border: `1px solid ${t.border}`, borderRadius: 6, padding: '8px 10px' }}>
                      {editKrId === kr.id ? (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                          <input value={kr.title} onChange={e => updKR(obj.id, kr.id, { title: e.target.value })} autoFocus placeholder="Título del KR..."
                            style={{ fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.accent}`, borderRadius: 4, padding: '4px 7px', width: '100%' }} />
                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr 1fr', gap: 5 }}>
                            <div>
                              <Label>Actual</Label>
                              <input type="number" value={kr.current} onChange={e => updKR(obj.id, kr.id, { current: parseFloat(e.target.value) || 0 })}
                                style={{ width: '100%', fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 5px' }} />
                            </div>
                            <div>
                              <Label>Target</Label>
                              <input type="number" value={kr.target} onChange={e => updKR(obj.id, kr.id, { target: parseFloat(e.target.value) || 1 })}
                                style={{ width: '100%', fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 5px' }} />
                            </div>
                            <div>
                              <Label>Unidad</Label>
                              <input value={kr.unit} onChange={e => updKR(obj.id, kr.id, { unit: e.target.value })} placeholder="feature, %, #..."
                                style={{ width: '100%', fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 5px' }} />
                            </div>
                            <div>
                              <Label>Estado</Label>
                              <select value={kr.status} onChange={e => updKR(obj.id, kr.id, { status: e.target.value })}
                                style={{ width: '100%', fontSize: 10, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 4px' }}>
                                {KR_STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                              </select>
                            </div>
                            <div>
                              <Label>Owner</Label>
                              <select value={kr.owner} onChange={e => updKR(obj.id, kr.id, { owner: e.target.value })}
                                style={{ width: '100%', fontSize: 10, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 4px' }}>
                                <option value="">—</option>
                                {team.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                              </select>
                            </div>
                          </div>
                          <div>
                            <Label>Épica vinculada</Label>
                            <select value={kr.epicId} onChange={e => updKR(obj.id, kr.id, { epicId: e.target.value })}
                              style={{ width: '100%', fontSize: 11, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '4px 6px' }}>
                              <option value="">Sin épica vinculada</option>
                              {epics.filter(e => e.status !== 'deferred').map(e => <option key={e.id} value={e.id}>{e.label}</option>)}
                            </select>
                          </div>
                          <button onClick={() => setEditKrId(null)} style={{ alignSelf: 'flex-end', fontSize: 10, background: t.accent, border: 'none', borderRadius: 3, color: '#fff', padding: '3px 12px', cursor: 'pointer' }}>OK</button>
                        </div>
                      ) : (
                        <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                          <div style={{ width: 18, height: 18, borderRadius: 4, background: krs.color + '22', border: `1px solid ${krs.color}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 8, fontWeight: 800, color: krs.color, flexShrink: 0 }}>KR</div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 11, fontWeight: 600, color: t.text, marginBottom: 4 }}>{kr.title}</div>
                            <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: 4 }}>
                              <div style={{ flex: 1, height: 5, background: t.border, borderRadius: 2, overflow: 'hidden' }}>
                                <div style={{ height: '100%', width: `${pct}%`, background: krs.color, borderRadius: 2, transition: 'width 0.3s' }} />
                              </div>
                              <span style={{ fontSize: 10, fontWeight: 700, color: krs.color, minWidth: 30 }}>{pct}%</span>
                            </div>
                            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', fontSize: 9, color: t.textFaint }}>
                              <span>{kr.current} / {kr.target} {kr.unit}</span>
                              <span style={{ color: krs.color, fontWeight: 600 }}>● {krs.label}</span>
                              {linkedOwner && <span>👤 {linkedOwner.name}</span>}
                              {linkedEpic && <span style={{ color: '#3b82f6' }}>🔗 {linkedEpic.label}</span>}
                            </div>
                          </div>
                          <div style={{ display: 'flex', gap: 2, flexShrink: 0 }}>
                            <button onClick={() => setEditKrId(kr.id)} style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 11 }}>✎</button>
                            <button onClick={() => delKR(obj.id, kr.id)} style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 14 }}>×</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                <button onClick={() => addKR(obj.id)} style={{ fontSize: 10, background: 'transparent', border: `1px dashed ${t.border}`, borderRadius: 5, color: t.textMuted, padding: '5px 10px', cursor: 'pointer', marginTop: 2 }}>
                  + Key Result
                </button>
              </div>
            </div>
          );
        })}

        {okrs.length === 0 && (
          <div style={{ textAlign: 'center', padding: 40, color: t.textDim }}>
            <div style={{ fontSize: 24, marginBottom: 8 }}>🎯</div>
            <div style={{ fontSize: 13, fontWeight: 600 }}>Sin objetivos definidos</div>
            <div style={{ fontSize: 11, marginTop: 4 }}>Añade el primer objetivo Q2 para empezar a medir el progreso del quarter.</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SEMANAL TAB — Weekly sync tracker + Carlo view
// ═══════════════════════════════════════════════════════════════════════════════
const ITEM_STATUSES = [
  { id: 'completado',        label: 'Completado',  icon: '✅', color: '#22c55e' },
  { id: 'en-curso',          label: 'En curso',    icon: '🔄', color: '#3b82f6' },
  { id: 'bloqueado',         label: 'Bloqueado',   icon: '🔴', color: '#ef4444' },
  { id: 'pendiente',         label: 'Pendiente',   icon: '⏳', color: '#f59e0b' },
];
const ITEM_PRIORITIES = [
  { id: 'alta',  label: 'Alta',  dot: '🔴' },
  { id: 'media', label: 'Media', dot: '🟡' },
  { id: 'baja',  label: 'Baja',  dot: '🟢' },
];

// ─── Carlo View (slide-style overlay) ───────────────────────────────────────
function CarloView({ session, onClose, epics }) {
  const sp = SPRINTS.find(s => s.id === session.sprint);
  const getStatus = (a) => a.status || (a.done ? 'completado' : 'pendiente');
  const sc = (id) => ITEM_STATUSES.find(s => s.id === id) || ITEM_STATUSES[3];
  const pc = (id) => ITEM_PRIORITIES.find(p => p.id === (id || 'alta')) || ITEM_PRIORITIES[0];
  const parseLines = (text) => (text || '').split('\n').map(l => l.trim()).filter(Boolean);
  const getEpic = (epicId) => (epics || []).find(e => e.id === epicId);

  const [lightMode, setLightMode] = useState(true);
  const [nextStepsOpen, setNextStepsOpen] = useState(false);

  // Dark slide palette
  const CD = {
    bg: '#0c1929', bgAlt: '#0f1e3d', bgCard: '#132244', bgTable: '#0c1929',
    accent: '#3b82f6', text: '#e2e8f0', textMuted: '#94a3b8', textDim: '#475569',
    border: '#1e3a6e', rowEven: '#0f1c38', rowOdd: '#0c1829', theadBg: '#162642',
    ownerColor: '#93c5fd',
  };
  // Light palette for screen-sharing
  const CL = {
    bg: '#f1f5f9', bgAlt: '#ffffff', bgCard: '#f8fafc', bgTable: '#f8fafc',
    accent: '#2563eb', text: '#1e293b', textMuted: '#475569', textDim: '#94a3b8',
    border: '#e2e8f0', rowEven: '#f8fafc', rowOdd: '#ffffff', theadBg: '#dbeafe',
    ownerColor: '#1d4ed8',
  };
  const C = lightMode ? CL : CD;

  const tw = parseLines(session.thisWeek);
  const nw = parseLines(session.nextWeek);
  const cd = parseLines(session.carloDecisions);

  return (
    <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: C.bg, zIndex: 2000, overflow: 'auto', fontFamily: "'Noto Sans', sans-serif" }}>
      {/* Sticky toolbar */}
      <div style={{ position: 'sticky', top: 0, background: C.bgAlt + 'f0', backdropFilter: 'blur(8px)', padding: '10px 28px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', zIndex: 10, borderBottom: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 11, color: C.textMuted, textTransform: 'uppercase', letterSpacing: 1 }}>Weekly Status · {session.date}</div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={() => setLightMode(p => !p)} style={{ background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontSize: 11, padding: '5px 14px', cursor: 'pointer', fontWeight: 600 }}>
            {lightMode ? '🌙 Modo oscuro' : '☀️ Modo claro'}
          </button>
          <button onClick={onClose} style={{ background: C.accent, border: 'none', borderRadius: 5, color: '#fff', fontSize: 11, padding: '5px 14px', cursor: 'pointer', fontWeight: 600 }}>
            ✕ Cerrar
          </button>
        </div>
      </div>

      <div style={{ maxWidth: '100%', margin: '0 auto', padding: '28px 40px', display: 'flex', flexDirection: 'column', gap: 20 }}>

        {/* SLIDE 1 — Cover */}
        <div style={{ background: C.bgAlt, borderRadius: 12, padding: '52px 56px', minHeight: 200, display: 'flex', flexDirection: 'column', justifyContent: 'space-between', borderLeft: `5px solid ${C.accent}` }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.accent, textTransform: 'uppercase', letterSpacing: 4, marginBottom: 20 }}>W E E K L Y  S T A T U S</div>
            <div style={{ fontSize: 40, fontWeight: 800, color: C.text, lineHeight: 1.1, marginBottom: 20 }}>Magento Channel</div>
            <div style={{ width: 110, height: 4, background: C.accent, borderRadius: 2, marginBottom: 28 }} />
            <div style={{ display: 'flex', gap: 32 }}>
              <div><span style={{ color: C.text, fontWeight: 700, fontSize: 13 }}>Fecha: </span><span style={{ color: C.text, fontSize: 13 }}>{session.date}</span></div>
              {sp && <div><span style={{ color: C.text, fontWeight: 700, fontSize: 13 }}>Sprint: </span><span style={{ color: C.text, fontSize: 13 }}>{session.sprintNum || sp.label}</span></div>}
            </div>
          </div>
          <div className="demo-sensitive" style={{ fontSize: 11, color: C.textDim, marginTop: 28 }}>Giunti Psychometrics · Canal Digital Magento</div>
        </div>

        {/* SLIDE 2 — Sprint Actual */}
        <div style={{ background: C.bgAlt, borderRadius: 12, padding: '32px 36px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 20 }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: C.text }}>Sprint Actual</div>
            {sp && <div style={{ fontSize: 12, color: C.textMuted }}>{sp.full} · {sp.dates}</div>}
          </div>
          {session.sprintObjective && (
            <div style={{ background: C.bgTable, border: `1px solid ${C.border}`, borderRadius: 7, padding: '12px 16px', marginBottom: 18, fontSize: 13, color: C.text, lineHeight: 1.6 }}>
              <span style={{ fontWeight: 700 }}>Objetivo del sprint: </span>{session.sprintObjective}
            </div>
          )}
          {(session.actions || []).length > 0 && (
            <div style={{ borderRadius: 8, overflow: 'hidden', border: `1px solid ${C.border}` }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                <thead>
                  <tr style={{ background: C.theadBg }}>
                    <th style={{ padding: '10px 14px', textAlign: 'left', color: C.text, fontWeight: 700, width: '20%' }}>Tarea / User Story</th>
                    <th style={{ padding: '10px 14px', textAlign: 'left', color: C.text, fontWeight: 700, width: '14%' }}>Épica</th>
                    <th style={{ padding: '10px 14px', textAlign: 'center', color: C.text, fontWeight: 700, width: '10%' }}>Responsable</th>
                    <th style={{ padding: '10px 14px', textAlign: 'center', color: C.text, fontWeight: 700, width: '11%' }}>Estado</th>
                    <th style={{ padding: '10px 14px', textAlign: 'center', color: C.text, fontWeight: 700, width: '8%' }}>Prioridad</th>
                    <th style={{ padding: '10px 14px', textAlign: 'left', color: C.text, fontWeight: 700 }}>Notas / Bloqueo</th>
                  </tr>
                </thead>
                <tbody>
                  {(session.actions || []).map((a, idx) => {
                    const s = sc(getStatus(a));
                    const p = pc(a.priority);
                    const epic = getEpic(a.epicId);
                    return (
                      <tr key={a.id} style={{ background: idx % 2 === 0 ? C.rowEven : C.rowOdd, borderTop: `1px solid ${C.border}` }}>
                        <td style={{ padding: '9px 14px', color: C.text, lineHeight: 1.4 }}>{a.text || '—'}</td>
                        <td style={{ padding: '9px 14px', lineHeight: 1.3 }}>
                          {epic ? (
                            <div>
                              <div style={{ fontSize: 11, fontWeight: 700, color: C.accent }}>{epic.label}</div>
                              {epic.sublabel && <div style={{ fontSize: 10, color: C.textMuted, marginTop: 1 }}>{epic.sublabel}</div>}
                            </div>
                          ) : <span style={{ color: C.textDim, fontSize: 11, fontStyle: 'italic' }}>Sin épica</span>}
                        </td>
                        <td style={{ padding: '9px 14px', color: C.ownerColor, textAlign: 'center' }}>{a.owner ? `[${a.owner}]` : '—'}</td>
                        <td style={{ padding: '9px 14px', textAlign: 'center' }}>
                          <span style={{ color: s.color, fontWeight: 700, fontSize: 11, whiteSpace: 'nowrap' }}>{s.icon} {s.label}</span>
                        </td>
                        <td style={{ padding: '9px 14px', textAlign: 'center', fontSize: 11, whiteSpace: 'nowrap' }}>
                          {p.dot} {p.label}
                        </td>
                        <td style={{ padding: '9px 14px', color: C.textMuted, lineHeight: 1.6, fontSize: 12 }}>{a.notes || ''}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
          <div style={{ fontSize: 10, color: C.textDim, marginTop: 14 }}>Magento Channel · Weekly Status | {session.date}</div>
        </div>

        {/* SLIDE 3 — Próximos Pasos & Cierre (desplegable) */}
        <div style={{ background: C.bgAlt, borderRadius: 12, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
          <button
            onClick={() => setNextStepsOpen(p => !p)}
            style={{ width: '100%', background: 'none', border: 'none', padding: '22px 36px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', textAlign: 'left' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
              <div style={{ fontSize: 20, fontWeight: 800, color: C.text }}>Próximos Pasos & Cierre</div>
              <div style={{ width: 70, height: 3, background: C.accent, borderRadius: 2 }} />
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              {(tw.length > 0 || nw.length > 0 || cd.length > 0) && (
                <span style={{ fontSize: 10, color: C.textMuted, fontStyle: 'italic' }}>
                  {[tw.length > 0 && `${tw.length} esta sem.`, nw.length > 0 && `${nw.length} próx. sem.`, cd.length > 0 && `${cd.length} pendiente Carlo`].filter(Boolean).join(' · ')}
                </span>
              )}
              <span style={{ fontSize: 16, color: C.textMuted }}>{nextStepsOpen ? '▲' : '▼'}</span>
            </div>
          </button>
          {nextStepsOpen && (
            <div style={{ padding: '0 36px 32px' }}>
              {sp && <div style={{ fontSize: 11, color: C.textMuted, textAlign: 'right', marginBottom: 16 }}>{sp.full} · {sp.dates}</div>}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16, marginBottom: 28 }}>
                {[
                  { lines: tw, badge: 'ESTA SEMANA',        badgeBg: '#22c55e', badgeColor: '#052e16', sub: 'Acción inmediata',  num: '01' },
                  { lines: nw, badge: 'PRÓXIMA SEMANA',     badgeBg: '#f59e0b', badgeColor: '#451a03', sub: 'En planificación',  num: '02' },
                  { lines: cd, badge: 'PENDIENTE DE CARLO', badgeBg: '#ef4444', badgeColor: '#fff',    sub: 'Requiere decisión', num: '03' },
                ].map(card => (
                  <div key={card.num} style={{ background: C.bgTable, border: `1px solid ${C.border}`, borderRadius: 10, padding: '18px 20px' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14, gap: 6, flexWrap: 'wrap' }}>
                      <span style={{ fontSize: 9, fontWeight: 800, color: card.badgeColor, background: card.badgeBg, padding: '2px 9px', borderRadius: 4, textTransform: 'uppercase', letterSpacing: 0.8, flexShrink: 0 }}>{card.badge}</span>
                      <span style={{ fontSize: 10, color: C.textMuted }}>{card.sub}</span>
                    </div>
                    <div style={{ fontSize: 42, fontWeight: 900, color: C.accent, lineHeight: 1, marginBottom: 14 }}>{card.num}</div>
                    {card.lines.length > 0
                      ? card.lines.map((l, i) => (
                        <div key={i} style={{ display: 'flex', gap: 8, marginBottom: 7, color: C.textMuted, fontSize: 12, lineHeight: 1.5 }}>
                          <span style={{ color: C.accent, flexShrink: 0 }}>•</span><span>{l}</span>
                        </div>
                      ))
                      : <div style={{ color: C.textDim, fontSize: 11, fontStyle: 'italic' }}>Sin items</div>
                    }
                  </div>
                ))}
              </div>
              <div style={{ fontStyle: 'italic', fontSize: 14, color: C.accent, marginBottom: 20 }}>¿Preguntas o puntos adicionales?</div>
              <div className="demo-sensitive" style={{ fontSize: 10, color: C.textDim }}>Magento Channel · Weekly Status · Giunti Psychometrics</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── SemanalTab (edit mode) ──────────────────────────────────────────────────
function SemanalTab({ weeklySync, setWeeklySync, team, epics }) {
  const t = useTheme();
  const [selectedId, setSelectedId] = useState(null);
  const [carloView, setCarloView] = useState(false);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);

  const getSelected = () => {
    if (selectedId) return weeklySync.find(s => s.id === selectedId) || weeklySync[0] || null;
    return weeklySync[0] || null;
  };

  const addSession = () => {
    const today = new Date().toISOString().slice(0, 10);
    // Carry over incomplete actions from the most recent session
    const prev = weeklySync[0];
    const carryOver = prev
      ? (prev.actions || [])
          .filter(a => getStatus(a) !== 'completado')
          .map(a => ({ ...a, id: uid(), status: a.status === 'completado' ? 'pendiente' : (a.status || 'pendiente'), notes: a.notes ? `↩ ${a.notes}` : '↩ carry-over' }))
      : [];
    const s = { id: uid(), date: today, sprint: 's1', sprintNum: '', sprintObjective: '', topics: '', thisWeek: '', nextWeek: '', carloDecisions: '', actions: carryOver };
    setWeeklySync(p => [s, ...p]);
    setSelectedId(s.id);
  };

  const updateSession = (id, updates) => setWeeklySync(p => p.map(s => s.id === id ? { ...s, ...updates } : s));
  const deleteSession = (id) => { setWeeklySync(p => p.filter(s => s.id !== id)); if (selectedId === id) setSelectedId(null); };

  const addAction = (sessionId) => {
    const a = { id: uid(), text: '', owner: '', status: 'pendiente', priority: 'alta', notes: '', epicId: '' };
    setWeeklySync(p => p.map(s => s.id === sessionId ? { ...s, actions: [...s.actions, a] } : s));
  };
  const updateAction = (sessionId, actionId, updates) => setWeeklySync(p =>
    p.map(s => s.id === sessionId ? { ...s, actions: s.actions.map(a => a.id === actionId ? { ...a, ...updates } : a) } : s)
  );
  const deleteAction = (sessionId, actionId) => setWeeklySync(p =>
    p.map(s => s.id === sessionId ? { ...s, actions: s.actions.filter(a => a.id !== actionId) } : s)
  );
  const moveAction = (sessionId, fromIdx, toIdx) => setWeeklySync(p =>
    p.map(s => {
      if (s.id !== sessionId) return s;
      const arr = [...s.actions];
      const [item] = arr.splice(fromIdx, 1);
      arr.splice(toIdx, 0, item);
      return { ...s, actions: arr };
    })
  );
  const [dragActionIdx, setDragActionIdx] = useState(null);

  // Backward compat: old items had `done` instead of `status`
  const getStatus = (a) => a.status || (a.done ? 'completado' : 'pendiente');
  const openActions = weeklySync.flatMap(s =>
    (s.actions || []).filter(a => getStatus(a) !== 'completado').map(a => ({ ...a, sessionDate: s.date }))
  );

  if (weeklySync.length === 0) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '55vh', gap: 12 }}>
        <div style={{ fontSize: 36 }}>📋</div>
        <div style={{ fontSize: 15, fontWeight: 700, color: t.heading }}>Sin reuniones registradas</div>
        <div style={{ fontSize: 12, color: t.textMuted, maxWidth: 400, textAlign: 'center', lineHeight: 1.6 }}>
          Registra tu primer sync semanal con Carlo. Desde aquí preparas la tabla de estado y los próximos pasos, y con un clic generas la Vista de Carlo.
        </div>
        <button onClick={addSession} style={{ background: t.accent, border: 'none', borderRadius: 6, color: '#fff', fontSize: 12, fontWeight: 600, padding: '9px 20px', cursor: 'pointer', marginTop: 4 }}>+ Nueva reunión</button>
      </div>
    );
  }

  const sel = getSelected();

  return (
    <>
      {carloView && sel && <CarloView session={sel} onClose={() => setCarloView(false)} epics={epics || []} />}

      <div style={{ display: 'grid', gridTemplateColumns: '260px 1fr', gap: 14, alignItems: 'start' }}>

        {/* LEFT: session list */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          <button onClick={addSession} style={{ background: t.accent, border: 'none', borderRadius: 6, color: '#fff', fontSize: 11, fontWeight: 600, padding: '7px 12px', cursor: 'pointer', width: '100%' }}>
            + Nueva reunión
          </button>

          {openActions.length > 0 && (
            <div style={{ background: t.bgAlt, border: `1px solid #f59e0b44`, borderRadius: 8, padding: '8px 10px' }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: '#f59e0b', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 5 }}>
                ⚡ {openActions.length} item{openActions.length > 1 ? 's' : ''} pendiente{openActions.length > 1 ? 's' : ''}
              </div>
              {openActions.slice(0, 4).map(a => (
                <div key={a.id} style={{ fontSize: 10, color: t.textMuted, marginBottom: 2, overflow: 'hidden', whiteSpace: 'nowrap', textOverflow: 'ellipsis' }}>
                  · {a.text || '(sin descripción)'}{a.owner ? ` → ${a.owner}` : ''}
                </div>
              ))}
              {openActions.length > 4 && <div style={{ fontSize: 9, color: t.textDim }}>+{openActions.length - 4} más...</div>}
            </div>
          )}

          {weeklySync.map(s => {
            const pendingCount = (s.actions || []).filter(a => getStatus(a) !== 'completado').length;
            const isSelected = sel && sel.id === s.id;
            const sp = SPRINTS.find(sp => sp.id === s.sprint);
            return (
              <div key={s.id} onClick={() => setSelectedId(s.id)}
                style={{ background: isSelected ? t.accent + '18' : t.bgAlt, border: `1px solid ${isSelected ? t.accent : t.border}`, borderRadius: 7, padding: '9px 11px', cursor: 'pointer', transition: 'border-color 0.15s' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 3 }}>
                  <span style={{ fontSize: 12, fontWeight: 700, color: isSelected ? t.accent : t.heading }}>{s.date}</span>
                  {pendingCount > 0 && <span style={{ fontSize: 9, fontWeight: 700, color: '#f59e0b', background: '#fef3c722', border: '1px solid #f59e0b44', padding: '1px 6px', borderRadius: 8 }}>{pendingCount} pend.</span>}
                </div>
                <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 2 }}>
                  {sp ? `${sp.full}` : '—'}{s.sprintNum ? ` (Sprint ${s.sprintNum})` : ''} · {(s.actions || []).length} ítems
                </div>
                {s.sprintObjective && <div style={{ fontSize: 10, color: t.textFaint, overflow: 'hidden', whiteSpace: 'nowrap', textOverflow: 'ellipsis' }}>{s.sprintObjective}</div>}
              </div>
            );
          })}
        </div>

        {/* RIGHT: session detail */}
        {sel && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>

            {/* Header */}
            <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: t.heading }}>📋 Sync con Carlo</div>
                <div style={{ display: 'flex', gap: 6 }}>
                  <button onClick={() => setCarloView(true)}
                    style={{ background: '#0f1e3d', border: '1px solid #3b82f6', borderRadius: 5, color: '#93c5fd', fontSize: 11, fontWeight: 700, padding: '5px 14px', cursor: 'pointer' }}>
                    🎬 Vista de Carlo
                  </button>
                  {confirmDeleteId === sel.id ? (
                    <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
                      <span style={{ fontSize: 11, color: '#ef4444', fontWeight: 600 }}>¿Eliminar?</span>
                      <button onClick={() => { deleteSession(sel.id); setConfirmDeleteId(null); }}
                        style={{ background: '#ef4444', border: 'none', borderRadius: 4, color: '#fff', fontSize: 11, fontWeight: 700, padding: '3px 8px', cursor: 'pointer' }}>Sí</button>
                      <button onClick={() => setConfirmDeleteId(null)}
                        style={{ background: 'none', border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, fontSize: 11, padding: '3px 8px', cursor: 'pointer' }}>No</button>
                    </div>
                  ) : (
                    <button onClick={() => setConfirmDeleteId(sel.id)}
                      style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 16 }}>×</button>
                  )}
                </div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
                <div>
                  <Label>Fecha</Label>
                  <input type="date" value={sel.date} onChange={e => updateSession(sel.id, { date: e.target.value })}
                    style={{ fontSize: 12, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, color: t.text, padding: '5px 8px', width: '100%' }} />
                </div>
                <div>
                  <Label>Sprint del PI Planning</Label>
                  <select value={sel.sprint || ''} onChange={e => updateSession(sel.id, { sprint: e.target.value })}
                    style={{ fontSize: 12, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, color: t.text, padding: '5px 8px', width: '100%' }}>
                    <option value="">— ninguno —</option>
                    {SPRINTS.map(sp => <option key={sp.id} value={sp.id}>{sp.full} · {sp.dates}</option>)}
                  </select>
                </div>
                <div>
                  <Label>Nº Sprint global (ej. "52")</Label>
                  <input value={sel.sprintNum || ''} onChange={e => updateSession(sel.id, { sprintNum: e.target.value })}
                    placeholder="52"
                    style={{ fontSize: 12, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, color: t.text, padding: '5px 8px', width: '100%' }} />
                </div>
              </div>
            </div>

            {/* Sprint objective */}
            <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
              <Label>Objetivo del sprint</Label>
              <textarea value={sel.sprintObjective || ''} onChange={e => updateSession(sel.id, { sprintObjective: e.target.value })}
                placeholder="¿Cuál es el foco del equipo esta semana?" rows={2}
                style={{ width: '100%', fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, padding: '7px 9px', resize: 'vertical', lineHeight: 1.6, outline: 'none' }} />
            </div>

            {/* Status table */}
            <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                <Label>Tabla de estado (Sprint Actual)</Label>
                <button onClick={() => addAction(sel.id)} style={{ fontSize: 10, background: t.accent, border: 'none', borderRadius: 5, color: '#fff', padding: '4px 11px', cursor: 'pointer', fontWeight: 600 }}>+ Ítem</button>
              </div>
              {(sel.actions || []).length === 0 && <div style={{ fontSize: 11, color: t.textDim, fontStyle: 'italic' }}>Sin ítems aún — añade tareas/user stories del sprint</div>}

              {(sel.actions || []).map((a, idx) => {
                const sc = ITEM_STATUSES.find(s => s.id === getStatus(a)) || ITEM_STATUSES[3];
                const isDragging = dragActionIdx === idx;
                return (
                  <div key={a.id}
                    draggable
                    onDragStart={() => setDragActionIdx(idx)}
                    onDragEnd={() => setDragActionIdx(null)}
                    onDragOver={e => { e.preventDefault(); }}
                    onDrop={e => { e.preventDefault(); if (dragActionIdx !== null && dragActionIdx !== idx) { moveAction(sel.id, dragActionIdx, idx); setDragActionIdx(null); } }}
                    style={{ padding: '9px 0', borderBottom: idx < (sel.actions || []).length - 1 ? `1px solid ${t.border}` : 'none', opacity: isDragging ? 0.4 : 1, cursor: 'grab', borderRadius: 4, background: isDragging ? t.bgAlt : 'transparent' }}>
                    {/* Row 1: drag handle + #ID + task name + epic + owner + delete */}
                    <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: 5 }}>
                      <span style={{ fontSize: 11, color: t.textDim, cursor: 'grab', userSelect: 'none' }} title="Arrastra para reordenar">⠿</span>
                      <span style={{ fontSize: 9, fontWeight: 700, color: t.textDim, background: t.bgDeep, borderRadius: 3, padding: '1px 4px', minWidth: 24, textAlign: 'center', flexShrink: 0 }}>#{idx + 1}</span>
                      <input value={a.text} onChange={e => updateAction(sel.id, a.id, { text: e.target.value })}
                        placeholder="Tarea / User Story..."
                        style={{ flex: 1, fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '4px 8px', outline: 'none' }} />
                      <select value={a.epicId || ''} onChange={e => updateAction(sel.id, a.id, { epicId: e.target.value })}
                        style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: a.epicId ? t.accent : t.textMuted, padding: '4px 5px', outline: 'none', minWidth: 140, maxWidth: 160 }}>
                        <option value="">Épica...</option>
                        {(epics || []).filter(ep => ep.status !== 'deferred').map(ep => <option key={ep.id} value={ep.id}>{ep.label}</option>)}
                        <optgroup label="Diferidas">
                          {(epics || []).filter(ep => ep.status === 'deferred').map(ep => <option key={ep.id} value={ep.id}>{ep.label}</option>)}
                        </optgroup>
                      </select>
                      <select value={a.owner || ''} onChange={e => updateAction(sel.id, a.id, { owner: e.target.value })}
                        style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '4px 5px', outline: 'none', minWidth: 96 }}>
                        <option value="">Responsable</option>
                        {team.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}
                        <option value="Carlo">Carlo</option>
                        <option value="Samuel">Samuel</option>
                      </select>
                      <button onClick={() => deleteAction(sel.id, a.id)} style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 15 }}>×</button>
                    </div>
                    {/* Row 2: status + priority + notes */}
                    <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                      <select value={getStatus(a)} onChange={e => updateAction(sel.id, a.id, { status: e.target.value })}
                        style={{ fontSize: 10, background: sc.color + '1a', border: `1px solid ${sc.color}55`, borderRadius: 4, color: sc.color, padding: '3px 6px', outline: 'none', fontWeight: 700, minWidth: 128, cursor: 'pointer' }}>
                        {ITEM_STATUSES.map(s => <option key={s.id} value={s.id}>{s.icon} {s.label}</option>)}
                      </select>
                      <select value={a.priority || 'alta'} onChange={e => updateAction(sel.id, a.id, { priority: e.target.value })}
                        style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '3px 6px', outline: 'none', minWidth: 76 }}>
                        {ITEM_PRIORITIES.map(p => <option key={p.id} value={p.id}>{p.dot} {p.label}</option>)}
                      </select>
                      <input value={a.notes || ''} onChange={e => updateAction(sel.id, a.id, { notes: e.target.value })}
                        placeholder="Notas / Bloqueo..."
                        style={{ flex: 1, fontSize: 11, color: t.textMuted, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 8px', outline: 'none' }} />
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Próximos pasos — 3 columns */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
              {[
                { key: 'thisWeek',       label: '📌 Esta semana',       hint: 'Cerrar SSO\nValidar template con Federica', border: t.border },
                { key: 'nextWeek',       label: '🔜 Próxima semana',    hint: 'Sprint planning\nArrancar tokenización', border: t.border },
                { key: 'carloDecisions', label: '🔴 Pendiente de Carlo', hint: '¿Quién asume UAT?\nDefinir prioridad Odoo', border: '#ef444444' },
              ].map(col => (
                <div key={col.key} style={{ background: t.bgAlt, border: `1px solid ${col.border}`, borderRadius: 8, padding: 12 }}>
                  <Label>{col.label}</Label>
                  <textarea value={sel[col.key] || ''} onChange={e => updateSession(sel.id, { [col.key]: e.target.value })}
                    placeholder={`Un ítem por línea:\n${col.hint}`} rows={4}
                    style={{ width: '100%', fontSize: 11, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, padding: '6px 8px', resize: 'vertical', lineHeight: 1.6, outline: 'none' }} />
                </div>
              ))}
            </div>

            {/* Internal notes */}
            <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
              <Label>Notas internas (no aparecen en Vista de Carlo)</Label>
              <textarea value={sel.topics || ''} onChange={e => updateSession(sel.id, { topics: e.target.value })}
                placeholder="Apuntes libres de la reunión..." rows={3}
                style={{ width: '100%', fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, padding: '7px 9px', resize: 'vertical', lineHeight: 1.6, outline: 'none' }} />
            </div>

            {/* Email draft to Carlo — NOT shown in Carlo view */}
            {(() => {
              const generateEmail = () => {
                const completados = (sel.actions || []).filter(a => (a.status || '') === 'completado');
                const enCurso    = (sel.actions || []).filter(a => (a.status || '') === 'en-curso');
                const bloqueados = (sel.actions || []).filter(a => (a.status || '') === 'bloqueado');
                const pendientes = (sel.actions || []).filter(a => (a.status || '') === 'pendiente');
                const lines = [];
                lines.push(`Hola Carlo,`);
                lines.push(``);
                lines.push(`Te resumo el status de esta semana (${sel.date}):`);
                if (sel.sprintObjective) { lines.push(``); lines.push(`Objetivo del sprint: ${sel.sprintObjective}`); }
                if (completados.length) {
                  lines.push(``); lines.push(`✅ Completado:`);
                  completados.forEach(a => lines.push(`  • ${a.text}${a.owner ? ` (${a.owner})` : ''}${a.notes ? ' — ' + a.notes : ''}`));
                }
                if (enCurso.length) {
                  lines.push(``); lines.push(`🔄 En curso:`);
                  enCurso.forEach(a => lines.push(`  • ${a.text}${a.owner ? ` (${a.owner})` : ''}${a.notes ? ' — ' + a.notes : ''}`));
                }
                if (bloqueados.length) {
                  lines.push(``); lines.push(`🔴 Bloqueado (requiere atención):`);
                  bloqueados.forEach(a => lines.push(`  • ${a.text}${a.notes ? ' — ' + a.notes : ''}`));
                }
                if (pendientes.length) {
                  lines.push(``); lines.push(`⏳ Pendiente:`);
                  pendientes.forEach(a => lines.push(`  • ${a.text}${a.owner ? ` (${a.owner})` : ''}`));
                }
                const tw = (sel.thisWeek || '').split('\n').map(l => l.trim()).filter(Boolean);
                const nw = (sel.nextWeek || '').split('\n').map(l => l.trim()).filter(Boolean);
                const cd = (sel.carloDecisions || '').split('\n').map(l => l.trim()).filter(Boolean);
                if (tw.length) { lines.push(``); lines.push(`📌 Esta semana cerrado:`); tw.forEach(l => lines.push(`  • ${l}`)); }
                if (nw.length) { lines.push(``); lines.push(`🔜 Próxima semana:`); nw.forEach(l => lines.push(`  • ${l}`)); }
                if (cd.length) { lines.push(``); lines.push(`❓ Pendiente de tu decisión:`); cd.forEach(l => lines.push(`  • ${l}`)); }
                lines.push(``); lines.push(`Saludos,`); lines.push(`Samuel`);
                return lines.join('\n');
              };
              const emailVal = sel.emailCarlo !== undefined ? sel.emailCarlo : '';
              return (
                <div style={{ background: t.bgAlt, border: `1px solid #2563eb44`, borderRadius: 8, padding: 14 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                    <Label>📧 Borrador email a Carlo (post-status)</Label>
                    <button
                      onClick={() => updateSession(sel.id, { emailCarlo: generateEmail() })}
                      style={{ background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, color: t.textMuted, fontSize: 10, fontWeight: 700, padding: '4px 10px', cursor: 'pointer' }}>
                      ↻ Generar desde reunión
                    </button>
                  </div>
                  <textarea value={emailVal} onChange={e => updateSession(sel.id, { emailCarlo: e.target.value })}
                    placeholder={`Pulsa "Generar desde reunión" para rellenar automáticamente,\no escribe tu borrador aquí. Copia y pega en tu cliente de correo.`} rows={10}
                    style={{ width: '100%', fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, padding: '7px 9px', resize: 'vertical', lineHeight: 1.6, outline: 'none', fontFamily: 'monospace' }} />
                </div>
              );
            })()}

          </div>
        )}
      </div>
    </>
  );
}
