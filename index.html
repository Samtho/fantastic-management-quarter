// REVENUE TAB
// ═══════════════════════════════════════════════════════════════════════════════
function RevenueTab({ epics, revenue, setRevenue }) {
  const t = useTheme();
  const activeEpics = (epics || []).filter(e => e.status !== 'deferred');
  const [expanded, setExpanded] = useState({});
  const toggleExpanded = (epicId) => setExpanded(p => ({ ...p, [epicId]: !p[epicId] }));

  const getR = (epicId) => {
    const d = revenue[epicId] || {};
    return {
      impact:          d.impact          ?? null,
      type:            d.type            ?? '',
      metric:          d.metric          ?? '',
      baseline:        d.baseline        ?? '',
      delta:           d.delta           ?? '',
      confidence:      d.confidence      ?? 50,
      assumptionNote:  d.assumptionNote  ?? '',
      notes:           d.notes           ?? '',
      estimate:        d.estimate        ?? 0,
    };
  };

  // setR auto-calculates estimate when baseline + delta are present
  const setR = (epicId, updates) => {
    setRevenue(p => {
      const merged = { ...getR(epicId), ...(p[epicId] || {}), ...updates };
      const bl = Number(merged.baseline) || 0;
      const dl = Number(merged.delta)    || 0;
      const cf = Number(merged.confidence ?? 50);
      if (bl > 0 && dl > 0) {
        merged.estimate = Math.round(bl * 12 * (dl / 100) * (cf / 100));
      }
      return { ...p, [epicId]: merged };
    });
  };

  // Summary stats
  const withData  = activeEpics.filter(e => getR(e.id).impact);
  const totalEst  = activeEpics.reduce((sum, e) => sum + (Number(getR(e.id).estimate) || 0), 0);
  const byImpact  = REVENUE_IMPACTS.map(imp => ({ ...imp, count: activeEpics.filter(e => getR(e.id).impact === imp.id).length }));

  const fmtEur = (n) => n > 0 ? '€' + Number(n).toLocaleString('es-ES') : '—';

  return (
    <div style={{ maxWidth: 1150 }}>
      {/* Header */}
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontSize: 18, fontWeight: 800, color: t.heading, marginBottom: 4 }}>📈 Impacto de negocio</div>
        <div style={{ fontSize: 12, color: t.textMuted }}>No somos una fábrica de software. Cada épica tiene un impacto medible en el negocio. Pulsa 🧮 para estimar con supuestos explícitos.</div>
      </div>

      {/* Summary cards */}
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
        <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: '12px 18px', minWidth: 140 }}>
          <div style={{ fontSize: 10, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>Impacto estimado</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: '#22c55e' }}>{totalEst > 0 ? fmtEur(totalEst) : '€0'}</div>
          <div style={{ fontSize: 10, color: t.textDim }}>suma anual estimada</div>
        </div>
        {byImpact.map(imp => (
          <div key={imp.id} style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: '12px 18px', minWidth: 110 }}>
            <div style={{ fontSize: 10, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>Impacto {imp.label}</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: imp.color }}>{imp.count}</div>
            <div style={{ fontSize: 10, color: t.textDim }}>épica{imp.count !== 1 ? 's' : ''}</div>
          </div>
        ))}
        <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: '12px 18px', minWidth: 110 }}>
          <div style={{ fontSize: 10, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>Sin datos</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: t.textDim }}>{activeEpics.length - withData.length}</div>
          <div style={{ fontSize: 10, color: t.textDim }}>épica{activeEpics.length - withData.length !== 1 ? 's' : ''}</div>
        </div>
      </div>

      {/* Table */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 10, overflow: 'hidden' }}>
        {/* Column headers */}
        <div style={{ display: 'grid', gridTemplateColumns: '190px 90px 120px 1fr 170px 90px', gap: 0, background: t.bgDeep, padding: '8px 14px', borderBottom: `1px solid ${t.border}` }}>
          {['Épica', 'Impacto', 'Tipo', 'Métrica objetivo', '€ Estimado / año', 'Notas'].map(h => (
            <div key={h} style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.5 }}>{h}</div>
          ))}
        </div>
        {activeEpics.length === 0 && (
          <div style={{ padding: 24, textAlign: 'center', color: t.textDim, fontSize: 12 }}>No hay épicas activas.</div>
        )}
        {activeEpics.map((epic, i) => {
          const r = getR(epic.id);
          const impDef = REVENUE_IMPACTS.find(x => x.id === r.impact);
          const isExp  = !!expanded[epic.id];
          const hasCalc = Number(r.baseline) > 0 && Number(r.delta) > 0;
          const isLast  = i === activeEpics.length - 1;
          return (
            <React.Fragment key={epic.id}>
              {/* ── Main row ── */}
              <div style={{ display: 'grid', gridTemplateColumns: '190px 90px 120px 1fr 170px 90px', gap: 0, padding: '10px 14px', borderBottom: `1px solid ${t.border}`, alignItems: 'center' }}>

                {/* Epic name */}
                <div>
                  <div style={{ fontSize: 11, fontWeight: 600, color: t.text, lineHeight: 1.3 }}>{epic.label}</div>
                  <div style={{ fontSize: 9, color: t.textDim }}>{epic.sublabel}</div>
                </div>

                {/* Impact */}
                <div>
                  <select value={r.impact || ''} onChange={e => setR(epic.id, { impact: e.target.value || null })}
                    style={{ fontSize: 10, background: impDef ? impDef.color + '22' : t.bgDeep, border: `1px solid ${impDef ? impDef.color + '88' : t.border}`, borderRadius: 4, color: impDef ? impDef.color : t.textDim, padding: '3px 5px', width: '100%', fontWeight: 700, cursor: 'pointer' }}>
                    <option value="">— sin datos</option>
                    {REVENUE_IMPACTS.map(x => <option key={x.id} value={x.id}>{x.label}</option>)}
                  </select>
                </div>

                {/* Type */}
                <div>
                  <select value={r.type || ''} onChange={e => setR(epic.id, { type: e.target.value })}
                    style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: r.type ? t.text : t.textDim, padding: '3px 5px', width: '100%', cursor: 'pointer' }}>
                    <option value="">— tipo</option>
                    {REVENUE_TYPES.map(x => <option key={x.id} value={x.id}>{x.label}</option>)}
                  </select>
                </div>

                {/* Metric */}
                <div style={{ paddingRight: 8 }}>
                  <input value={r.metric || ''} onChange={e => setR(epic.id, { metric: e.target.value })}
                    placeholder="ej. Tasa de renovación"
                    style={{ width: '100%', fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '4px 6px' }} />
                </div>

                {/* Auto-calculated estimate + 🧮 button */}
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, paddingRight: 8 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: r.estimate > 0 ? '#22c55e' : t.textDim, whiteSpace: 'nowrap' }}>
                      {r.estimate > 0 ? fmtEur(r.estimate) : '—'}
                    </div>
                    {hasCalc && (
                      <div style={{ fontSize: 9, color: t.textDim, marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                        {fmtEur(Number(r.baseline))}/mes × {r.delta}% × {r.confidence}%
                      </div>
                    )}
                  </div>
                  <button onClick={() => toggleExpanded(epic.id)}
                    title={isExp ? 'Cerrar calculadora' : 'Calcular con supuestos'}
                    style={{ fontSize: 12, lineHeight: 1, background: isExp ? t.accent + '22' : t.bgDeep, border: `1px solid ${isExp ? t.accent : t.border}`, borderRadius: 4, color: isExp ? t.accent : t.textMuted, padding: '4px 7px', cursor: 'pointer', flexShrink: 0, transition: 'all 0.15s' }}>
                    🧮
                  </button>
                </div>

                {/* Notes */}
                <div>
                  <input value={r.notes || ''} onChange={e => setR(epic.id, { notes: e.target.value })}
                    placeholder="Contexto..."
                    style={{ width: '100%', fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '4px 6px' }} />
                </div>
              </div>

              {/* ── Assumption calculator (expanded) ── */}
              {isExp && (
                <div style={{ background: t.bgDeep, borderBottom: `1px solid ${t.border}`, padding: '14px 14px 16px 204px' }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: t.accent, marginBottom: 10, textTransform: 'uppercase', letterSpacing: 0.6 }}>
                    🧮 Calculadora de supuestos
                  </div>
                  <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end', flexWrap: 'wrap' }}>

                    {/* Baseline */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      <label style={{ fontSize: 9, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.4 }}>Baseline €/mes</label>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
                        <span style={{ fontSize: 11, color: t.textDim }}>€</span>
                        <input type="number" min="0" value={r.baseline || ''} onChange={e => setR(epic.id, { baseline: e.target.value })}
                          placeholder="8000"
                          style={{ width: 78, fontSize: 11, background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '5px 6px' }} />
                      </div>
                    </div>

                    <div style={{ fontSize: 18, color: t.textDim, paddingBottom: 5 }}>×</div>

                    {/* Delta */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      <label style={{ fontSize: 9, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.4 }}>Mejora esperada</label>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
                        <input type="number" min="0" max="100" step="0.5" value={r.delta || ''} onChange={e => setR(epic.id, { delta: e.target.value })}
                          placeholder="15"
                          style={{ width: 58, fontSize: 11, background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '5px 6px' }} />
                        <span style={{ fontSize: 11, color: t.textDim }}>%</span>
                      </div>
                    </div>

                    <div style={{ fontSize: 18, color: t.textDim, paddingBottom: 5 }}>×</div>

                    {/* Confidence */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      <label style={{ fontSize: 9, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.4 }}>Confianza</label>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
                        <input type="number" min="0" max="100" step="5" value={r.confidence ?? 50} onChange={e => setR(epic.id, { confidence: Number(e.target.value) })}
                          style={{ width: 52, fontSize: 11, background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '5px 6px' }} />
                        <span style={{ fontSize: 11, color: t.textDim }}>%</span>
                      </div>
                    </div>

                    <div style={{ fontSize: 18, color: t.textDim, paddingBottom: 5 }}>×</div>

                    {/* 12 months (fixed) */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      <label style={{ fontSize: 9, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.4 }}>Periodo</label>
                      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, padding: '5px 10px', fontSize: 11, color: t.textDim }}>12 meses</div>
                    </div>

                    <div style={{ fontSize: 18, color: t.textDim, paddingBottom: 5 }}>=</div>

                    {/* Result */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      <label style={{ fontSize: 9, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.4 }}>Impacto anual estimado</label>
                      <div style={{ fontSize: 18, fontWeight: 800, color: r.estimate > 0 ? '#22c55e' : t.textDim, padding: '3px 0' }}>
                        {r.estimate > 0 ? '≈ ' + fmtEur(r.estimate) : '—'}
                      </div>
                    </div>

                    {/* Assumption note */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4, marginLeft: 12 }}>
                      <label style={{ fontSize: 9, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.4 }}>Fuente / supuesto</label>
                      <input value={r.assumptionNote || ''} onChange={e => setR(epic.id, { assumptionNote: e.target.value })}
                        placeholder="ej. Facturación media renovaciones manuales 2025"
                        style={{ width: 230, fontSize: 10, background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '5px 7px' }} />
                    </div>
                  </div>

                  {/* Formula hint */}
                  {hasCalc && (
                    <div style={{ marginTop: 10, fontSize: 10, color: t.textDim, fontFamily: 'monospace' }}>
                      {fmtEur(Number(r.baseline))}/mes × {r.delta}% × {r.confidence}% confianza × 12 meses = <span style={{ color: '#22c55e', fontWeight: 700 }}>{fmtEur(r.estimate)}/año</span>
                    </div>
                  )}
                </div>
              )}
            </React.Fragment>
          );
        })}
      </div>

      {/* Type legend */}
      <div style={{ marginTop: 14, display: 'flex', gap: 10, flexWrap: 'wrap' }}>
        {REVENUE_TYPES.map(tp => (
          <div key={tp.id} style={{ fontSize: 10, color: t.textMuted }}>
            <span style={{ fontWeight: 600 }}>{tp.label}</span>: {tp.desc}
          </div>
        ))}
      </div>
    </div>
  );
}

// METAS TAB
// ═══════════════════════════════════════════════════════════════════════════════
function MetasTab({ goals, setGoals, logros, setLogros, config }) {
  const t = useTheme();
  const [deleteConfirmId, setDeleteConfirmId]     = useState(null);
  const [showSuggestions, setShowSuggestions]     = useState(false);
  const [showLogros, setShowLogros]               = useState(false);
  const [showLogrosSug, setShowLogrosSug]         = useState(false);
  const [logroDeleteId, setLogroDeleteId]         = useState(null);
  const [logroCopied, setLogroCopied]             = useState(null);
  const [expandedGoalId, setExpandedGoalId]       = useState(null);

  const logrosEnabled = config?.showLogros === true;

  const addGoal  = () => setGoals(p => [...p, { id: uid(), category: 'Producto', text: '', description: '', deadline: '', status: 'pendiente', progress: 0, notes: '' }]);
  const updGoal  = (id, u) => setGoals(p => p.map(g => g.id === id ? { ...g, ...u } : g));
  const delGoal  = (id) => { setGoals(p => p.filter(g => g.id !== id)); setDeleteConfirmId(null); };

  // Add suggested goal (skip if text already exists)
  const addSuggested = (sg) => {
    if (goals.some(g => g.text === sg.text)) return;
    setGoals(p => [...p, { id: uid(), category: sg.category, text: sg.text, description: sg.description || '', deadline: '', status: 'pendiente', progress: 0, notes: '' }]);
  };

  // Logros (XYZ)
  const addLogro      = () => setLogros(p => [...p, { id: uid(), title: '', x: '', y: '', z: '', date: new Date().toISOString().slice(0, 10), tags: '' }]);
  const addSugLogro   = (sl) => {
    if (logros.some(l => l.title === sl.title)) return;
    setLogros(p => [...p, { id: uid(), title: sl.title, x: sl.x, y: sl.y, z: sl.z, date: new Date().toISOString().slice(0, 10), tags: sl.tags || '' }]);
  };
  const updLogro = (id, u) => setLogros(p => p.map(l => l.id === id ? { ...l, ...u } : l));
  const delLogro = (id) => { setLogros(p => p.filter(l => l.id !== id)); setLogroDeleteId(null); };
  const xyzText  = (l) => {
    const parts = [];
    if (l.x) parts.push(l.x);
    if (l.y) parts.push(`medido por ${l.y}`);
    if (l.z) parts.push(`haciendo ${l.z}`);
    return parts.length ? `• Logré ${parts.join(', ')}.` : '';
  };
  const copyLogro = (l) => {
    const txt = xyzText(l);
    if (!txt) return;
    navigator.clipboard.writeText(txt).then(() => {
      setLogroCopied(l.id);
      setTimeout(() => setLogroCopied(null), 2000);
    });
  };

  const byCategory    = GOAL_CATEGORIES.map(cat => ({ cat, items: goals.filter(g => g.category === cat) })).filter(x => x.items.length > 0);
  const completedCount = goals.filter(g => g.status === 'completado').length;
  const pct           = goals.length > 0 ? Math.round((completedCount / goals.length) * 100) : 0;

  // Group suggestions by category
  const sugByCategory = GOAL_CATEGORIES.map(cat => ({
    cat,
    items: SUGGESTED_GOALS.filter(sg => sg.category === cat && !goals.some(g => g.text === sg.text)),
  })).filter(x => x.items.length > 0);

  return (
    <div style={{ maxWidth: 920 }}>
      {/* Header */}
      <div style={{ marginBottom: 16, display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', flexWrap: 'wrap', gap: 10 }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: t.heading, marginBottom: 3 }}>🏆 Mis metas</div>
          <div style={{ fontSize: 12, color: t.textMuted }}>Objetivos personales y de equipo para Q2 2026.</div>
        </div>
        <button onClick={() => setShowSuggestions(p => !p)}
          style={{ fontSize: 11, fontWeight: 600, background: showSuggestions ? t.accent + '22' : t.bgAlt, border: `1px solid ${showSuggestions ? t.accent : t.border}`, borderRadius: 6, color: showSuggestions ? t.accent : t.textMuted, padding: '6px 13px', cursor: 'pointer' }}>
          {showSuggestions ? '✕ Cerrar sugerencias' : '⚡ Ver sugerencias Q2'}
        </button>
      </div>

      {/* ── Suggestions panel ─────────────────────────────────────────── */}
      {showSuggestions && (
        <div style={{ background: t.bgDeep, border: `1px solid ${t.accent}44`, borderRadius: 10, padding: '14px 16px', marginBottom: 20 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.accent, textTransform: 'uppercase', letterSpacing: 0.6, marginBottom: 12 }}>
            ⚡ Sugerencias para tu rol — elige las que te sirvan
          </div>
          {sugByCategory.length === 0 && (
            <div style={{ fontSize: 12, color: t.textDim, fontStyle: 'italic' }}>Ya has añadido todas las sugerencias disponibles.</div>
          )}
          {sugByCategory.map(({ cat, items }) => (
            <div key={cat} style={{ marginBottom: 14 }}>

                    <button onClick={() => addSuggested(sg)}
                      style={{ flexShrink: 0, fontSize: 10, fontWeight: 700, background: t.accent, border: 'none', borderRadius: 4, color: '#fff', padding: '4px 10px', cursor: 'pointer' }}>

                    </button>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>

          <div style={{ flex: 1 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
              <span style={{ fontSize: 11, color: t.textMuted }}>Progreso global</span>

            <div style={{ height: 8, background: t.bgDeep, borderRadius: 4, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${pct}%`, background: pct >= 80 ? '#22c55e' : pct >= 40 ? '#3b82f6' : '#f59e0b', borderRadius: 4, transition: 'width 0.3s' }} />

          </div>

        </div>

      {goals.length === 0 && (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, padding: '48px 0' }}>

          <button onClick={addGoal} style={{ background: t.accent, border: 'none', borderRadius: 6, color: '#fff', fontSize: 12, fontWeight: 600, padding: '9px 20px', cursor: 'pointer' }}>+ Añadir primera meta</button>
        </div>

      {/* ── Goals by category ──────────────────────────────────────────── */}
      {byCategory.map(({ cat, items }) => (
        <div key={cat} style={{ marginBottom: 20 }}>

                </div>

              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>

                        <input type="date" value={l.date || ''} onChange={e => updLogro(l.id, { date: e.target.value })}
                          style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textDim, padding: '3px 6px', flexShrink: 0 }} />
                        {logroDeleteId === l.id ? (
                          <div style={{ display: 'flex', gap: 4, alignItems: 'center', flexShrink: 0 }}>

                      {/* XYZ fields */}
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 10 }}>

                        </div>
                        <div>
                          <label style={{ display: 'block', fontSize: 9, fontWeight: 700, color: '#8b5cf6', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 3 }}>Y — Medido por</label>
                          <input value={l.y || ''} onChange={e => updLogro(l.id, { y: e.target.value })}
                            placeholder="ej. reducir renovaciones manuales en 80%"
                            style={{ width: '100%', fontSize: 11, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '5px 7px' }} />
                        </div>
                        <div>
                          <label style={{ display: 'block', fontSize: 9, fontWeight: 700, color: '#8b5cf6', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 3 }}>Z — Haciendo</label>
                          <input value={l.z || ''} onChange={e => updLogro(l.id, { z: e.target.value })}
                            placeholder="ej. diseñar el PRD, coordinar 3 sprints"
                            style={{ width: '100%', fontSize: 11, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '5px 7px' }} />
                        </div>
                      </div>

                      {/* Tags */}
                      <div style={{ marginBottom: preview ? 10 : 0 }}>
                        <input value={l.tags || ''} onChange={e => updLogro(l.id, { tags: e.target.value })}
                          placeholder="Etiquetas: Product Launch, Payments, Q2 2026..."
                          style={{ width: '100%', fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '4px 7px' }} />
                      </div>

                      {/* LinkedIn preview + copy */}
                      {preview && (
                        <div style={{ background: '#7c3aed11', border: '1px solid #8b5cf644', borderRadius: 6, padding: '8px 10px', display: 'flex', alignItems: 'center', gap: 8 }}>
                          <div style={{ flex: 1, fontSize: 11, color: t.text, lineHeight: 1.5, fontStyle: 'italic' }}>{preview}</div>
                          <button onClick={() => copyLogro(l)}
                            style={{ flexShrink: 0, fontSize: 10, fontWeight: 700, background: logroCopied === l.id ? '#22c55e' : '#8b5cf6', border: 'none', borderRadius: 4, color: '#fff', padding: '4px 10px', cursor: 'pointer', transition: 'background 0.2s' }}>

                })}
              </div>

              {logros.length > 0 && (
                <div style={{ marginTop: 10 }}>
                  <button onClick={addLogro}
                    style={{ fontSize: 11, background: 'none', border: '1px solid #8b5cf644', borderRadius: 5, color: '#8b5cf6', padding: '5px 14px', cursor: 'pointer' }}>
                    + Añadir logro
                  </button>
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  // ── Load from localStorage on mount ──────────────────────────────────────
  // Try v4 first; if empty, migrate from v3 (fixing customSizes format)
  const parseLS = (key) => { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; } };
  const migrateTeamCustomSizes = (rawTeam) => (rawTeam || []).map(m => {
    const cs = m.customSizes;
    if (!cs) return m;
    // Old flat format { S, M, L, XL } → new nested format { sizes, sprints }
    if (cs.S !== undefined && !cs.sizes) return { ...m, customSizes: { sizes: cs, sprints: [] } };
    return m;
  });
  const savedV4 = parseLS(LS_KEY);
  const savedV3 = parseLS('pi-planning-q2-2026-v3');
  // Use v4 only if it was explicitly saved by this app (has _migrated flag).
  // Otherwise fall back to v3 — v4 may have been written with default data
  // before the migration code was in place.
  const saved = (() => {
    if (savedV4 && savedV4._migrated) return savedV4;
    if (savedV3) return { ...savedV3, team: migrateTeamCustomSizes(savedV3.team) };
    return savedV4 || {};
  })();

  // Migrate epics: ensure bag-of-things epics have noProgress by default
  const migrateEpics = (rawEpics) => rawEpics.map(e => {
    if ((e.label === 'SEO Improvement' || e.label === 'Deuda Técnica') && e.noProgress === undefined) {
      return { ...e, noProgress: true };
    }
    return e;
  });

  const [tab, setTab] = useState('epicas');
  const [jumpToEpicId, setJumpToEpicId] = useState(null);
  const [demoMode, setDemoMode] = useState('off'); // 'off' | 'replace' | 'blur'
  const [epics, setEpics] = useState(migrateEpics(saved.epics || INITIAL_EPICS));
  const [team, setTeam] = useState(saved.team || INITIAL_TEAM);
  const [agenda, setAgenda] = useState(saved.agenda || INITIAL_AGENDA);
  const [okrs, setOkrs] = useState(saved.okrs || INITIAL_OKRS);
  const [weeklySync, setWeeklySync] = useState(saved.weeklySync || INITIAL_WEEKLY_SYNCS);
  const [revenue, setRevenue] = useState(saved.revenue || INITIAL_REVENUE);
  const [goals, setGoals]   = useState(saved.goals  || INITIAL_GOALS);
  const [logros, setLogros] = useState(saved.logros || INITIAL_LOGROS);
  const [theme, setTheme] = useState(saved.theme || 'light');
  // Merge saved config with DEFAULT_CONFIG so new keys always get their defaults
  const [config, setConfig] = useState({ ...DEFAULT_CONFIG, ...(saved.config || {}) });
  const [sidebar, setSidebar] = useState(true);
  const [showCosts, setShowCosts] = useState(false);
  const [saveFlash, setSaveFlash] = useState(false);
  const titleTimer = useRef(null);

  // ── Persist to localStorage on every change ───────────────────────────────
  useEffect(() => {
    localStorage.setItem(LS_KEY, JSON.stringify({ epics, team, agenda, okrs, weeklySync, revenue, goals, logros, config, theme, _migrated: true }));
  }, [epics, team, agenda, okrs, weeklySync, revenue, goals, logros, config, theme]);

  const handleTitleDblClick = () => {
    setShowCosts(p => !p);
    if (!showCosts) setTab('costs');
  };

  const t = THEMES[theme];
  const confirmed = epics.filter(e => e.status === 'confirmed').length;
  const deciding = epics.filter(e => e.status === 'deciding').length;
  const active = epics.filter(e => e.status !== 'deferred');
  const load = totalLoad(active, config);
  const { total: cap } = teamCap(team, config);
  const pct = cap > 0 ? Math.round((load / cap) * 100) : 0;
  const globalConf = weightedConfidence(active, config);

  const exportState = () => {
    const state = { epics, team, agenda, okrs, weeklySync, revenue, goals, logros, config, theme, _exported: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'pi-planning-q2-2026-state.json'; a.click();
    URL.revokeObjectURL(url);
  };

  const importState = (file) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const s = JSON.parse(ev.target.result);
        if (s.epics) setEpics(s.epics);
        if (s.team) setTeam(s.team);
        if (s.agenda) setAgenda(s.agenda);
        if (s.okrs) setOkrs(s.okrs);
        if (s.config) setConfig(s.config);
        if (s.theme) setTheme(s.theme);
        if (s.weeklySync) setWeeklySync(s.weeklySync);
        if (s.revenue) setRevenue(s.revenue);
        if (s.goals)  setGoals(s.goals);
        if (s.logros) setLogros(s.logros);
      } catch (err) { alert('Error al importar: ' + err.message); }
    };
    reader.readAsText(file);
  };

  const manualSave = () => {
    localStorage.setItem(LS_KEY, JSON.stringify({ epics, team, agenda, okrs, weeklySync, revenue, goals, logros, config, theme, _migrated: true }));
    setSaveFlash(true);
    setTimeout(() => setSaveFlash(false), 1800);
  };

  const resetToDefaults = () => {
    if (confirm('¿Resetear todo el estado al estado inicial? Esto borrará todos los cambios (incluyendo costos).')) {
      localStorage.removeItem(LS_KEY);
      setEpics(INITIAL_EPICS); setTeam(INITIAL_TEAM); setAgenda(INITIAL_AGENDA);
      setOkrs(INITIAL_OKRS); setWeeklySync(INITIAL_WEEKLY_SYNCS); setConfig(DEFAULT_CONFIG);
    }
  };

  const ALL_TABS = [
    { id: 'epicas',    label: '🗺️ Épicas Q2' },
    { id: 'capacidad', label: '📊 Capacidad' },
    { id: 'timeline',  label: '📅 Timeline' },
    { id: 'okrs',      label: '🎯 OKRs' },
    { id: 'semanal',   label: '📋 Semanal' },
    { id: 'revenue',   label: '📈 Revenue' },
    { id: 'metas',     label: '🏆 Metas' },
    { id: 'config',    label: '⚙️ Config' },
  ];
  if (showCosts) ALL_TABS.push({ id: 'costs', label: '💰 Costos' });
  const hiddenTabs = config.hiddenTabs || [];
  const tabs = ALL_TABS.filter(tb => tb.id === 'config' || !hiddenTabs.includes(tb.id));

  // ── Demo mode display data (never mutates real state) ──────────────────────
  const displayEpics = demoMode === 'replace' ? demoifyEpics(epics) : epics;
  const displayTeam  = demoMode === 'replace' ? demoifyTeam(team)   : team;
  const displayOkrs  = demoMode === 'replace' ? demoifyOkrs(okrs)   : okrs;
  const blurClass    = demoMode === 'blur' ? 'demo-blur-active' : '';

  const cycleDemo = () => setDemoMode(m => m === 'off' ? 'replace' : m === 'replace' ? 'blur' : 'off');
  const demoLabel = demoMode === 'off' ? '🎥 Demo' : demoMode === 'replace' ? '🎭 Datos genéricos' : '🫧 Blur activo';
  const demoBg    = demoMode === 'off' ? '#334155' : demoMode === 'replace' ? '#7c3aed' : '#0369a1';

  return (
    <ThemeContext.Provider value={t}>
      <div className={blurClass} style={{ background: t.bg, height: '100vh', display: 'flex', flexDirection: 'column', color: t.text, fontFamily: "'Noto Sans', sans-serif" }}>
        {/* Header */}
        <div style={{ background: t.bgAlt, borderBottom: `1px solid ${t.border}`, padding: '8px 18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8, flexShrink: 0 }}>
          <div onDoubleClick={handleTitleDblClick} style={{ cursor: 'default', userSelect: 'none' }}>
            <div className="demo-sensitive" style={{ fontSize: 8, color: t.textDim, textTransform: 'uppercase', letterSpacing: 1 }}>Giunti Psychometrics · Magento IT</div>
            <h1 className="demo-sensitive" style={{ fontSize: 16, fontWeight: 700, color: t.heading, lineHeight: 1.2 }}>PI Planning Lite — Q2 2026</h1>
          </div>
          <div style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
            <Stat label="Épicas Q2" value={confirmed} color="#3b82f6" />
            <Stat label="Carga" value={`${pct}%`} color={pct > 90 ? '#ef4444' : pct > 70 ? '#f59e0b' : '#22c55e'} />
            <Stat label="Confianza" value={`${globalConf}%`} color={confColor(globalConf)} />
            <div style={{ textAlign: 'right', fontSize: 10, color: t.textFaint, lineHeight: 1.4 }}>
              <div>Sprint cierra <span style={{ color: '#f59e0b', fontWeight: 700 }}>27 mar</span></div>
              <div>Q2 arranca <span style={{ color: '#22c55e', fontWeight: 700 }}>31 mar</span></div>
            </div>
            <button onClick={manualSave}
              style={{ background: saveFlash ? '#16a34a' : t.bgAlt, border: `1px solid ${saveFlash ? '#16a34a' : t.border}`, borderRadius: 5, color: saveFlash ? '#fff' : t.textMuted, fontSize: 11, fontWeight: 600, cursor: 'pointer', padding: '4px 10px', transition: 'all 0.2s', minWidth: 72 }}
              title="Guardar en el navegador">{saveFlash ? '✓ Guardado' : '💾 Guardar'}</button>
            <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
              style={{ background: t.bg, border: `1px solid ${t.border}`, borderRadius: 5, color: t.text, fontSize: 14, cursor: 'pointer', padding: '3px 7px' }}
              title="Cambiar tema">{theme === 'dark' ? '☀️' : '🌙'}</button>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ background: t.bgAlt, borderBottom: `1px solid ${t.border}`, padding: '0 18px', display: 'flex', flexShrink: 0 }}>
          {tabs.map(tb => (
            <button key={tb.id} onClick={() => setTab(tb.id)} style={{
              background: 'none', border: 'none', cursor: 'pointer', padding: '8px 14px',
              fontSize: 12, fontWeight: tab === tb.id ? 700 : 400,
              color: tab === tb.id ? t.heading : t.textMuted,
              borderBottom: `2px solid ${tab === tb.id ? t.accent : 'transparent'}`, marginBottom: -1,
            }}>{tb.label}</button>
          ))}
        </div>

        {/* Body */}
        <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
          <Sidebar agenda={agenda} setAgenda={setAgenda} open={sidebar} onToggle={() => setSidebar(!sidebar)} />
          <div style={{ flex: 1, overflow: 'auto', padding: 16 }}>
            {tab === 'epicas' && <KanbanTab epics={displayEpics} setEpics={setEpics} team={displayTeam} theme={theme} config={config} jumpToEpicId={jumpToEpicId} onJumpHandled={() => setJumpToEpicId(null)} />}
            {tab === 'capacidad' && <CapacidadTab epics={displayEpics} team={displayTeam} config={config} />}
            {tab === 'timeline' && <TimelineTab epics={displayEpics} setEpics={setEpics} team={displayTeam} config={config} onNavigateToEpic={(id) => { setTab('epicas'); setJumpToEpicId(id); }} />}
            {tab === 'okrs' && <OKRsTab okrs={displayOkrs} setOkrs={setOkrs} epics={displayEpics} team={displayTeam} />}
            {tab === 'semanal' && <SemanalTab weeklySync={weeklySync} setWeeklySync={setWeeklySync} team={displayTeam} epics={displayEpics} />}
            {tab === 'revenue' && <RevenueTab epics={displayEpics} revenue={revenue} setRevenue={setRevenue} />}
            {tab === 'metas'   && <MetasTab goals={goals} setGoals={setGoals} logros={logros} setLogros={setLogros} config={config} />}
            {tab === 'config' && <ConfigPanel config={config} setConfig={setConfig} team={team} setTeam={setTeam} exportState={exportState} importState={importState} resetToDefaults={resetToDefaults} demoMode={demoMode} setDemoMode={setDemoMode} />}
            {tab === 'costs' && showCosts && <CostPanel team={team} setTeam={setTeam} config={config} setConfig={setConfig} epics={epics} />}
          </div>
        </div>
      </div>
    </ThemeContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
