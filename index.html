// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function uid() { return Math.random().toString(36).slice(2, 9); }

function sizeWeight(cfg) {
  const base = cfg.sizes.S;
  const w = {};
  SIZES.forEach(s => { w[s] = cfg.sizes[s] > 0 ? base / cfg.sizes[s] : 0; });
  return w;
}

// Returns the sizes map for a member in a given sprint.
// customSizes shape: { sizes: {S,M,L,XL}, sprints: string[] }
// sprints: [] = applies to ALL sprints; otherwise only to listed sprint IDs
// Handles legacy flat format { S, M, L, XL } from v3 localStorage
function memberSizesForSprint(member, cfg, sprintId) {
  const cs = member.customSizes;
  if (!cs) return cfg.sizes;
  // Migrate old flat format { S, M, L, XL } → treat as all-sprints override
  if (cs.S !== undefined && !cs.sizes) return cs;
  if (!cs.sizes) return cfg.sizes; // safety fallback
  const sprints = cs.sprints || [];
  const appliesToAll = sprints.length === 0;
  if (appliesToAll || (sprintId && sprints.includes(sprintId))) return cs.sizes;
  return cfg.sizes;
}
// Returns size→S-equiv weight for a member in a given sprint
function memberSizeWeight(member, cfg, sprintId) {
  const sz = memberSizesForSprint(member, cfg, sprintId);
  const base = sz.S;
  const w = {};
  SIZES.forEach(s => { w[s] = sz[s] > 0 ? base / sz[s] : 0; });
  return w;
}
// devCap = average S-capacity across all Q2 sprints × capMult
// Correctly reflects custom sizes that only apply to a subset of sprints
function devCap(member, cfg) {
  const totalS = SPRINTS.reduce((sum, sp) => sum + memberSizesForSprint(member, cfg, sp.id).S, 0);
  return (totalS / SPRINTS.length) * member.capMult;
}

function teamCap(team, cfg) {
  const ps = team.reduce((s, m) => s + devCap(m, cfg), 0);
  const eff = Math.floor(ps * (1 - cfg.bufferPct / 100));
  return { perSprint: ps, effective: eff, total: eff * SPRINTS.length };
}

function totalLoad(epics, cfg) {
  const w = sizeWeight(cfg);
  let load = 0;
  epics.forEach(e => e.stories.forEach(s => { if (s.size) load += w[s.size] || 0; }));
  return load;
}

// Weighted confidence: average of (confidence × S-eq weight) / total S-eq weight
function weightedConfidence(epics, cfg) {
  const w = sizeWeight(cfg);
  let totalWeight = 0;
  let weightedSum = 0;
  epics.forEach(epic => {
    // Use epic-level size as weight if no stories, otherwise sum of story weights
    let epicWeight = 0;
    if (epic.stories.length > 0) {
      epic.stories.forEach(s => { if (s.size) epicWeight += w[s.size] || 0; });
    } else if (epic.size) {
      epicWeight = w[epic.size] || 0;
    } else {
      epicWeight = 1; // minimal weight for unsized epics
    }
    totalWeight += epicWeight;
    weightedSum += (epic.confidence || 0) * epicWeight;
  });
  return totalWeight > 0 ? Math.round(weightedSum / totalWeight) : 0;
}

// Per-member story breakdown for a given sprint
function memberSprintDetail(sprintId, epics, team, cfg) {
  return team.map(member => {
    const w = memberSizeWeight(member, cfg, sprintId); // per-member, per-sprint weights
    const counts = { S: 0, M: 0, L: 0, XL: 0 };
    let pts = 0;
    const stories = [];
    epics.filter(e => e.status !== 'deferred').forEach(epic => {
      epic.stories.filter(s => s.sprint === sprintId && s.owner === member.id).forEach(s => {
        if (s.size) { counts[s.size]++; pts += w[s.size] || 0; }
        stories.push({ title: s.title, size: s.size, done: s.done, epicLabel: epic.label });
      });
    });
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    // Use sprint-specific capacity (not Q2 average) for per-sprint utilization %
    const sprintS = memberSizesForSprint(member, cfg, sprintId).S;
    const memberCap = sprintS * member.capMult * (1 - cfg.bufferPct / 100);
    const pct = memberCap > 0 ? Math.round((pts / memberCap) * 100) : 0;
    return { member, counts, pts: Math.round(pts * 10) / 10, total, memberCap: Math.round(memberCap * 10) / 10, pct, stories };
  });
}

function sprintRecommendation(pct) {
  if (pct > 105) return { text: '⚠ Sobrecargado — mueve historias al siguiente sprint', color: '#ef4444' };
  if (pct > 85)  return { text: '🔶 Bien cargado — margen mínimo, revisa prioridades', color: '#f59e0b' };
  if (pct > 40)  return { text: '✓ Capacidad bien utilizada', color: '#22c55e' };
  if (pct === 0) return { text: '○ Sin historias asignadas a este sprint todavía', color: '#64748b' };
  return { text: '🔵 Sprint ligero — considera añadir más trabajo', color: '#3b82f6' };
}

// Per-sprint load and confidence
function sprintBreakdown(epics, team, cfg) {
  const w = sizeWeight(cfg);
  const { effective } = teamCap(team, cfg);
  return SPRINTS.map(sprint => {
    let load = 0;
    let weightedConf = 0;
    let totalWeight = 0;
    const epicSet = new Set();
    epics.filter(e => e.status !== 'deferred').forEach(epic => {
      epic.stories.forEach(s => {
        if (s.sprint === sprint.id && s.size) {
          const sw = w[s.size] || 0;
          load += sw;
          if (!epicSet.has(epic.id)) {
            epicSet.add(epic.id);
          }
        }
      });
    });
    // Confidence = weighted avg of epics that have stories in this sprint
    epics.filter(e => e.status !== 'deferred').forEach(epic => {
      let epicLoadInSprint = 0;
      epic.stories.forEach(s => {
        if (s.sprint === sprint.id && s.size) epicLoadInSprint += w[s.size] || 0;
      });
      if (epicLoadInSprint > 0) {
        totalWeight += epicLoadInSprint;
        weightedConf += (epic.confidence || 0) * epicLoadInSprint;
      }
    });
    const conf = totalWeight > 0 ? Math.round(weightedConf / totalWeight) : 0;
    const pct = effective > 0 ? Math.round((load / effective) * 100) : 0;
    return { sprint, load: Math.round(load * 10) / 10, capacity: effective, pct, confidence: conf, epicCount: epicSet.size };
  });
}

// Cost per epic
function epicCosts(epics, team, cfg) {
  const hps = cfg.hoursPerSprint || 80;
  // Effective hourly rate per member
  const rates = {};
  team.forEach(m => {
    if (m.type === 'external') {
      rates[m.id] = m.hourlyRate || 0;
    } else {
      rates[m.id] = (m.monthlyCost || 0) / (hps * 2); // monthly / (hours per sprint × 2 sprints/month)
    }
  });
  // Hours per size: if a dev does sizes.S small stories in hoursPerSprint, one S = hps / sizes.S
  const hoursPerSize = {};
  SIZES.forEach(s => { hoursPerSize[s] = cfg.sizes[s] > 0 ? hps / cfg.sizes[s] : 0; });

  return epics.filter(e => e.status !== 'deferred').map(epic => {
    let totalHours = 0;
    let totalCost = 0;
    epic.stories.forEach(s => {
      if (s.size) {
        const hrs = hoursPerSize[s.size] || 0;
        const rate = s.owner ? (rates[s.owner] || 0) : 0;
        totalHours += hrs;
        totalCost += hrs * rate;
      }
    });
    return { id: epic.id, label: epic.label, size: epic.size, confidence: epic.confidence, stories: epic.stories.length, hours: Math.round(totalHours), cost: totalCost };
  });
}

// Cost calculation
function calcCosts(team, cfg) {
  const hps = cfg.hoursPerSprint || 80;
  const sprintsPerMonth = 2;
  const results = team.map(m => {
    const hrsPerSprint = hps * m.capMult;
    let costPerSprint;
    if (m.type === 'external') {
      costPerSprint = hrsPerSprint * (m.hourlyRate || 0);
    } else {
      costPerSprint = (m.monthlyCost || 0) / sprintsPerMonth;
    }
    return { id: m.id, name: m.name, type: m.type, hrsPerSprint, costPerSprint, totalQ2: costPerSprint * SPRINTS.length };
  });
  const totalPerSprint = results.reduce((s, r) => s + r.costPerSprint, 0);
  const totalQ2 = results.reduce((s, r) => s + r.totalQ2, 0);
  return { members: results, totalPerSprint, totalQ2 };
}

function confColor(c) {
  if (c >= 80) return '#22c55e';
  if (c >= 60) return '#84cc16';
  if (c >= 40) return '#f59e0b';
  if (c >= 20) return '#f97316';
  return '#ef4444';
}

// SIDEBAR — AGENDA
// ═══════════════════════════════════════════════════════════════════════════════
function Sidebar({ agenda, setAgenda, open, onToggle }) {
  const t = useTheme();
  const [editId, setEditId] = useState(null);
  const [dragIdx, setDragIdx] = useState(null);
  const [dropIdx, setDropIdx] = useState(null);
  const [newTitle, setNewTitle] = useState('');

  const total = agenda.reduce((s, a) => s + a.time, 0);
  const done = agenda.filter(a => a.done).length;
  const toggle = id => setAgenda(p => p.map(a => a.id === id ? { ...a, done: !a.done } : a));
  const del = id => setAgenda(p => p.filter(a => a.id !== id));
  const upd = (id, u) => setAgenda(p => p.map(a => a.id === id ? { ...a, ...u } : a));
  const add = () => { if (!newTitle.trim()) return; setAgenda(p => [...p, { id: uid(), title: newTitle.trim(), desc: '', time: 5, done: false }]); setNewTitle(''); };

  const onDS = (e, i) => { setDragIdx(i); e.dataTransfer.effectAllowed = 'move'; };
  const onDO = (e, i) => { e.preventDefault(); setDropIdx(i); };
  const onDr = (e, i) => {
    e.preventDefault();
    if (dragIdx !== null && dragIdx !== i) {
      setAgenda(p => { const a = [...p]; const [m] = a.splice(dragIdx, 1); a.splice(i > dragIdx ? i - 1 : i, 0, m); return a; });
    }
    setDragIdx(null); setDropIdx(null);
  };

  if (!open) return (
    <div onClick={onToggle} style={{ width: 36, background: t.bgAlt, borderRight: `1px solid ${t.border}`, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', writingMode: 'vertical-rl', fontSize: 11, fontWeight: 600, color: t.textMuted, flexShrink: 0 }}>
      Agenda ({done}/{agenda.length})
    </div>
  );

  return (
    <div style={{ width: 280, background: t.bgAlt, borderRight: `1px solid ${t.border}`, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
      <div style={{ padding: '10px 12px', borderBottom: `1px solid ${t.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: t.heading }}>Agenda</div>
          <div style={{ fontSize: 10, color: t.textFaint }}>{total} min · {done}/{agenda.length}</div>
        </div>
        <button onClick={onToggle} style={{ background: 'none', border: 'none', color: t.textMuted, cursor: 'pointer', fontSize: 14 }}>✕</button>
      </div>
      <div style={{ height: 3, background: t.bg, margin: '0 12px' }}>
        <div style={{ height: '100%', background: '#22c55e', width: `${agenda.length > 0 ? (done / agenda.length) * 100 : 0}%`, borderRadius: 2 }} />
      </div>
      <div style={{ flex: 1, overflow: 'auto', padding: '6px 8px' }}>
        {agenda.map((item, idx) => (
          <div key={item.id} draggable onDragStart={e => onDS(e, idx)} onDragOver={e => onDO(e, idx)} onDrop={e => onDr(e, idx)} onDragEnd={() => { setDragIdx(null); setDropIdx(null); }}
            style={{ background: dropIdx === idx ? t.hoverBg : 'transparent', borderRadius: 7, padding: '6px 8px', marginBottom: 3, border: `1px solid ${item.done ? 'transparent' : t.border}`, opacity: item.done ? 0.5 : 1, cursor: 'grab' }}>
            <div style={{ display: 'flex', gap: 6, alignItems: 'flex-start' }}>
              <div onClick={() => toggle(item.id)} style={{ width: 18, height: 18, borderRadius: '50%', flexShrink: 0, marginTop: 1, cursor: 'pointer', border: `2px solid ${item.done ? '#16a34a' : t.border}`, background: item.done ? '#16a34a' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, color: '#fff' }}>
                {item.done && '✓'}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                {editId === item.id ? (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
                    <input value={item.title} onChange={e => upd(item.id, { title: e.target.value })} onKeyDown={e => e.key === 'Enter' && setEditId(null)} autoFocus
                      style={{ fontSize: 11, fontWeight: 600, color: t.text, background: t.bgDeep, border: `1px solid ${t.accent}`, borderRadius: 4, padding: '2px 5px', width: '100%' }} />
                    <textarea value={item.desc} onChange={e => upd(item.id, { desc: e.target.value })} placeholder="Descripción..."
                      style={{ fontSize: 10, color: t.textMuted, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '2px 5px', resize: 'vertical', minHeight: 32, width: '100%' }} />
                    <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                      <span style={{ fontSize: 9, color: t.textFaint }}>Min:</span>
                      <input type="number" value={item.time} onChange={e => upd(item.id, { time: parseInt(e.target.value) || 0 })} style={{ width: 36, fontSize: 10, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 3, padding: '1px 3px' }} />
                      <button onClick={() => setEditId(null)} style={{ fontSize: 10, background: t.accent, border: 'none', borderRadius: 3, color: '#fff', padding: '2px 8px', cursor: 'pointer', marginLeft: 'auto' }}>OK</button>
                    </div>
                  </div>
                ) : (
                  <div onDoubleClick={() => setEditId(item.id)}>
                    <div style={{ fontSize: 11, fontWeight: 600, color: item.done ? t.textFaint : t.text, textDecoration: item.done ? 'line-through' : 'none', lineHeight: 1.3 }}>{item.title}</div>
                    {item.desc && <div style={{ fontSize: 10, color: t.textFaint, lineHeight: 1.3, marginTop: 1 }}>{item.desc}</div>}
                    <div style={{ fontSize: 9, color: t.textDim, marginTop: 2 }}>{item.time} min</div>
                  </div>
                )}
              </div>
              <div style={{ display: 'flex', gap: 1, flexShrink: 0 }}>
                <button onClick={() => setEditId(editId === item.id ? null : item.id)} style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 11, padding: '0 2px' }}>✎</button>
                <button onClick={() => del(item.id)} style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 13, padding: '0 2px' }}>×</button>
              </div>
            </div>
          </div>
        ))}
      </div>
      <div style={{ padding: '6px 8px', borderTop: `1px solid ${t.border}` }}>
        <div style={{ display: 'flex', gap: 4 }}>
          <input value={newTitle} onChange={e => setNewTitle(e.target.value)} onKeyDown={e => e.key === 'Enter' && add()} placeholder="Añadir punto..."
            style={{ flex: 1, fontSize: 11, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, color: t.text, padding: '5px 7px' }} />
          <button onClick={add} style={{ background: t.accent, border: 'none', borderRadius: 5, color: '#fff', fontSize: 12, padding: '5px 10px', cursor: 'pointer', fontWeight: 700 }}>+</button>
        </div>
      </div>
    </div>
  );
}

// KANBAN
// ═══════════════════════════════════════════════════════════════════════════════
function KanbanTab({ epics, setEpics, team, theme, config, jumpToEpicId, onJumpHandled }) {
  const t = useTheme();
  const SC = getSC(theme, config.columnNames);
  const [expId, setExpId] = useState(null);
  const [dragId, setDragId] = useState(null);

  useEffect(() => {
    if (jumpToEpicId) {
      setExpId(jumpToEpicId);
      if (onJumpHandled) onJumpHandled();
      // Scroll to top so the expanded epic is visible
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }, [jumpToEpicId]);
  const [overCol, setOverCol] = useState(null);
  const [reorderPending, setReorderPending] = useState(null);
  const [newEpic, setNewEpic] = useState({});
  const [nStMap, setNStMap] = useState({});
  const [deferredOpen, setDeferredOpen] = useState(false);

  const ue = (id, u) => setEpics(p => p.map(e => e.id === id ? { ...e, ...u } : e));
  const move = (id, st) => ue(id, { status: st, ...(st === 'deferred' ? { ss: null, se: null } : {}) });
  const addSt = (id, title) => setEpics(p => p.map(e => e.id === id ? { ...e, stories: [...e.stories, { id: uid(), title, size: 'S', owner: '', sprint: null, done: false }] } : e));
  const updSt = (eid, sid, u) => setEpics(p => p.map(e => e.id === eid ? { ...e, stories: e.stories.map(s => s.id === sid ? { ...s, ...u } : s) } : e));
  const delSt = (eid, sid) => setEpics(p => p.map(e => e.id === eid ? { ...e, stories: e.stories.filter(s => s.id !== sid) } : e));
  const moveSt = (eid, sid, dir) => setEpics(p => p.map(e => {
    if (e.id !== eid) return e;
    const idx = e.stories.findIndex(s => s.id === sid);
    if (idx < 0) return e;
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= e.stories.length) return e;
    const arr = [...e.stories];
    [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
    return { ...e, stories: arr };
  }));
  const sortStBySprint = (eid) => setEpics(p => p.map(e => {
    if (e.id !== eid) return e;
    const sorted = [...e.stories].sort((a, b) => {
      const ai = a.sprint != null ? (SI[a.sprint] ?? 999) : 999;
      const bi = b.sprint != null ? (SI[b.sprint] ?? 999) : 999;
      return ai - bi;
    });
    return { ...e, stories: sorted };
  }));

  const { total: cap } = teamCap(team, config);
  const confEpics = epics.filter(e => e.status === 'confirmed');
  const confLoad = totalLoad(confEpics, config);
  const active = epics.filter(e => e.status !== 'deferred');
  const allLoad = totalLoad(active, config);
  const confPct = cap > 0 ? Math.round((confLoad / cap) * 100) : 0;
  const allPct = cap > 0 ? Math.round((allLoad / cap) * 100) : 0;

  // Global priority: confirmed first, then deciding, each ordered by array position
  const priorityMap = {};
  let pi = 1;
  const activeOrdered = epics.filter(e => e.status !== 'deferred');
  activeOrdered.forEach(e => { priorityMap[e.id] = pi++; });
  const totalActive = activeOrdered.length;

  const cols = [
    { key: 'confirmed', list: epics.filter(e => e.status === 'confirmed' || e.status === 'deciding') },
    { key: 'deferred',  list: epics.filter(e => e.status === 'deferred') },
  ];

  // Reorder within column via drag
  const [reorderDragIdx, setReorderDragIdx] = useState(null);
  const [reorderDropIdx, setReorderDropIdx] = useState(null);
  const [reorderCol, setReorderCol] = useState(null);

  const onEpicDragStart = (e, epicId, colKey, localIdx) => {
    setDragId(epicId);
    setReorderCol(colKey);
    setReorderDragIdx(localIdx);
    e.dataTransfer.effectAllowed = 'move';
  };

  const onEpicDragOver = (e, colKey, localIdx) => {
    e.preventDefault();
    if (reorderCol === colKey) {
      setReorderDropIdx(localIdx);
    }
    setOverCol(colKey);
  };

  const onEpicDrop = (e, colKey, localIdx) => {
    e.preventDefault();
    if (dragId && reorderCol === colKey && reorderDragIdx !== null && reorderDragIdx !== localIdx) {
      // Reorder within same column - ask confirmation
      const col = cols.find(c => c.key === colKey);
      const epicName = col.list[reorderDragIdx]?.label || '';
      setReorderPending({ epicId: dragId, colKey, fromIdx: reorderDragIdx, toIdx: localIdx, epicName });
    } else if (dragId && reorderCol !== colKey) {
      // Move to different column
      move(dragId, colKey);
    }
    setDragId(null); setOverCol(null); setReorderDragIdx(null); setReorderDropIdx(null); setReorderCol(null);
  };

  const confirmReorder = () => {
    if (!reorderPending) return;
    const { colKey, fromIdx, toIdx } = reorderPending;
    setEpics(prev => {
      // Use the same filter as col.list so localIdx is consistent
      const isInCol = (e) => colKey === 'confirmed'
        ? (e.status === 'confirmed' || e.status === 'deciding')
        : e.status === colKey;
      const colEpics = prev.filter(isInCol);
      const reordered = [...colEpics];
      const [moved] = reordered.splice(fromIdx, 1);
      reordered.splice(toIdx > fromIdx ? toIdx - 1 : toIdx, 0, moved);
      // Rebuild full array preserving positions of non-col epics
      const result = [];
      let colIdx = 0;
      prev.forEach(e => {
        if (isInCol(e)) {
          result.push(reordered[colIdx++]);
        } else {
          result.push(e);
        }
      });
      return result;
    });
    setReorderPending(null);
  };

  const addNewEpic = (colKey) => {
    const label = newEpic[colKey]?.trim();
    if (!label) return;
    const epic = {
      id: uid(), label, sublabel: '', status: colKey, size: null, owners: [],
      ss: null, se: null, deps: [], confidence: 50,
      objective: '', features: [], notes: '', stories: [],
    };
    setEpics(p => [epic, ...p]);
    setNewEpic(p => ({ ...p, [colKey]: '' }));
    setExpId(epic.id);
  };

  return (
    <div>
      <ReorderModal
        visible={!!reorderPending}
        epicName={reorderPending?.epicName || ''}
        fromPos={reorderPending ? reorderPending.fromIdx + 1 : 0}
        toPos={reorderPending ? (reorderPending.toIdx > reorderPending.fromIdx ? reorderPending.toIdx : reorderPending.toIdx + 1) : 0}
        onConfirm={confirmReorder}
        onCancel={() => setReorderPending(null)}
      />

      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: '8px 14px', marginBottom: 14, display: 'flex', gap: 16, alignItems: 'center', flexWrap: 'wrap' }}>
        <div style={{ fontSize: 10, color: t.textFaint }}>Carga Q2 (puntos)</div>
        <div style={{ flex: 1, minWidth: 150 }}>
          <div style={{ display: 'flex', gap: 2, marginBottom: 2 }}>
            <div style={{ height: 5, background: '#1d4ed8', borderRadius: '3px 0 0 3px', width: `${confPct}%`, minWidth: confLoad > 0 ? 2 : 0 }} />
            <div style={{ height: 5, background: '#6d28d9', width: `${Math.max(0, allPct - confPct)}%` }} />
            <div style={{ height: 5, background: t.bg, flex: 1, borderRadius: '0 3px 3px 0', border: `1px solid ${t.border}` }} />
          </div>
          <div style={{ display: 'flex', gap: 12, fontSize: 9, flexWrap: 'wrap' }}>
            <span style={{ color: '#93c5fd' }}>■ Conf: {Math.round(confLoad)} pts</span>
            <span style={{ color: '#c4b5fd' }}>■ Total: {Math.round(allLoad)} pts</span>
            <span style={{ color: t.textDim }}>Cap: ~{cap} pts</span>
            {allPct > 95 && <span style={{ color: '#ef4444', fontWeight: 700 }}>⚠ Saturado</span>}
          </div>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: deferredOpen ? '1fr 1fr' : '1fr 36px', gap: 14, alignItems: 'start' }}>
        {cols.map(col => {
          const sc = SC[col.key];
          const isOver = overCol === col.key && reorderCol !== col.key;

          // Collapsed deferred sidebar
          if (col.key === 'deferred' && !deferredOpen) {
            return (
              <div key={col.key}
                onDragOver={e => { e.preventDefault(); setOverCol(col.key); setDeferredOpen(true); }}
                onDrop={e => { e.preventDefault(); if (dragId) { move(dragId, col.key); } setDragId(null); setOverCol(null); setReorderDragIdx(null); setReorderDropIdx(null); setReorderCol(null); }}
                onClick={() => setDeferredOpen(true)}
                title="Mostrar Diferidas"
                style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, minHeight: 150, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-start', padding: '10px 0 8px', gap: 8, cursor: 'pointer', userSelect: 'none' }}>
                <span style={{ fontSize: 9, fontWeight: 800, color: t.textDim, writingMode: 'vertical-rl', transform: 'rotate(180deg)', letterSpacing: 1, textTransform: 'uppercase' }}>
                  {sc.label} ({col.list.length})
                </span>
                <span style={{ fontSize: 12, color: t.textFaint }}>‹</span>
              </div>
            );
          }

          return (
            <div key={col.key}
              onDragOver={e => { e.preventDefault(); setOverCol(col.key); }}
              onDrop={e => { e.preventDefault(); if (dragId && reorderCol !== col.key) { move(dragId, col.key); } setDragId(null); setOverCol(null); setReorderDragIdx(null); setReorderDropIdx(null); setReorderCol(null); }}
              onDragLeave={() => setOverCol(null)}
              style={{ background: isOver ? (theme === 'dark' ? '#1a2744' : '#e8f0fe') : 'transparent', borderRadius: 8, padding: 6, transition: 'background 0.15s', border: isOver ? `2px dashed ${t.accent}` : '2px solid transparent', minHeight: 150 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8, padding: '0 4px' }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: sc.border }} />
                <span style={{ fontSize: 12, fontWeight: 700, color: t.heading }}>{sc.label}</span>
                <span style={{ fontSize: 10, color: t.textDim, background: t.bg, padding: '0px 6px', borderRadius: 8, marginLeft: 'auto' }}>{col.list.length}</span>
                {col.key === 'deferred' && (
                  <button onClick={e => { e.stopPropagation(); setDeferredOpen(false); }} title="Ocultar Diferidas"
                    style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 14, padding: '0 2px', lineHeight: 1 }}>›</button>
                )}
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                {col.list.map((epic, localIdx) => {
                  const nSt = nStMap[epic.id] || '';
                  const setNSt = (val) => setNStMap(p => ({ ...p, [epic.id]: val }));
                  const exp = expId === epic.id;
                  const sprint = epic.ss ? SPRINTS.find(s => s.id === epic.ss) : null;
                  const depLabels = (epic.deps || []).map(d => epics.find(e => e.id === d)?.label).filter(Boolean);
                  const prioNum = priorityMap[epic.id];
                  const isDropTarget = reorderCol === col.key && reorderDropIdx === localIdx;
                  return (
                    <div key={epic.id} draggable
                      onDragStart={e => onEpicDragStart(e, epic.id, col.key, localIdx)}
                      onDragOver={e => onEpicDragOver(e, col.key, localIdx)}
                      onDrop={e => onEpicDrop(e, col.key, localIdx)}
                      style={{ background: sc.bg, border: `1px solid ${isDropTarget ? t.accent : sc.border}`, borderRadius: 7, overflow: 'hidden', cursor: 'grab',
                        borderTop: isDropTarget ? `3px solid ${t.accent}` : undefined }}>
                      <div onClick={() => setExpId(p => p === epic.id ? null : epic.id)} style={{ padding: '11px 13px', cursor: 'pointer' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 4, marginBottom: 4 }}>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                              {prioNum && (
                                <span style={{ fontSize: 9, fontWeight: 800, color: t.textDim, background: theme === 'dark' ? '#1e293b' : '#e2e8f0', padding: '1px 6px', borderRadius: 3, flexShrink: 0 }}>
                                  P{prioNum}/{totalActive}
                                </span>
                              )}
                              <span style={{ fontSize: 13, fontWeight: 700, color: t.surface, lineHeight: 1.3 }}>{epic.label}</span>
                            </div>
                            {epic.sublabel && <div style={{ fontSize: 11, color: sc.text, marginTop: 1 }}>{epic.sublabel}</div>}
                          </div>
                          <div style={{ display: 'flex', gap: 4, alignItems: 'center', flexShrink: 0 }}>
                            <span style={{ fontSize: 10, fontWeight: 700, color: confColor(epic.confidence) }}>{epic.confidence}%</span>
                            <SizeBadge size={epic.size} small />
                            <span style={{ fontSize: 10, color: t.textDim }}>{exp ? '▲' : '▼'}</span>
                          </div>
                        </div>
                        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', fontSize: 10, color: t.textMuted }}>
                          {epic.owners.length > 0 && <span>👤 {epic.owners.map(o => team.find(m => m.id === o)?.name).join(', ')}</span>}
                          {sprint && <span>📅 {sprint.label}</span>}
                          {epic.stories.length > 0 && !epic.stories.every(s => s.done) && <span>📌 {epic.stories.filter(s => s.done).length}/{epic.stories.length} HU</span>}
                          {epic.stories.length > 0 && epic.stories.every(s => s.done) && (
                            <span style={{ background: '#15803d', color: '#bbf7d0', fontWeight: 800, fontSize: 9, padding: '1px 6px', borderRadius: 10 }}>✓ DONE</span>
                          )}
                          {depLabels.length > 0 && <span style={{ color: '#f59e0b' }}>⚡ {depLabels.length} dep</span>}
                        </div>
                      </div>
                      {exp && (
                        <div onClick={e => e.stopPropagation()} style={{ borderTop: `1px solid ${sc.border}`, padding: 10, display: 'flex', flexDirection: 'column', gap: 8 }}>
                          <div>
                            <Label>Objetivo</Label>
                            <textarea value={epic.objective} onChange={e => ue(epic.id, { objective: e.target.value })}
                              style={{ width: '100%', background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, fontSize: 10, padding: '5px 7px', resize: 'vertical', minHeight: 36, lineHeight: 1.5 }} />
                          </div>
                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
                            <div><Label>Talla</Label><SizePicker value={epic.size} onChange={v => ue(epic.id, { size: v })} small /></div>
                            <div><Label>Confianza</Label><ConfidenceSlider value={epic.confidence} onChange={v => ue(epic.id, { confidence: v })} compact /></div>
                          </div>
                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
                            <div>
                              <Label>Owner</Label>
                              <select value={epic.owners[0] || ''} onChange={e => ue(epic.id, { owners: e.target.value ? [e.target.value] : [] })}
                                style={{ width: '100%', background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, fontSize: 10, padding: '3px 5px' }}>
                                <option value="">—</option>
                                {team.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                              </select>
                            </div>
                            <div>
                              <Label>Sprint inicio</Label>
                              <select value={epic.ss || ''} onChange={e => { const v = e.target.value || null; ue(epic.id, { ss: v, se: v || epic.se }); }}
                                style={{ width: '100%', background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, fontSize: 10, padding: '3px 5px' }}>
                                <option value="">—</option>
                                {SPRINTS.map(s => <option key={s.id} value={s.id}>{s.label} · {s.dates}</option>)}
                              </select>
                            </div>
                          </div>
                          {/* Stories */}
                          <div>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 3 }}>
                              <Label>Historias de usuario ({epic.stories.length})</Label>
                              {epic.stories.length > 1 && (
                                <button onClick={() => sortStBySprint(epic.id)}
                                  style={{ fontSize: 9, background: 'none', border: `1px solid ${t.border}`, borderRadius: 3, color: t.textMuted, padding: '1px 6px', cursor: 'pointer' }}
                                  title="Ordenar por sprint">⇅ Sprint</button>
                              )}
                            </div>
                            {epic.stories.map((s, si) => (
                              <div key={s.id} style={{ display: 'flex', gap: 5, alignItems: 'center', background: t.bgDeep, borderRadius: 4, padding: '5px 8px', marginBottom: 3, fontSize: 11 }}>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
                                  <button onClick={() => moveSt(epic.id, s.id, -1)} disabled={si === 0}
                                    style={{ background: 'none', border: 'none', color: si === 0 ? 'transparent' : t.textDim, cursor: si === 0 ? 'default' : 'pointer', fontSize: 7, lineHeight: 1, padding: '0 1px' }}>▲</button>
                                  <button onClick={() => moveSt(epic.id, s.id, 1)} disabled={si === epic.stories.length - 1}
                                    style={{ background: 'none', border: 'none', color: si === epic.stories.length - 1 ? 'transparent' : t.textDim, cursor: si === epic.stories.length - 1 ? 'default' : 'pointer', fontSize: 7, lineHeight: 1, padding: '0 1px' }}>▼</button>
                                </div>
                                <input type="checkbox" checked={s.done} onChange={() => updSt(epic.id, s.id, { done: !s.done })} style={{ cursor: 'pointer', width: 13, height: 13 }} />
                                <input value={s.title} onChange={e => updSt(epic.id, s.id, { title: e.target.value })}
                                  onClick={e => e.stopPropagation()}
                                  placeholder="Nombre de la HU..."
                                  style={{ flex: 1, fontSize: 11, color: s.done ? t.textDim : t.text, textDecoration: s.done ? 'line-through' : 'none', background: 'transparent', border: 'none', outline: 'none', minWidth: 0, padding: '0 2px', cursor: 'text', fontFamily: 'inherit' }} />
                                <SizePicker value={s.size} onChange={v => updSt(epic.id, s.id, { size: v })} small />
                                <select value={s.owner} onChange={e => updSt(epic.id, s.id, { owner: e.target.value })}
                                  style={{ width: 60, background: 'transparent', border: 'none', color: t.textFaint, fontSize: 9 }}>
                                  <option value="">—</option>
                                  {team.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                </select>
                                <select value={s.sprint || ''} onChange={e => updSt(epic.id, s.id, { sprint: e.target.value || null })}
                                  style={{ width: 38, background: 'transparent', border: 'none', color: t.textFaint, fontSize: 9 }}>
                                  <option value="">—</option>
                                  {SPRINTS.map(sp => <option key={sp.id} value={sp.id}>{sp.label}</option>)}
                                </select>
                                <button onClick={() => delSt(epic.id, s.id)} style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 12 }}>×</button>
                              </div>
                            ))}
                            <div style={{ display: 'flex', gap: 3, marginTop: 3 }}>
                              <input value={nSt} onChange={e => setNSt(e.target.value)}
                                onKeyDown={e => { if (e.key === 'Enter' && nSt.trim()) { addSt(epic.id, nSt.trim()); setNSt(''); } }}
                                placeholder="Añadir HU..." style={{ flex: 1, fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 3, color: t.text, padding: '3px 5px' }} />
                              <button onClick={() => { if (nSt.trim()) { addSt(epic.id, nSt.trim()); setNSt(''); } }}
                                style={{ background: sc.badge, border: 'none', borderRadius: 3, color: '#fff', fontSize: 11, padding: '3px 8px', cursor: 'pointer', fontWeight: 700 }}>+</button>
                            </div>
                          </div>
                          <div>
                            <Label>Notas</Label>
                            <textarea value={epic.notes} onChange={e => ue(epic.id, { notes: e.target.value })} placeholder="Acuerdos..."
                              style={{ width: '100%', background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, fontSize: 10, padding: '5px 7px', resize: 'vertical', minHeight: 30, lineHeight: 1.5 }} />
                          </div>
                          <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
                            <label style={{ display: 'flex', gap: 5, alignItems: 'center', fontSize: 10, color: t.textMuted, cursor: 'pointer' }}>
                              <input type="checkbox" checked={!!epic.noProgress} onChange={() => ue(epic.id, { noProgress: !epic.noProgress })} />
                              Sin indicador de progreso en Timeline
                            </label>
                            <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                              <span style={{ fontSize: 10, color: t.textMuted }}>Color en Timeline:</span>
                              <input type="color" value={epic.color || team.find(m => m.id === epic.owners[0])?.color || '#64748b'}
                                onChange={e => ue(epic.id, { color: e.target.value })}
                                style={{ width: 22, height: 22, border: 'none', borderRadius: 4, cursor: 'pointer', padding: 0 }} />
                            </div>
                          </div>
                          {depLabels.length > 0 && (
                            <div style={{ display: 'flex', gap: 3, flexWrap: 'wrap' }}>
                              {depLabels.map((d, i) => <span key={i} style={{ fontSize: 9, background: theme === 'dark' ? '#2a1a00' : '#fef3c7', border: '1px solid #92400e', color: '#b45309', padding: '1px 5px', borderRadius: 3 }}>⚡ {d}</span>)}
                            </div>
                          )}
                          <div style={{ display: 'flex', gap: 3, flexWrap: 'wrap' }}>
                            {epic.status === 'deferred' && <button onClick={() => move(epic.id, 'confirmed')} style={mBtn('#1d4ed8', '#93c5fd')}>↑ Mover a Q2</button>}
                            {epic.status !== 'deferred' && <button onClick={() => move(epic.id, 'deferred')} style={mBtn('#374151', '#94a3b8')}>→ Diferir</button>}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                {col.list.length === 0 && <div style={{ fontSize: 11, color: t.textDim, fontStyle: 'italic', padding: 12, textAlign: 'center' }}>Arrastra épicas aquí</div>}
              </div>
              {/* Add new epic — all columns */}
              <div style={{ marginTop: 8, padding: '0 2px' }}>
                <div style={{ display: 'flex', gap: 3 }}>
                  <input value={newEpic[col.key] || ''} onChange={e => setNewEpic(p => ({ ...p, [col.key]: e.target.value }))}
                    onKeyDown={e => { if (e.key === 'Enter') addNewEpic(col.key); }}
                    placeholder="Nueva épica..."
                    style={{ flex: 1, fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '5px 7px' }} />
                  <button onClick={() => addNewEpic(col.key)}
                    style={{ background: sc.badge, border: 'none', borderRadius: 4, color: '#fff', fontSize: 11, padding: '5px 10px', cursor: 'pointer', fontWeight: 700 }}>+</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
function mBtn(bg, color) { return { fontSize: 9, padding: '2px 8px', background: bg, border: 'none', borderRadius: 3, color, cursor: 'pointer', fontWeight: 600 }; }

// ═══════════════════════════════════════════════════════════════════════════════
// CAPACITY TAB
// ═══════════════════════════════════════════════════════════════════════════════
function CapacidadTab({ epics, team, config }) {
  const t = useTheme();
  const w = sizeWeight(config);
  const { perSprint, effective, total: cap } = teamCap(team, config);
  const active = epics.filter(e => e.status !== 'deferred');
  const load = totalLoad(active, config);
  const pct = cap > 0 ? Math.round((load / cap) * 100) : 0;
  const loadColor = pct > 80 ? '#ef4444' : pct > 60 ? '#f59e0b' : '#22c55e';
  const loadHealth = pct > 100 ? { text: '⚠ Sobrecargado — diferir épicas', color: '#ef4444' }
    : pct > 80  ? { text: '⚠ En límite — revisar prioridades', color: '#ef4444' }
    : pct > 60  ? { text: '🔶 Bien cargado — margen ajustado', color: '#f59e0b' }
    : pct > 20  ? { text: '✓ Bien planificado', color: '#22c55e' }
    : { text: '○ Sin planificar todavía', color: '#64748b' };
  const [selectedSprint, setSelectedSprint] = useState(null);

  const storyCounts = {};
  SIZES.forEach(s => { storyCounts[s] = 0; });
  active.forEach(e => e.stories.forEach(s => { if (s.size) storyCounts[s.size]++; }));

  const breakdown = sprintBreakdown(epics, team, config);

  return (
    <div>
      {/* Title row */}
      <div style={{ marginBottom: 14 }}>
        <h2 style={{ fontSize: 15, fontWeight: 700, color: t.heading, marginBottom: 2 }}>Capacidad Q2</h2>
        <div style={{ fontSize: 11, color: t.textMuted }}>
          Ref: dev 100% → {SIZES.map(s => `${config.sizes[s]}${s}`).join(' / ')} por sprint · Buffer {config.bufferPct}%
        </div>
      </div>

      {/* Load bar — full-width header above sprints */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: '10px 16px', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 20, flexWrap: 'wrap' }}>
        {/* Stats */}
        <div style={{ display: 'flex', gap: 20, alignItems: 'center', flexShrink: 0 }}>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 24, fontWeight: 900, color: loadColor, lineHeight: 1 }}>{pct}<span style={{ fontSize: 12 }}>%</span></div>
            <div style={{ fontSize: 9, color: t.textDim, textTransform: 'uppercase' }}>Carga Q2</div>
          </div>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: t.heading, lineHeight: 1 }}>{Math.round(load)}</div>
            <div style={{ fontSize: 9, color: t.textDim, textTransform: 'uppercase' }}>pts plan.</div>
          </div>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: t.textMuted, lineHeight: 1 }}>{cap}</div>
            <div style={{ fontSize: 9, color: t.textDim, textTransform: 'uppercase' }}>pts cap.</div>
          </div>
        </div>
        {/* Bar + health */}
        <div style={{ flex: 1, minWidth: 200 }}>
          <div style={{ position: 'relative', height: 12, background: t.bg, borderRadius: 6, overflow: 'visible', marginBottom: 4 }}>
            <div style={{ position: 'absolute', top: 0, left: 0, height: '100%', width: `${Math.min(100, pct)}%`, background: loadColor, borderRadius: 6, overflow: 'hidden' }} />
            <div style={{ position: 'absolute', top: -3, left: '80%', width: 2, height: 18, background: '#ef4444', borderRadius: 1, opacity: 0.75 }} title="Umbral 80%" />
            <div style={{ position: 'absolute', top: -13, left: '80%', transform: 'translateX(-50%)', fontSize: 8, color: '#ef4444', fontWeight: 700, whiteSpace: 'nowrap', opacity: 0.85 }}>80%</div>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10 }}>
            <span style={{ fontWeight: 700, color: loadHealth.color }}>{loadHealth.text}</span>
            <span style={{ color: t.textMuted }}>{Math.round(load)} / {cap} pts</span>
          </div>
        </div>
        {/* Size pills */}
        <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
          {SIZES.map(s => (
            <div key={s} style={{ textAlign: 'center', background: t.bg, borderRadius: 6, padding: '4px 10px', border: `1px solid ${SIZE_COLORS[s]}33` }}>
              <div style={{ fontSize: 14, fontWeight: 800, color: SIZE_COLORS[s] }}>{storyCounts[s]}</div>
              <div style={{ fontSize: 8, color: t.textDim }}>{s} · {Math.round(storyCounts[s] * w[s])}p</div>
            </div>
          ))}
        </div>
      </div>

      {/* Sprint breakdown — full width */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
          <Label>Carga y confianza por sprint</Label>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
            {breakdown.map((sb, i) => {
              const lc = sb.pct > 100 ? '#ef4444' : sb.pct > 85 ? '#f59e0b' : '#2563eb';
              const isSelected = selectedSprint === sb.sprint.id;
              const isCurrent = !!sb.sprint.current;
              return (
                <div key={sb.sprint.id}
                  onClick={() => setSelectedSprint(p => p === sb.sprint.id ? null : sb.sprint.id)}
                  style={{ background: isSelected ? (t.bg === '#f1f5f9' ? '#e8f0fe' : '#0d1e3a') : t.bg, borderRadius: 8, padding: '14px 12px', border: `1.5px solid ${isCurrent ? '#f59e0b' : isSelected ? t.accent : t.border}`, cursor: 'pointer', transition: 'border 0.15s, background 0.15s', position: 'relative' }}>
                  {isCurrent && <div style={{ position: 'absolute', top: -1, right: 8, fontSize: 8, fontWeight: 800, background: '#f59e0b', color: '#000', padding: '1px 6px', borderRadius: '0 0 4px 4px', letterSpacing: 0.5, textTransform: 'uppercase' }}>Actual</div>}
                  {/* Sprint header */}
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 800, color: isCurrent ? '#f59e0b' : t.heading }}>{sb.sprint.full}</div>
                      <div style={{ fontSize: 9, color: t.textFaint, marginTop: 1 }}>{sb.sprint.dates}</div>
                    </div>
                    <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                      <span style={{ fontSize: 9, fontWeight: 700, color: t.textDim, background: t.bgAlt, padding: '2px 6px', borderRadius: 4 }}>{sb.epicCount} ép.</span>
                      <span style={{ fontSize: 9, color: isSelected ? t.accent : t.textFaint }}>{ isSelected ? '▲' : '▼' }</span>
                    </div>
                  </div>

                  {/* Load section */}
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 5 }}>
                      <span style={{ fontSize: 9, color: t.textDim, textTransform: 'uppercase', letterSpacing: 0.4 }}>Carga</span>
                      <span style={{ fontSize: 9, color: t.textMuted }}>{sb.load} / {sb.capacity} pts</span>
                    </div>
                    <div style={{ height: 8, background: t.border, borderRadius: 4, overflow: 'hidden', marginBottom: 6 }}>
                      <div style={{ height: '100%', width: `${Math.min(100, sb.pct)}%`, background: lc, borderRadius: 4 }} />
                    </div>
                    <div style={{ fontSize: 28, fontWeight: 900, color: lc, lineHeight: 1 }}>{sb.pct}<span style={{ fontSize: 14 }}>%</span></div>
                  </div>

                  {/* Confidence section */}
                  <div style={{ borderTop: `1px solid ${t.border}`, paddingTop: 10 }}>
                    <div style={{ fontSize: 9, color: t.textDim, textTransform: 'uppercase', letterSpacing: 0.4, marginBottom: 5 }}>Confianza</div>
                    {sb.confidence > 0 ? (
                      <>
                        <div style={{ height: 6, background: t.border, borderRadius: 3, overflow: 'hidden', marginBottom: 6 }}>
                          <div style={{ height: '100%', width: `${sb.confidence}%`, background: confColor(sb.confidence), borderRadius: 3 }} />
                        </div>
                        <div style={{ fontSize: 24, fontWeight: 900, color: confColor(sb.confidence), lineHeight: 1 }}>{sb.confidence}<span style={{ fontSize: 12 }}>%</span></div>
                      </>
                    ) : (
                      <div style={{ fontSize: 18, fontWeight: 700, color: t.textDim }}>—</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Sprint detail panel — shown when a sprint is selected */}
          {selectedSprint && (() => {
            const sb = breakdown.find(b => b.sprint.id === selectedSprint);
            if (!sb) return null;
            const members = memberSprintDetail(selectedSprint, epics, team, config);
            const rec = sprintRecommendation(sb.pct);
            return (
              <div style={{ marginTop: 14, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 8, padding: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12, flexWrap: 'wrap', gap: 6 }}>
                  <div>
                    <span style={{ fontSize: 13, fontWeight: 800, color: t.heading }}>{sb.sprint.full} — detalle por miembro</span>
                    <span style={{ fontSize: 10, color: t.textFaint, marginLeft: 8 }}>{sb.sprint.dates}</span>
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 600, color: rec.color }}>{rec.text}</span>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: `repeat(${Math.min(team.length, 5)}, 1fr)`, gap: 10 }}>
                  {members.map(({ member, counts, pts, total, memberCap, pct: mPct, stories }) => {
                    const mc = mPct > 105 ? '#ef4444' : mPct > 85 ? '#f59e0b' : mPct > 10 ? '#22c55e' : '#64748b';
                    return (
                      <div key={member.id} style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 7, padding: 10 }}>
                        <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: 8 }}>
                          <div style={{ width: 22, height: 22, borderRadius: '50%', background: member.color + '22', border: `2px solid ${member.color}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, fontWeight: 800, color: member.color, flexShrink: 0 }}>{member.name.charAt(0)}</div>
                          <div style={{ minWidth: 0 }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: t.heading, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{member.name}</div>
                            <div style={{ fontSize: 9, color: t.textFaint }}>{pts} / {memberCap} pts · <span style={{ color: mc, fontWeight: 700 }}>{mPct}%</span></div>
                          </div>
                        </div>
                        {/* Size counts */}
                        <div style={{ display: 'flex', gap: 4, marginBottom: 8, flexWrap: 'wrap' }}>
                          {SIZES.map(s => counts[s] > 0 && (
                            <div key={s} style={{ background: SIZE_COLORS[s] + '22', border: `1px solid ${SIZE_COLORS[s]}66`, borderRadius: 4, padding: '3px 7px', textAlign: 'center' }}>
                              <div style={{ fontSize: 13, fontWeight: 800, color: SIZE_COLORS[s] }}>{counts[s]}</div>
                              <div style={{ fontSize: 8, color: SIZE_COLORS[s], fontWeight: 700 }}>{s}</div>
                            </div>
                          ))}
                          {total === 0 && <span style={{ fontSize: 10, color: t.textFaint, fontStyle: 'italic' }}>Sin HUs</span>}
                        </div>
                        {/* Story list */}
                        {stories.length > 0 && (
                          <div style={{ display: 'flex', flexDirection: 'column', gap: 2, maxHeight: 110, overflowY: 'auto' }}>
                            {stories.map((s, si) => (
                              <div key={si} style={{ fontSize: 9, color: s.done ? t.textDim : t.textMuted, display: 'flex', gap: 4, alignItems: 'flex-start' }}>
                                <span style={{ color: SIZE_COLORS[s.size] || '#64748b', fontWeight: 700, flexShrink: 0 }}>[{s.size}]</span>
                                <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', textDecoration: s.done ? 'line-through' : 'none' }} title={`${s.epicLabel}: ${s.title}`}>{s.title}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}
        </div>
    </div>
  );
}

// TIMELINE TAB — GANTT WITH DRAG
// ═══════════════════════════════════════════════════════════════════════════════
function TimelineTab({ epics, setEpics, team, config, onNavigateToEpic }) {
  const t = useTheme();
  const [expEpics, setExpEpics] = useState({});
  const [drag, setDrag] = useState(null);
  const [padL, setPadL] = useState(220);
  const colW = 160;

  const startResizeCol = useCallback((e) => {
    e.preventDefault();
    e.stopPropagation();
    const startX = e.clientX;
    const startPadL = padL;
    const onMove = (ev) => {
      const newPadL = Math.min(500, Math.max(120, startPadL + (ev.clientX - startX)));
      setPadL(newPadL);
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }, [padL]);
  const epicH = config.epicRowH || 40;
  const storyH = Math.round(epicH * 0.6);

  const vis = epics.filter(e => e.ss && e.status !== 'deferred');
  const unscheduled = epics.filter(e => !e.ss && e.status !== 'deferred');

  const DIVIDER_H = 28;
  const rows = [];
  vis.forEach(epic => {
    rows.push({ type: 'epic', epic });
    if (config.showStories && expEpics[epic.id]) {
      // Sort stories by sprint before rendering — earlier sprints first, unassigned last
      const sortedStories = [...epic.stories].sort((a, b) => {
        const ai = a.sprint != null ? (SI[a.sprint] ?? 999) : 999;
        const bi = b.sprint != null ? (SI[b.sprint] ?? 999) : 999;
        return ai - bi;
      });
      sortedStories.forEach(story => rows.push({ type: 'story', story, epic }));
    }
  });
  if (unscheduled.length > 0) {
    rows.push({ type: 'divider', label: `Sin programar (${unscheduled.length})` });
    unscheduled.forEach(epic => rows.push({ type: 'epic-unscheduled', epic }));
  }

  const rowH = (r) => r.type === 'epic' || r.type === 'epic-unscheduled' ? epicH : r.type === 'divider' ? DIVIDER_H : storyH;
  const totalH = rows.reduce((s, r) => s + rowH(r), 0);
  const totalW = padL + (SPRINTS.length + Q3_COLS) * colW;

  const startDrag = useCallback((e, epicId, type) => {
    e.preventDefault();
    const epic = epics.find(x => x.id === epicId);
    if (!epic || !epic.ss) return;
    const origS = SI[epic.ss];
    const origE = SI[epic.se || epic.ss];
    const startX = e.clientX;

    const state = { epicId, type, startX, origS, origE, newS: origS, newE: origE };
    setDrag(state);

    const onMove = (ev) => {
      const delta = Math.round((ev.clientX - startX) / colW);
      let nS = origS, nE = origE;
      if (type === 'move') {
        const dur = origE - origS;
        nS = Math.max(0, Math.min(SPRINTS.length - 1 - dur, origS + delta));
        nE = nS + dur;
      } else if (type === 'left') {
        nS = Math.max(0, Math.min(origE, origS + delta));
        nE = origE;
      } else if (type === 'right') {
        nS = origS;
        nE = Math.max(origS, Math.min(SPRINTS.length - 1, origE + delta));
      }
      setDrag(prev => prev ? { ...prev, newS: nS, newE: nE } : null);
    };

    const onUp = () => {
      setDrag(prev => {
        if (prev) {
          setEpics(p => p.map(x => x.id === prev.epicId ? { ...x, ss: SPRINTS[prev.newS].id, se: SPRINTS[prev.newE].id } : x));
        }
        return null;
      });
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };

    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }, [epics, colW, padL, setEpics]);

  const depLines = [];
  if (config.showDeps) {
    vis.forEach(epic => {
      (epic.deps || []).forEach(depId => {
        const dep = vis.find(e => e.id === depId);
        if (!dep || !dep.ss) return;
        const fi = rows.findIndex(r => r.type === 'epic' && r.epic.id === depId);
        const ti = rows.findIndex(r => r.type === 'epic' && r.epic.id === epic.id);
        if (fi < 0 || ti < 0) return;
        let fy = 0; for (let i = 0; i < fi; i++) fy += rowH(rows[i]);
        let ty = 0; for (let i = 0; i < ti; i++) ty += rowH(rows[i]);
        const dse = SI[dep.se || dep.ss];
        const ess = SI[epic.ss];
        depLines.push({ x1: padL + (dse + 1) * colW, y1: fy + epicH / 2, x2: padL + ess * colW, y2: ty + epicH / 2, key: `${depId}-${epic.id}` });
      });
    });
  }

  return (
    <div>
      <h2 style={{ fontSize: 15, fontWeight: 700, color: t.heading, marginBottom: 3 }}>Timeline Q2 2026</h2>
      <div style={{ fontSize: 11, color: t.textMuted, marginBottom: 12 }}>
        Arrastra las barras para mover. Usa los bordes para extender/reducir. Clic en épica para ver HUs.
      </div>
      <div style={{ overflow: 'auto', border: `1px solid ${t.border}`, borderRadius: 8, background: t.bgAlt, position: 'relative', maxHeight: 'calc(100vh - 240px)' }}>
        <div style={{ minWidth: totalW, position: 'relative' }}>
          <div style={{ display: 'flex', position: 'sticky', top: 0, zIndex: 10, background: t.bgAlt, borderBottom: `1px solid ${t.border}` }}>
            <div style={{ width: padL, flexShrink: 0, padding: '10px 12px', fontSize: 10, fontWeight: 700, color: t.textDim, position: 'relative', userSelect: 'none' }}>
              ÉPICA
              <div onMouseDown={startResizeCol}
                style={{ position: 'absolute', right: 0, top: 0, width: 6, height: '100%', cursor: 'col-resize', background: 'transparent', zIndex: 20 }}
                title="Arrastra para redimensionar">
                <div style={{ position: 'absolute', right: 2, top: '25%', height: '50%', width: 2, background: t.border, borderRadius: 1 }} />
              </div>
            </div>
            {SPRINTS.map(s => (
              <div key={s.id} style={{ width: colW, flexShrink: 0, padding: '6px 8px', textAlign: 'center', borderLeft: `1px solid ${s.current ? '#f59e0b' : t.border}`, background: s.current ? '#f59e0b18' : 'transparent', position: 'relative' }}>
                {s.current && <div style={{ position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)', fontSize: 7, fontWeight: 800, background: '#f59e0b', color: '#000', padding: '1px 6px', borderRadius: '0 0 3px 3px', letterSpacing: 0.5, textTransform: 'uppercase', whiteSpace: 'nowrap' }}>Actual</div>}
                <div style={{ fontSize: 13, fontWeight: 700, color: s.current ? '#f59e0b' : t.heading, marginTop: s.current ? 10 : 0 }}>{s.full}</div>
                <div style={{ fontSize: 10, color: t.textFaint }}>{s.dates}</div>
              </div>
            ))}
            {/* Q3 zone header */}
            <div style={{ width: Q3_COLS * colW, flexShrink: 0, padding: '6px 8px', textAlign: 'center', borderLeft: `2px dashed ${t.border}`, background: t.bgDeep, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: t.textDim }}>Q3 2026</span>
              <span style={{ fontSize: 10, color: t.textFaint }}>Jul →</span>
            </div>
          </div>

          <div style={{ position: 'relative' }}>
            {SPRINTS.map((s, i) => (
              <div key={s.id} style={{ position: 'absolute', left: padL + i * colW, top: 0, width: 1, height: Math.max(totalH, 200), background: t.border, zIndex: 1 }} />
            ))}
            {/* Q3 shaded zone */}
            <div style={{ position: 'absolute', left: padL + SPRINTS.length * colW, top: 0, width: Q3_COLS * colW, height: Math.max(totalH, 200), background: t.bgDeep, opacity: 0.8, borderLeft: `2px dashed ${t.border}`, zIndex: 1, pointerEvents: 'none' }}>
              <span style={{ position: 'absolute', top: 8, left: '50%', transform: 'translateX(-50%)', fontSize: 10, fontWeight: 700, color: t.textFaint, letterSpacing: 1, whiteSpace: 'nowrap' }}>Q3 →</span>
            </div>

            {depLines.length > 0 && (
              <svg style={{ position: 'absolute', top: 0, left: 0, width: totalW, height: Math.max(totalH, 200), pointerEvents: 'none', zIndex: 5 }}>
                <defs><marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0 0 L7 2.5 L0 5z" fill={config.depColor || '#f59e0b'} /></marker></defs>
                {depLines.map(l => {
                  const mx = (l.x1 + l.x2) / 2;
                  return <path key={l.key} d={`M${l.x1} ${l.y1} C${mx} ${l.y1},${mx} ${l.y2},${l.x2} ${l.y2}`} fill="none" stroke={config.depColor || '#f59e0b'} strokeWidth="2" strokeDasharray="5 3" markerEnd="url(#ah)" opacity="0.7" />;
                })}
              </svg>
            )}

            {rows.map((row, ri) => {
              let yo = 0; for (let i = 0; i < ri; i++) yo += rowH(rows[i]);
              const h = rowH(row);

              if (row.type === 'epic') {
                const epic = row.epic;
                const isDrag = drag && drag.epicId === epic.id;
                const sIdx = isDrag ? drag.newS : SI[epic.ss];
                const eIdx = isDrag ? drag.newE : SI[epic.se || epic.ss];
                const bL = padL + sIdx * colW + 3;
                const bW = (eIdx - sIdx + 1) * colW - 6;
                const ownerColor = team.find(m => m.id === epic.owners[0])?.color || '#64748b';
                const oc = epic.color || ownerColor;
                const doneStories = epic.stories.filter(s => s.done).length;
                const totalStories = epic.stories.length;
                const progPct = totalStories > 0 ? Math.round((doneStories / totalStories) * 100) : 0;
                const showProgress = !epic.noProgress && totalStories > 0;
                const isComplete = totalStories > 0 && doneStories === totalStories;

                return (
                  <div key={epic.id} style={{ position: 'absolute', top: yo, left: 0, width: totalW, height: h, display: 'flex', alignItems: 'center', borderBottom: `1px solid ${t.border}22` }}>
                    <div style={{ width: padL, flexShrink: 0, padding: '0 8px', display: 'flex', alignItems: 'center', gap: 5, overflow: 'hidden' }}>
                      {config.showStories && (
                        <span onClick={() => setExpEpics(p => ({ ...p, [epic.id]: !p[epic.id] }))}
                          style={{ fontSize: 9, color: t.textDim, cursor: 'pointer', flexShrink: 0 }}>{expEpics[epic.id] ? '▼' : '▶'}</span>
                      )}
                      <input type="color" value={oc}
                        onChange={e => setEpics(p => p.map(x => x.id === epic.id ? { ...x, color: e.target.value } : x))}
                        title="Cambiar color"
                        style={{ width: 14, height: 14, border: 'none', borderRadius: 3, cursor: 'pointer', padding: 0, flexShrink: 0, background: 'transparent' }} />
                      <span style={{ fontSize: config.epicLabelSize || 12, fontWeight: 700, color: isComplete ? '#22c55e' : t.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{epic.label}</span>
                      {isComplete && <span style={{ fontSize: 9, fontWeight: 800, background: '#15803d', color: '#bbf7d0', padding: '1px 5px', borderRadius: 4, flexShrink: 0 }}>✓ DONE</span>}
                      {!isComplete && <SizeBadge size={epic.size} small />}
                    </div>
                    <div style={{ position: 'absolute', left: bL, top: 5, height: h - 10, width: bW,
                      background: isComplete ? '#15803d44' : `${oc}22`,
                      border: isComplete ? '1.5px solid #22c55e' : `1px solid ${oc}88`,
                      borderRadius: 4, overflow: 'hidden', zIndex: 3, userSelect: 'none' }}>
                      {/* Progress fill — full green when complete */}
                      {isComplete && <div style={{ position: 'absolute', top: 0, left: 0, height: '100%', width: '100%', background: '#22c55e33', pointerEvents: 'none' }} />}
                      {showProgress && !isComplete && <div style={{ position: 'absolute', top: 0, left: 0, height: '100%', width: `${progPct}%`, background: `${oc}55`, transition: 'width 0.3s', pointerEvents: 'none' }} />}
                      <div onMouseDown={e => startDrag(e, epic.id, 'left')}
                        style={{ position: 'absolute', left: 0, top: 0, width: 7, height: '100%', cursor: 'ew-resize', borderRadius: '4px 0 0 4px', background: isDrag && drag.type === 'left' ? `${oc}66` : 'transparent', zIndex: 2 }} />
                      <div onMouseDown={e => startDrag(e, epic.id, 'move')}
                        style={{ position: 'absolute', left: 7, right: 7, top: 0, bottom: 0, cursor: 'grab', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 8px', overflow: 'hidden', zIndex: 1 }}>
                        <span style={{ fontSize: Math.max(9, (config.epicLabelSize || 12) - 1), fontWeight: 600, color: isComplete ? '#22c55e' : oc, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{epic.label}</span>
                        {isComplete
                          ? <span style={{ fontSize: 11, fontWeight: 800, color: '#22c55e', flexShrink: 0, marginLeft: 6 }}>✓</span>
                          : showProgress && <span style={{ fontSize: 10, fontWeight: 700, color: oc, flexShrink: 0, marginLeft: 6, background: `${oc}22`, padding: '1px 5px', borderRadius: 4 }}>{doneStories}/{totalStories}</span>
                        }
                      </div>
                      <div onMouseDown={e => startDrag(e, epic.id, 'right')}
                        style={{ position: 'absolute', right: 0, top: 0, width: 7, height: '100%', cursor: 'ew-resize', borderRadius: '0 4px 4px 0', background: isDrag && drag.type === 'right' ? `${oc}66` : 'transparent', zIndex: 2 }} />
                    </div>
                  </div>
                );
              } else if (row.type === 'divider') {
                return (
                  <div key={`divider-${ri}`} style={{ position: 'absolute', top: yo, left: 0, width: totalW, height: h, display: 'flex', alignItems: 'center', background: t.bgDeep, borderTop: `1px dashed ${t.border}`, borderBottom: `1px dashed ${t.border}`, zIndex: 2 }}>
                    <div style={{ width: padL, flexShrink: 0, padding: '0 12px', display: 'flex', alignItems: 'center', gap: 6 }}>
                      <span style={{ fontSize: 9, fontWeight: 700, color: t.textFaint, textTransform: 'uppercase', letterSpacing: 1 }}>⚠ {row.label}</span>
                    </div>
                    <div style={{ flex: 1, height: 1, borderTop: `1px dashed ${t.border}`, opacity: 0.5 }} />
                  </div>
                );
              } else if (row.type === 'epic-unscheduled') {
                const epic = row.epic;
                const ownerColor = team.find(m => m.id === epic.owners[0])?.color || '#64748b';
                const oc = epic.color || ownerColor;
                return (
                  <div key={epic.id} onClick={() => onNavigateToEpic && onNavigateToEpic(epic.id)} title="Ir a épica"
                    style={{ position: 'absolute', top: yo, left: 0, width: totalW, height: h, display: 'flex', alignItems: 'center', borderBottom: `1px solid ${t.border}11`, opacity: 0.65, cursor: 'pointer' }}>
                    <div style={{ width: padL, flexShrink: 0, padding: '0 8px', display: 'flex', alignItems: 'center', gap: 5, overflow: 'hidden' }}>
                      <input type="color" value={oc}
                        onChange={e => setEpics(p => p.map(x => x.id === epic.id ? { ...x, color: e.target.value } : x))}
                        style={{ width: 14, height: 14, border: 'none', borderRadius: 3, cursor: 'pointer', padding: 0, flexShrink: 0, background: 'transparent' }} />
                      <span style={{ fontSize: config.epicLabelSize || 12, fontWeight: 700, color: t.textMuted, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{epic.label}</span>
                      <SizeBadge size={epic.size} small />
                    </div>
                    <div style={{ position: 'absolute', left: padL + 8, top: '50%', transform: 'translateY(-50%)', fontSize: 9, color: t.textFaint, fontStyle: 'italic' }}>
                      Asigna sprint en Épicas Q2 →
                    </div>
                  </div>
                );
              } else {
                const story = row.story;
                const epic = row.epic;
                const oc = team.find(m => m.id === story.owner)?.color || '#64748b';
                const navToEpic = () => onNavigateToEpic && onNavigateToEpic(epic.id);
                if (!story.sprint) return (
                  <div key={story.id} onClick={navToEpic} title="Ir a épica"
                    style={{ position: 'absolute', top: yo, left: 0, width: totalW, height: h, display: 'flex', alignItems: 'center', borderBottom: `1px solid ${t.border}11`, cursor: 'pointer' }}>
                    <div style={{ width: padL, padding: '0 10px 0 30px', fontSize: 9, color: t.textDim, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                      {story.done ? '✓' : '○'} {story.title}
                    </div>
                  </div>
                );
                const si = SI[story.sprint];
                const bl = padL + si * colW + 6;
                const bw = colW - 12;
                return (
                  <div key={story.id} onClick={navToEpic} title={`→ ${epic.label}`}
                    style={{ position: 'absolute', top: yo, left: 0, width: totalW, height: h, display: 'flex', alignItems: 'center', borderBottom: `1px solid ${t.border}11`, cursor: 'pointer' }}>
                    <div style={{ width: padL, padding: '0 10px 0 30px', fontSize: 9, color: story.done ? t.textDim : t.textMuted, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', textDecoration: story.done ? 'line-through' : 'none' }}>
                      {story.done ? '✓' : '○'} {story.title} <SizeBadge size={story.size} small />
                    </div>
                    <div style={{ position: 'absolute', left: bl, top: 3, height: h - 6, width: bw, background: `${oc}22`, border: `1px solid ${oc}44`, borderRadius: 3, display: 'flex', alignItems: 'center', padding: '0 5px', zIndex: 3 }}>
                      <span style={{ fontSize: 8, color: oc, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{story.title}</span>
                    </div>
                  </div>
                );
              }
            })}
            <div style={{ height: Math.max(totalH, 200) }} />
          </div>
        </div>
      </div>
      {vis.length === 0 && <div style={{ padding: 30, textAlign: 'center', color: t.textDim }}>Asigna sprint de inicio en Épicas Q2 para ver el timeline.</div>}
    </div>
  );
}

// COST PANEL (HIDDEN — double-click title to reveal)
// ═══════════════════════════════════════════════════════════════════════════════
function CostPanel({ team, setTeam, config, setConfig, epics }) {
  const t = useTheme();
  const costs = calcCosts(team, config);
  const eCosts = epicCosts(epics, team, config);
  const totalEpicCost = eCosts.reduce((s, e) => s + e.cost, 0);
  const fmt = n => n.toLocaleString('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });

  return (
    <div style={{ maxWidth: 960 }}>
      <h2 style={{ fontSize: 15, fontWeight: 700, color: t.heading, marginBottom: 3 }}>💰 Costos del Equipo Q2</h2>
      <div style={{ fontSize: 11, color: t.textMuted, marginBottom: 4 }}>
        Panel privado. Solo visible al activar el modo costos (doble-clic en título).
      </div>
      <div style={{ fontSize: 10, color: '#f59e0b', marginBottom: 16 }}>⚠ Los valores configurados aquí no se exportan en el JSON por defecto. Configura antes de compartir.</div>

      {/* Hours per sprint config */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, marginBottom: 14 }}>
        <Label>Horas base por sprint (antes de multiplicador)</Label>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <input type="number" min="1" value={config.hoursPerSprint || 80}
            onChange={e => setConfig(p => ({ ...p, hoursPerSprint: Math.max(1, parseInt(e.target.value) || 80) }))}
            style={{ width: 80, fontSize: 13, fontWeight: 700, color: t.heading, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, padding: '5px 8px', textAlign: 'center' }} />
          <span style={{ fontSize: 11, color: t.textMuted }}>horas/sprint (2 semanas, 10 días lab.)</span>
        </div>
      </div>

      {/* Per member costs */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, marginBottom: 14 }}>
        <Label>Costos por miembro</Label>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {team.map(m => (
            <div key={m.id} style={{ display: 'flex', gap: 8, alignItems: 'center', padding: '6px 0', borderBottom: `1px solid ${t.border}22` }}>
              <div style={{ width: 7, height: 7, borderRadius: '50%', background: m.color, flexShrink: 0 }} />
              <span style={{ fontSize: 11, fontWeight: 600, color: t.text, width: 110, flexShrink: 0 }}>{m.name}</span>
              <select value={m.type || 'internal'} onChange={e => setTeam(p => p.map(x => x.id === m.id ? { ...x, type: e.target.value } : x))}
                style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '3px 5px', width: 75 }}>
                <option value="internal">Interno</option>
                <option value="external">Externo</option>
              </select>
              {(m.type || 'internal') === 'internal' ? (
                <div style={{ display: 'flex', gap: 4, alignItems: 'center', flex: 1 }}>
                  <span style={{ fontSize: 9, color: t.textDim }}>€/mes:</span>
                  <input type="number" min="0" value={m.monthlyCost || 0}
                    onChange={e => setTeam(p => p.map(x => x.id === m.id ? { ...x, monthlyCost: parseFloat(e.target.value) || 0 } : x))}
                    style={{ width: 80, fontSize: 11, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 6px' }} />
                  <span style={{ fontSize: 9, color: t.textFaint, marginLeft: 'auto' }}>{fmt(costs.members.find(c => c.id === m.id)?.costPerSprint || 0)}/sprint</span>
                </div>
              ) : (
                <div style={{ display: 'flex', gap: 4, alignItems: 'center', flex: 1 }}>
                  <span style={{ fontSize: 9, color: t.textDim }}>€/h:</span>
                  <input type="number" min="0" value={m.hourlyRate || 0}
                    onChange={e => setTeam(p => p.map(x => x.id === m.id ? { ...x, hourlyRate: parseFloat(e.target.value) || 0 } : x))}
                    style={{ width: 70, fontSize: 11, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 6px' }} />
                  <span style={{ fontSize: 9, color: t.textFaint }}>× {Math.round((config.hoursPerSprint || 80) * m.capMult)}h</span>
                  <span style={{ fontSize: 9, color: t.textFaint, marginLeft: 'auto' }}>{fmt(costs.members.find(c => c.id === m.id)?.costPerSprint || 0)}/sprint</span>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Summary */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
        <Label>Resumen de costos Q2 ({SPRINTS.length} sprints)</Label>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
          <div style={{ textAlign: 'center', padding: 10, background: t.bg, borderRadius: 6 }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: t.heading }}>{fmt(costs.totalPerSprint)}</div>
            <div style={{ fontSize: 10, color: t.textMuted }}>Por sprint</div>
          </div>
          <div style={{ textAlign: 'center', padding: 10, background: t.bg, borderRadius: 6 }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: t.heading }}>{fmt(costs.totalPerSprint * 2)}</div>
            <div style={{ fontSize: 10, color: t.textMuted }}>Por mes</div>
          </div>
          <div style={{ textAlign: 'center', padding: 10, background: t.bg, borderRadius: 6 }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: '#3b82f6' }}>{fmt(costs.totalQ2)}</div>
            <div style={{ fontSize: 10, color: t.textMuted }}>Total Q2</div>
          </div>
        </div>
        <div style={{ marginTop: 12 }}>
          <Label>Desglose por miembro (Q2 completo)</Label>
          {costs.members.map(cm => (
            <div key={cm.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '3px 0', fontSize: 11 }}>
              <span style={{ color: t.text }}>{cm.name} <span style={{ color: t.textDim, fontSize: 9 }}>({cm.type === 'external' ? 'externo' : 'interno'})</span></span>
              <span style={{ fontWeight: 700, color: t.heading }}>{fmt(cm.totalQ2)}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Cost per epic */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, marginTop: 14 }}>
        <Label>Costo estimado por épica (confirmadas + por decidir)</Label>
        <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 10 }}>
          Basado en: horas por talla × tarifa efectiva del owner asignado a cada HU. Épicas sin costos configurados mostrarán €0.
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 45px 55px 55px 65px 80px', gap: 6, padding: '4px 6px', fontSize: 9, fontWeight: 700, color: t.textDim, textTransform: 'uppercase', letterSpacing: 0.4 }}>
