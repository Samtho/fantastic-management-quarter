// SEMANAL TAB — Weekly sync tracker + Carlo view
// ═══════════════════════════════════════════════════════════════════════════════
const ITEM_STATUSES = [
  { id: 'completado',        label: 'Completado',  icon: '✅', color: '#22c55e' },
  { id: 'en-curso',          label: 'En curso',    icon: '🔄', color: '#3b82f6' },
  { id: 'bloqueado',         label: 'Bloqueado',   icon: '🔴', color: '#ef4444' },
  { id: 'pendiente',         label: 'Pendiente',   icon: '⏳', color: '#f59e0b' },
];
const ITEM_PRIORITIES = [
  { id: 'alta',  label: 'Alta',  dot: '🔴' },
  { id: 'media', label: 'Media', dot: '🟡' },
  { id: 'baja',  label: 'Baja',  dot: '🟢' },
];

// ─── Carlo View (slide-style overlay) ───────────────────────────────────────
function CarloView({ session, onClose, epics, config }) {
  const sp = SPRINTS.find(s => s.id === session.sprint);
  const getStatus = (a) => a.status || (a.done ? 'completado' : 'pendiente');
  const sc = (id) => ITEM_STATUSES.find(s => s.id === id) || ITEM_STATUSES[3];
  const pc = (id) => ITEM_PRIORITIES.find(p => p.id === (id || 'alta')) || ITEM_PRIORITIES[0];
  const parseLines = (text) => (text || '').split('\n').map(l => l.trim()).filter(Boolean);
  const getEpic = (epicId) => (epics || []).find(e => e.id === epicId);

  const [lightMode, setLightMode] = useState(true);
  const [nextStepsOpen, setNextStepsOpen] = useState(false);

  // Dark slide palette
  const CD = {
    bg: '#0c1929', bgAlt: '#0f1e3d', bgCard: '#132244', bgTable: '#0c1929',
    accent: '#3b82f6', text: '#e2e8f0', textMuted: '#94a3b8', textDim: '#475569',
    border: '#1e3a6e', rowEven: '#0f1c38', rowOdd: '#0c1829', theadBg: '#162642',
    ownerColor: '#93c5fd',
  };
  // Light palette for screen-sharing
  const CL = {
    bg: '#f1f5f9', bgAlt: '#ffffff', bgCard: '#f8fafc', bgTable: '#f8fafc',
    accent: '#2563eb', text: '#1e293b', textMuted: '#475569', textDim: '#94a3b8',
    border: '#e2e8f0', rowEven: '#f8fafc', rowOdd: '#ffffff', theadBg: '#dbeafe',
    ownerColor: '#1d4ed8',
  };
  const C = lightMode ? CL : CD;

  const tw = parseLines(session.thisWeek);
  const nw = parseLines(session.nextWeek);
  const cd = parseLines(session.carloDecisions);

  return (
    <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: C.bg, zIndex: 2000, overflow: 'auto', fontFamily: "'Noto Sans', sans-serif" }}>
      {/* Sticky toolbar */}
      <div style={{ position: 'sticky', top: 0, background: C.bgAlt + 'f0', backdropFilter: 'blur(8px)', padding: '10px 28px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', zIndex: 10, borderBottom: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 11, color: C.textMuted, textTransform: 'uppercase', letterSpacing: 1 }}>Weekly Status · {session.date}</div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={() => setLightMode(p => !p)} style={{ background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontSize: 11, padding: '5px 14px', cursor: 'pointer', fontWeight: 600 }}>
            {lightMode ? '🌙 Modo oscuro' : '☀️ Modo claro'}
          </button>
          <button onClick={onClose} style={{ background: C.accent, border: 'none', borderRadius: 5, color: '#fff', fontSize: 11, padding: '5px 14px', cursor: 'pointer', fontWeight: 600 }}>
            ✕ Cerrar
          </button>
        </div>
      </div>

      <div style={{ maxWidth: '100%', margin: '0 auto', padding: '28px 40px', display: 'flex', flexDirection: 'column', gap: 20 }}>

        {/* SLIDE 1 — Cover */}
        <div style={{ background: C.bgAlt, borderRadius: 12, padding: '52px 56px', minHeight: 200, display: 'flex', flexDirection: 'column', justifyContent: 'space-between', borderLeft: `5px solid ${C.accent}` }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.accent, textTransform: 'uppercase', letterSpacing: 4, marginBottom: 20 }}>W E E K L Y  S T A T U S</div>
            <div style={{ fontSize: 40, fontWeight: 800, color: C.text, lineHeight: 1.1, marginBottom: 20 }}>{config?.channelName || 'My Channel'}</div>
            <div style={{ width: 110, height: 4, background: C.accent, borderRadius: 2, marginBottom: 28 }} />
            <div style={{ display: 'flex', gap: 32 }}>
              <div><span style={{ color: C.text, fontWeight: 700, fontSize: 13 }}>Fecha: </span><span style={{ color: C.text, fontSize: 13 }}>{session.date}</span></div>
              {sp && <div><span style={{ color: C.text, fontWeight: 700, fontSize: 13 }}>Sprint: </span><span style={{ color: C.text, fontSize: 13 }}>{session.sprintNum || sp.label}</span></div>}
            </div>
          </div>
          <div className="demo-sensitive" style={{ fontSize: 11, color: C.textDim, marginTop: 28 }}>{config?.companyName || 'My Company'} · {config?.channelName || 'My Channel'}</div>
        </div>

        {/* SLIDE 2 — Sprint Actual */}
        <div style={{ background: C.bgAlt, borderRadius: 12, padding: '32px 36px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 20 }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: C.text }}>Sprint Actual</div>
            {sp && <div style={{ fontSize: 12, color: C.textMuted }}>{sp.full} · {sp.dates}</div>}
          </div>
          {session.sprintObjective && (
            <div style={{ background: C.bgTable, border: `1px solid ${C.border}`, borderRadius: 7, padding: '12px 16px', marginBottom: 18, fontSize: 13, color: C.text, lineHeight: 1.6 }}>
              <span style={{ fontWeight: 700 }}>Objetivo del sprint: </span>{session.sprintObjective}
            </div>
          )}
          {(session.actions || []).length > 0 && (
            <div style={{ borderRadius: 8, overflow: 'hidden', border: `1px solid ${C.border}` }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                <thead>
                  <tr style={{ background: C.theadBg }}>
                    <th style={{ padding: '10px 14px', textAlign: 'left', color: C.text, fontWeight: 700, width: '20%' }}>Tarea / User Story</th>
                    <th style={{ padding: '10px 14px', textAlign: 'left', color: C.text, fontWeight: 700, width: '14%' }}>Épica</th>
                    <th style={{ padding: '10px 14px', textAlign: 'center', color: C.text, fontWeight: 700, width: '10%' }}>Responsable</th>
                    <th style={{ padding: '10px 14px', textAlign: 'center', color: C.text, fontWeight: 700, width: '11%' }}>Estado</th>
                    <th style={{ padding: '10px 14px', textAlign: 'center', color: C.text, fontWeight: 700, width: '8%' }}>Prioridad</th>
                    <th style={{ padding: '10px 14px', textAlign: 'left', color: C.text, fontWeight: 700 }}>Notas / Bloqueo</th>
                  </tr>
                </thead>
                <tbody>
                  {(session.actions || []).map((a, idx) => {
                    const s = sc(getStatus(a));
                    const p = pc(a.priority);
                    const epic = getEpic(a.epicId);
                    return (
                      <tr key={a.id} style={{ background: idx % 2 === 0 ? C.rowEven : C.rowOdd, borderTop: `1px solid ${C.border}` }}>
                        <td style={{ padding: '9px 14px', color: C.text, lineHeight: 1.4 }}>{a.text || '—'}</td>
                        <td style={{ padding: '9px 14px', lineHeight: 1.3 }}>
                          {epic ? (
                            <div>
                              <div style={{ fontSize: 11, fontWeight: 700, color: C.accent }}>{epic.label}</div>
                              {epic.sublabel && <div style={{ fontSize: 10, color: C.textMuted, marginTop: 1 }}>{epic.sublabel}</div>}
                            </div>
                          ) : <span style={{ color: C.textDim, fontSize: 11, fontStyle: 'italic' }}>Sin épica</span>}
                        </td>
                        <td style={{ padding: '9px 14px', color: C.ownerColor, textAlign: 'center' }}>{a.owner ? `[${a.owner}]` : '—'}</td>
                        <td style={{ padding: '9px 14px', textAlign: 'center' }}>
                          <span style={{ color: s.color, fontWeight: 700, fontSize: 11, whiteSpace: 'nowrap' }}>{s.icon} {s.label}</span>
                        </td>
                        <td style={{ padding: '9px 14px', textAlign: 'center', fontSize: 11, whiteSpace: 'nowrap' }}>
                          {p.dot} {p.label}
                        </td>
                        <td style={{ padding: '9px 14px', color: C.textMuted, lineHeight: 1.6, fontSize: 12 }}>{a.notes || ''}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
          <div style={{ fontSize: 10, color: C.textDim, marginTop: 14 }}>{config?.channelName || 'My Channel'} · Weekly Status | {session.date}</div>
        </div>

        {/* SLIDE 3 — Próximos Pasos & Cierre (desplegable) */}
        <div style={{ background: C.bgAlt, borderRadius: 12, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
          <button
            onClick={() => setNextStepsOpen(p => !p)}
            style={{ width: '100%', background: 'none', border: 'none', padding: '22px 36px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', textAlign: 'left' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
              <div style={{ fontSize: 20, fontWeight: 800, color: C.text }}>Próximos Pasos & Cierre</div>
              <div style={{ width: 70, height: 3, background: C.accent, borderRadius: 2 }} />
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              {(tw.length > 0 || nw.length > 0 || cd.length > 0) && (
                <span style={{ fontSize: 10, color: C.textMuted, fontStyle: 'italic' }}>
                  {[tw.length > 0 && `${tw.length} esta sem.`, nw.length > 0 && `${nw.length} próx. sem.`, cd.length > 0 && `${cd.length} pendiente Carlo`].filter(Boolean).join(' · ')}
                </span>
              )}
              <span style={{ fontSize: 16, color: C.textMuted }}>{nextStepsOpen ? '▲' : '▼'}</span>
            </div>
          </button>
          {nextStepsOpen && (
            <div style={{ padding: '0 36px 32px' }}>
              {sp && <div style={{ fontSize: 11, color: C.textMuted, textAlign: 'right', marginBottom: 16 }}>{sp.full} · {sp.dates}</div>}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16, marginBottom: 28 }}>
                {[
                  { lines: tw, badge: 'ESTA SEMANA',        badgeBg: '#22c55e', badgeColor: '#052e16', sub: 'Acción inmediata',  num: '01' },
                  { lines: nw, badge: 'PRÓXIMA SEMANA',     badgeBg: '#f59e0b', badgeColor: '#451a03', sub: 'En planificación',  num: '02' },
                  { lines: cd, badge: 'PENDIENTE DE CARLO', badgeBg: '#ef4444', badgeColor: '#fff',    sub: 'Requiere decisión', num: '03' },
                ].map(card => (
                  <div key={card.num} style={{ background: C.bgTable, border: `1px solid ${C.border}`, borderRadius: 10, padding: '18px 20px' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14, gap: 6, flexWrap: 'wrap' }}>
                      <span style={{ fontSize: 9, fontWeight: 800, color: card.badgeColor, background: card.badgeBg, padding: '2px 9px', borderRadius: 4, textTransform: 'uppercase', letterSpacing: 0.8, flexShrink: 0 }}>{card.badge}</span>
                      <span style={{ fontSize: 10, color: C.textMuted }}>{card.sub}</span>
                    </div>
                    <div style={{ fontSize: 42, fontWeight: 900, color: C.accent, lineHeight: 1, marginBottom: 14 }}>{card.num}</div>
                    {card.lines.length > 0
                      ? card.lines.map((l, i) => (
                        <div key={i} style={{ display: 'flex', gap: 8, marginBottom: 7, color: C.textMuted, fontSize: 12, lineHeight: 1.5 }}>
                          <span style={{ color: C.accent, flexShrink: 0 }}>•</span><span>{l}</span>
                        </div>
                      ))
                      : <div style={{ color: C.textDim, fontSize: 11, fontStyle: 'italic' }}>Sin items</div>
                    }
                  </div>
                ))}
              </div>
              <div style={{ fontStyle: 'italic', fontSize: 14, color: C.accent, marginBottom: 20 }}>¿Preguntas o puntos adicionales?</div>
              <div className="demo-sensitive" style={{ fontSize: 10, color: C.textDim }}>{config?.channelName || 'My Channel'} · Weekly Status · {config?.companyName || 'My Company'}</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Export Carlo PDF (print-ready window, slides 1 & 2 only) ───────────────
function exportCarloPDF(session, epics, config) {
  const sp = SPRINTS.find(s => s.id === session.sprint);
  const getEpic = (epicId) => (epics || []).find(e => e.id === epicId);
  const sc = (id) => ITEM_STATUSES.find(s => s.id === id) || ITEM_STATUSES[3];
  const pc = (id) => ITEM_PRIORITIES.find(p => p.id === (id || 'alta')) || ITEM_PRIORITIES[0];
  const getStatus = (a) => a.status || (a.done ? 'completado' : 'pendiente');

  const rows = (session.actions || []).map((a, idx) => {
    const s = sc(getStatus(a));
    const p = pc(a.priority);
    const epic = getEpic(a.epicId);
    const bg = idx % 2 === 0 ? '#f8fafc' : '#ffffff';
    const epicHtml = epic
      ? `<div style="font-weight:700;color:#2563eb">${epic.label}</div>${epic.sublabel ? `<div style="color:#64748b;margin-top:1px">${epic.sublabel}</div>` : ''}`
      : `<span style="color:#94a3b8;font-style:italic">—</span>`;
    return `<tr style="background:${bg};border-top:1px solid #e2e8f0">
      <td style="padding:6px 10px;color:#1e293b;line-height:1.35;word-break:break-word">${a.text || '—'}</td>
      <td style="padding:6px 10px;line-height:1.3;word-break:break-word">${epicHtml}</td>
      <td style="padding:6px 10px;color:#1d4ed8;text-align:center;white-space:nowrap">${a.owner ? `[${a.owner}]` : '—'}</td>
      <td style="padding:6px 10px;text-align:center;white-space:nowrap"><span style="color:${s.color};font-weight:700">${s.icon} ${s.label}</span></td>
      <td style="padding:6px 10px;text-align:center;white-space:nowrap">${p.dot} ${p.label}</td>
      <td style="padding:6px 10px;color:#374151;line-height:1.45;word-break:break-word">${a.notes || ''}</td>
    </tr>`;
  }).join('');

  const tableHtml = (session.actions || []).length > 0 ? `
    <div style="border-radius:6px;overflow:hidden;border:1px solid #e2e8f0">
      <table style="width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed">
        <colgroup>
          <col style="width:17%">
          <col style="width:14%">
          <col style="width:9%">
          <col style="width:10%">
          <col style="width:7%">
          <col style="width:43%">
        </colgroup>
        <thead>
          <tr style="background:#dbeafe">
            <th style="padding:8px 10px;text-align:left;color:#1e293b;font-weight:700">Tarea / User Story</th>
            <th style="padding:8px 10px;text-align:left;color:#1e293b;font-weight:700">Épica</th>
            <th style="padding:8px 10px;text-align:center;color:#1e293b;font-weight:700">Responsable</th>
            <th style="padding:8px 10px;text-align:center;color:#1e293b;font-weight:700">Estado</th>
            <th style="padding:8px 10px;text-align:center;color:#1e293b;font-weight:700">Prioridad</th>
            <th style="padding:8px 10px;text-align:left;color:#1e293b;font-weight:700">Notas / Bloqueo</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>` : '<p style="color:#94a3b8;font-size:13px">Sin tareas registradas.</p>';

  const sprintLabel = sp ? `${session.sprintNum || sp.label}` : '';
  const sprintDates = sp ? ` · ${sp.dates}` : '';
  const objectiveHtml = session.sprintObjective
    ? `<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#1e293b;line-height:1.5"><span style="font-weight:700">Objetivo del sprint: </span>${session.sprintObjective}</div>`
    : '';

  const html = `<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Weekly Status · ${session.date}</title>
  <style>
    @page { size: A4 landscape; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #1e293b;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .page {
      width: 297mm;
      min-height: 210mm;
      padding: 14mm 18mm;
      page-break-after: always;
      display: flex;
      flex-direction: column;
    }
    .page:last-child { page-break-after: avoid; }
    .cover { border-left: 6px solid #2563eb; justify-content: space-between; }
  </style>
</head>
<body>

  <!-- Slide 1: Cover -->
  <div class="page cover">
    <div>
      <div style="font-size:10px;font-weight:700;color:#2563eb;text-transform:uppercase;letter-spacing:5px;margin-bottom:20px">W E E K L Y &nbsp; S T A T U S</div>
      <div style="font-size:44px;font-weight:800;color:#0f172a;line-height:1.05;margin-bottom:14px">${(config && config.channelName) || 'My Channel'}</div>
      <div style="width:100px;height:4px;background:#2563eb;border-radius:2px;margin-bottom:24px"></div>
      <div style="display:flex;gap:36px">
        <div style="font-size:13px"><span style="font-weight:700">Fecha: </span>${session.date}</div>
        ${sprintLabel ? `<div style="font-size:13px"><span style="font-weight:700">Sprint: </span>${sprintLabel}</div>` : ''}
      </div>
    </div>
    <div style="font-size:11px;color:#94a3b8">${(config && config.companyName) || 'My Company'} · ${(config && config.channelName) || 'My Channel'}</div>
  </div>

  <!-- Slide 2: Sprint Actual -->
  <div class="page">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">
      <div style="font-size:20px;font-weight:800;color:#0f172a">Sprint Actual</div>
      ${sprintLabel ? `<div style="font-size:11px;color:#64748b">${sprintLabel}${sprintDates}</div>` : ''}
    </div>
    ${objectiveHtml}
    ${tableHtml}
    <div style="font-size:9px;color:#94a3b8;margin-top:10px">${(config && config.channelName) || 'My Channel'} · Weekly Status | ${session.date}</div>
  </div>

  <script>window.onload = function() { window.print(); }<\/script>
</body>
</html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
}

// ─── SemanalTab (edit mode) ──────────────────────────────────────────────────
function SemanalTab({ weeklySync, setWeeklySync, team, epics, config }) {
  const t = useTheme();
  const [selectedId, setSelectedId]       = useState(null);
  const [carloView, setCarloView]         = useState(false);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [semSidebarOpen, setSemSidebarOpen]   = useState(false);
  const [emailDraftOpen, setEmailDraftOpen]   = useState(false);

  const getSelected = () => {
    if (selectedId) return weeklySync.find(s => s.id === selectedId) || weeklySync[0] || null;
    return weeklySync[0] || null;
  };

  const addSession = () => {
    const today = new Date().toISOString().slice(0, 10);
    // Carry over incomplete actions from the most recent session
    const prev = weeklySync[0];
    const carryOver = prev
      ? (prev.actions || [])
          .filter(a => getStatus(a) !== 'completado')
          .map(a => ({ ...a, id: uid(), status: a.status === 'completado' ? 'pendiente' : (a.status || 'pendiente'), notes: a.notes ? `↩ ${a.notes}` : '↩ carry-over' }))
      : [];
    const s = { id: uid(), date: today, sprint: 's1', sprintNum: '', sprintObjective: '', topics: '', thisWeek: '', nextWeek: '', carloDecisions: '', actions: carryOver };
    setWeeklySync(p => [s, ...p]);
    setSelectedId(s.id);
  };

  const updateSession = (id, updates) => setWeeklySync(p => p.map(s => s.id === id ? { ...s, ...updates } : s));
  const deleteSession = (id) => { setWeeklySync(p => p.filter(s => s.id !== id)); if (selectedId === id) setSelectedId(null); };

  const addAction = (sessionId) => {
    const a = { id: uid(), text: '', owner: '', status: 'pendiente', priority: 'alta', notes: '', epicId: '' };
    setWeeklySync(p => p.map(s => s.id === sessionId ? { ...s, actions: [...s.actions, a] } : s));
  };
  const updateAction = (sessionId, actionId, updates) => setWeeklySync(p =>
    p.map(s => s.id === sessionId ? { ...s, actions: s.actions.map(a => a.id === actionId ? { ...a, ...updates } : a) } : s)
  );
  const deleteAction = (sessionId, actionId) => setWeeklySync(p =>
    p.map(s => s.id === sessionId ? { ...s, actions: s.actions.filter(a => a.id !== actionId) } : s)
  );
  const moveAction = (sessionId, fromIdx, toIdx) => setWeeklySync(p =>
    p.map(s => {
      if (s.id !== sessionId) return s;
      const arr = [...s.actions];
      const [item] = arr.splice(fromIdx, 1);
      arr.splice(toIdx, 0, item);
      return { ...s, actions: arr };
    })
  );
  const [dragActionIdx, setDragActionIdx] = useState(null);

  // Backward compat: old items had `done` instead of `status`
  const getStatus = (a) => a.status || (a.done ? 'completado' : 'pendiente');
  const openActions = weeklySync.flatMap(s =>
    (s.actions || []).filter(a => getStatus(a) !== 'completado').map(a => ({ ...a, sessionDate: s.date }))
  );

  if (weeklySync.length === 0) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '55vh', gap: 12 }}>
        <div style={{ fontSize: 36 }}>📋</div>
        <div style={{ fontSize: 15, fontWeight: 700, color: t.heading }}>Sin reuniones registradas</div>
        <div style={{ fontSize: 12, color: t.textMuted, maxWidth: 400, textAlign: 'center', lineHeight: 1.6 }}>
          Registra tu primer sync semanal con Carlo. Desde aquí preparas la tabla de estado y los próximos pasos, y con un clic generas la Vista de Carlo.
        </div>
        <button onClick={addSession} style={{ background: t.accent, border: 'none', borderRadius: 6, color: '#fff', fontSize: 12, fontWeight: 600, padding: '9px 20px', cursor: 'pointer', marginTop: 4 }}>+ Nueva reunión</button>
      </div>
    );
  }

  const sel = getSelected();

  return (
    <>
      {carloView && sel && <CarloView session={sel} onClose={() => setCarloView(false)} epics={epics || []} config={config} />}

      <div style={{ display: 'grid', gridTemplateColumns: semSidebarOpen ? '260px 1fr' : '36px 1fr', gap: 0, alignItems: 'start', height: '100%' }}>

        {/* LEFT: session list / collapsed strip */}
        {semSidebarOpen ? (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, padding: '0 12px 0 0', borderRight: `1px solid ${t.border}`, paddingRight: 12 }}>
          <div style={{ display: 'flex', gap: 6 }}>
            <button onClick={addSession} style={{ background: t.accent, border: 'none', borderRadius: 6, color: '#fff', fontSize: 11, fontWeight: 600, padding: '7px 10px', cursor: 'pointer', flex: 1 }}>
              + Nueva reunión
            </button>
            <button onClick={() => setSemSidebarOpen(false)} title="Colapsar panel"
              style={{ background: 'none', border: `1px solid ${t.border}`, borderRadius: 6, color: t.textDim, fontSize: 12, cursor: 'pointer', padding: '7px 8px' }}>◀</button>
          </div>

          {openActions.length > 0 && (
            <div style={{ background: t.bgAlt, border: `1px solid #f59e0b44`, borderRadius: 8, padding: '8px 10px' }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: '#f59e0b', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 5 }}>
                ⚡ {openActions.length} item{openActions.length > 1 ? 's' : ''} pendiente{openActions.length > 1 ? 's' : ''}
              </div>
              {openActions.slice(0, 4).map(a => (
                <div key={a.id} style={{ fontSize: 10, color: t.textMuted, marginBottom: 2, overflow: 'hidden', whiteSpace: 'nowrap', textOverflow: 'ellipsis' }}>
                  · {a.text || '(sin descripción)'}{a.owner ? ` → ${a.owner}` : ''}
                </div>
              ))}
              {openActions.length > 4 && <div style={{ fontSize: 9, color: t.textDim }}>+{openActions.length - 4} más...</div>}
            </div>
          )}

          {weeklySync.map(s => {
            const pendingCount = (s.actions || []).filter(a => getStatus(a) !== 'completado').length;
            const isSelected = sel && sel.id === s.id;
            const sp = SPRINTS.find(sp => sp.id === s.sprint);
            return (
              <div key={s.id} onClick={() => setSelectedId(s.id)}
                style={{ background: isSelected ? t.accent + '18' : t.bgAlt, border: `1px solid ${isSelected ? t.accent : t.border}`, borderRadius: 7, padding: '9px 11px', cursor: 'pointer', transition: 'border-color 0.15s' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 3 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: isSelected ? t.accent : t.heading }}>{s.date}</span>
                    {(() => {
                      const autoLabel = sprintLabelForDate(s.date);
                      const label = sp ? sp.label : autoLabel;
                      return label ? (
                        <span style={{ fontSize: 9, fontWeight: 800, color: isSelected ? t.accent : t.textMuted, background: isSelected ? t.accent + '18' : t.bgDeep, border: `1px solid ${isSelected ? t.accent + '44' : t.border}`, padding: '1px 6px', borderRadius: 4, letterSpacing: 0.5 }}>{label}</span>
                      ) : null;
                    })()}
                  </div>
                  {pendingCount > 0 && <span style={{ fontSize: 9, fontWeight: 700, color: '#f59e0b', background: '#fef3c722', border: '1px solid #f59e0b44', padding: '1px 6px', borderRadius: 8 }}>{pendingCount} pend.</span>}
                </div>
                <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 2 }}>
                  {sp ? sp.full : '—'}{s.sprintNum ? ` · Sprint ${s.sprintNum}` : ''} · {(s.actions || []).length} ítems
                </div>
                {s.sprintObjective && <div style={{ fontSize: 10, color: t.textFaint, overflow: 'hidden', whiteSpace: 'nowrap', textOverflow: 'ellipsis' }}>{s.sprintObjective}</div>}
              </div>
            );
          })}
        </div>
        ) : (
          /* Collapsed strip */
          <div onClick={() => setSemSidebarOpen(true)}
            style={{ width: 36, borderRight: `1px solid ${t.border}`, cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: 12, gap: 6 }}
            title="Abrir panel de reuniones">
            <span style={{ fontSize: 14 }}>📋</span>
            <span style={{ fontSize: 9, writingMode: 'vertical-rl', color: t.textMuted, fontWeight: 600, letterSpacing: 0.5, textTransform: 'uppercase' }}>Reuniones</span>
            {openActions.length > 0 && (
              <span style={{ fontSize: 9, fontWeight: 800, color: '#f59e0b', background: '#fef3c722', border: '1px solid #f59e0b44', padding: '2px 4px', borderRadius: 8 }}>{openActions.length}</span>
            )}
          </div>
        )}

        {/* RIGHT: session detail */}
        {sel && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12, paddingLeft: semSidebarOpen ? 2 : 12 }}>

            {/* Header */}
            <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: t.heading }}>📋 Sync con Carlo</div>
                <div style={{ display: 'flex', gap: 6 }}>
                  <button onClick={() => setCarloView(true)}
                    style={{ background: '#0f1e3d', border: '1px solid #3b82f6', borderRadius: 5, color: '#93c5fd', fontSize: 11, fontWeight: 700, padding: '5px 14px', cursor: 'pointer' }}>
                    🎬 {config?.carloViewLabel || 'Vista de Carlo'}
                  </button>
                  <button onClick={() => exportCarloPDF(sel, epics, config)}
                    style={{ background: '#0f2818', border: '1px solid #22c55e', borderRadius: 5, color: '#86efac', fontSize: 11, fontWeight: 700, padding: '5px 14px', cursor: 'pointer' }}>
                    📄 Exportar PDF
                  </button>
                  {confirmDeleteId === sel.id ? (
                    <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
                      <span style={{ fontSize: 11, color: '#ef4444', fontWeight: 600 }}>¿Eliminar?</span>
                      <button onClick={() => { deleteSession(sel.id); setConfirmDeleteId(null); }}
                        style={{ background: '#ef4444', border: 'none', borderRadius: 4, color: '#fff', fontSize: 11, fontWeight: 700, padding: '3px 8px', cursor: 'pointer' }}>Sí</button>
                      <button onClick={() => setConfirmDeleteId(null)}
                        style={{ background: 'none', border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, fontSize: 11, padding: '3px 8px', cursor: 'pointer' }}>No</button>
                    </div>
                  ) : (
                    <button onClick={() => setConfirmDeleteId(sel.id)}
                      style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 16 }}>×</button>
                  )}
                </div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
                <div>
                  <Label>Fecha</Label>
                  <input type="date" value={sel.date} onChange={e => updateSession(sel.id, { date: e.target.value })}
                    style={{ fontSize: 12, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, color: t.text, padding: '5px 8px', width: '100%' }} />
                </div>
                <div>
                  <Label>Sprint del PI Planning</Label>
                  <select value={sel.sprint || ''} onChange={e => updateSession(sel.id, { sprint: e.target.value })}
                    style={{ fontSize: 12, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, color: t.text, padding: '5px 8px', width: '100%' }}>
                    <option value="">— ninguno —</option>
                    {SPRINTS.map(sp => <option key={sp.id} value={sp.id}>{sp.full} · {sp.dates}</option>)}
                  </select>
                </div>
                <div>
                  <Label>Nº Sprint global (ej. "52")</Label>
                  <input value={sel.sprintNum || ''} onChange={e => updateSession(sel.id, { sprintNum: e.target.value })}
                    placeholder="52"
                    style={{ fontSize: 12, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, color: t.text, padding: '5px 8px', width: '100%' }} />
                </div>
              </div>
            </div>

            {/* Sprint objective */}
            <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
              <Label>Objetivo del sprint</Label>
              <textarea value={sel.sprintObjective || ''} onChange={e => updateSession(sel.id, { sprintObjective: e.target.value })}
                placeholder="¿Cuál es el foco del equipo esta semana?" rows={2}
                style={{ width: '100%', fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, padding: '7px 9px', resize: 'vertical', lineHeight: 1.6, outline: 'none' }} />
            </div>

            {/* Status table */}
            <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                <Label>Tabla de estado (Sprint Actual)</Label>
                <button onClick={() => addAction(sel.id)} style={{ fontSize: 10, background: t.accent, border: 'none', borderRadius: 5, color: '#fff', padding: '4px 11px', cursor: 'pointer', fontWeight: 600 }}>+ Ítem</button>
              </div>
              {(sel.actions || []).length === 0 && <div style={{ fontSize: 11, color: t.textDim, fontStyle: 'italic' }}>Sin ítems aún — añade tareas/user stories del sprint</div>}

              {(sel.actions || []).map((a, idx) => {
                const sc = ITEM_STATUSES.find(s => s.id === getStatus(a)) || ITEM_STATUSES[3];
                const isDragging = dragActionIdx === idx;
                return (
                  <div key={a.id}
                    draggable
                    onDragStart={() => setDragActionIdx(idx)}
                    onDragEnd={() => setDragActionIdx(null)}
                    onDragOver={e => { e.preventDefault(); }}
                    onDrop={e => { e.preventDefault(); if (dragActionIdx !== null && dragActionIdx !== idx) { moveAction(sel.id, dragActionIdx, idx); setDragActionIdx(null); } }}
                    style={{ padding: '9px 0', borderBottom: idx < (sel.actions || []).length - 1 ? `1px solid ${t.border}` : 'none', opacity: isDragging ? 0.4 : 1, cursor: 'grab', borderRadius: 4, background: isDragging ? t.bgAlt : 'transparent' }}>
                    {/* Row 1: drag handle + #ID + task name + epic + owner + delete */}
                    <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: 5 }}>
                      <span style={{ fontSize: 11, color: t.textDim, cursor: 'grab', userSelect: 'none' }} title="Arrastra para reordenar">⠿</span>
                      <span style={{ fontSize: 9, fontWeight: 700, color: t.textDim, background: t.bgDeep, borderRadius: 3, padding: '1px 4px', minWidth: 24, textAlign: 'center', flexShrink: 0 }}>#{idx + 1}</span>
                      <input value={a.text} onChange={e => updateAction(sel.id, a.id, { text: e.target.value })}
                        placeholder="Tarea / User Story..."
                        style={{ flex: 1, fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '4px 8px', outline: 'none' }} />
                      <select value={a.epicId || ''} onChange={e => updateAction(sel.id, a.id, { epicId: e.target.value })}
                        style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: a.epicId ? t.accent : t.textMuted, padding: '4px 5px', outline: 'none', minWidth: 140, maxWidth: 160 }}>
                        <option value="">Épica...</option>
                        {(epics || []).filter(ep => ep.status !== 'deferred').map(ep => <option key={ep.id} value={ep.id}>{ep.label}</option>)}
                        <optgroup label="Diferidas">
                          {(epics || []).filter(ep => ep.status === 'deferred').map(ep => <option key={ep.id} value={ep.id}>{ep.label}</option>)}
                        </optgroup>
                      </select>
                      <select value={a.owner || ''} onChange={e => updateAction(sel.id, a.id, { owner: e.target.value })}
                        style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '4px 5px', outline: 'none', minWidth: 96 }}>
                        <option value="">Responsable</option>
                        {team.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}
                        {config?.stakeholderName && <option value={config.stakeholderName}>{config.stakeholderName}</option>}
                        <option value="Samuel">Samuel</option>
                      </select>
                      <button onClick={() => deleteAction(sel.id, a.id)} style={{ background: 'none', border: 'none', color: t.textDim, cursor: 'pointer', fontSize: 15 }}>×</button>
                    </div>
                    {/* Row 2: status + priority + notes */}
                    <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                      <select value={getStatus(a)} onChange={e => updateAction(sel.id, a.id, { status: e.target.value })}
                        style={{ fontSize: 10, background: sc.color + '1a', border: `1px solid ${sc.color}55`, borderRadius: 4, color: sc.color, padding: '3px 6px', outline: 'none', fontWeight: 700, minWidth: 128, cursor: 'pointer' }}>
                        {ITEM_STATUSES.map(s => <option key={s.id} value={s.id}>{s.icon} {s.label}</option>)}
                      </select>
                      <select value={a.priority || 'alta'} onChange={e => updateAction(sel.id, a.id, { priority: e.target.value })}
                        style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '3px 6px', outline: 'none', minWidth: 76 }}>
                        {ITEM_PRIORITIES.map(p => <option key={p.id} value={p.id}>{p.dot} {p.label}</option>)}
                      </select>
                      <input value={a.notes || ''} onChange={e => updateAction(sel.id, a.id, { notes: e.target.value })}
                        placeholder="Notas / Bloqueo..."
                        style={{ flex: 1, fontSize: 11, color: t.textMuted, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, padding: '3px 8px', outline: 'none' }} />
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Próximos pasos — 3 columns */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
              {[
                { key: 'thisWeek',       label: '📌 Esta semana',       hint: 'Cerrar SSO\nValidar template con Federica', border: t.border },
                { key: 'nextWeek',       label: '🔜 Próxima semana',    hint: 'Sprint planning\nArrancar tokenización', border: t.border },
                { key: 'carloDecisions', label: '🔴 Pendiente de Carlo', hint: '¿Quién asume UAT?\nDefinir prioridad Odoo', border: '#ef444444' },
              ].map(col => (
                <div key={col.key} style={{ background: t.bgAlt, border: `1px solid ${col.border}`, borderRadius: 8, padding: 12 }}>
                  <Label>{col.label}</Label>
                  <textarea value={sel[col.key] || ''} onChange={e => updateSession(sel.id, { [col.key]: e.target.value })}
                    placeholder={`Un ítem por línea:\n${col.hint}`} rows={4}
                    style={{ width: '100%', fontSize: 11, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, padding: '6px 8px', resize: 'vertical', lineHeight: 1.6, outline: 'none' }} />
                </div>
              ))}
            </div>

            {/* Internal notes */}
            <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14 }}>
              <Label>Notas internas (no aparecen en Vista de Carlo)</Label>
              <textarea value={sel.topics || ''} onChange={e => updateSession(sel.id, { topics: e.target.value })}
                placeholder="Apuntes libres de la reunión..." rows={3}
                style={{ width: '100%', fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, padding: '7px 9px', resize: 'vertical', lineHeight: 1.6, outline: 'none' }} />
            </div>

            {/* Email draft to Carlo — NOT shown in Carlo view */}
            {(() => {
              const generateEmail = () => {
                const completados = (sel.actions || []).filter(a => (a.status || '') === 'completado');
                const enCurso    = (sel.actions || []).filter(a => (a.status || '') === 'en-curso');
                const bloqueados = (sel.actions || []).filter(a => (a.status || '') === 'bloqueado');
                const pendientes = (sel.actions || []).filter(a => (a.status || '') === 'pendiente');
                const lines = [];
                lines.push(`Hola Carlo,`);
                lines.push(``);
                lines.push(`Te resumo el status de esta semana (${sel.date}):`);
                if (sel.sprintObjective) { lines.push(``); lines.push(`Objetivo del sprint: ${sel.sprintObjective}`); }
                if (completados.length) {
                  lines.push(``); lines.push(`✅ Completado:`);
                  completados.forEach(a => lines.push(`  • ${a.text}${a.owner ? ` (${a.owner})` : ''}${a.notes ? ' — ' + a.notes : ''}`));
                }
                if (enCurso.length) {
                  lines.push(``); lines.push(`🔄 En curso:`);
                  enCurso.forEach(a => lines.push(`  • ${a.text}${a.owner ? ` (${a.owner})` : ''}${a.notes ? ' — ' + a.notes : ''}`));
                }
                if (bloqueados.length) {
                  lines.push(``); lines.push(`🔴 Bloqueado (requiere atención):`);
                  bloqueados.forEach(a => lines.push(`  • ${a.text}${a.notes ? ' — ' + a.notes : ''}`));
                }
                if (pendientes.length) {
                  lines.push(``); lines.push(`⏳ Pendiente:`);
                  pendientes.forEach(a => lines.push(`  • ${a.text}${a.owner ? ` (${a.owner})` : ''}`));
                }
                const tw = (sel.thisWeek || '').split('\n').map(l => l.trim()).filter(Boolean);
                const nw = (sel.nextWeek || '').split('\n').map(l => l.trim()).filter(Boolean);
                const cd = (sel.carloDecisions || '').split('\n').map(l => l.trim()).filter(Boolean);
                if (tw.length) { lines.push(``); lines.push(`📌 Esta semana cerrado:`); tw.forEach(l => lines.push(`  • ${l}`)); }
                if (nw.length) { lines.push(``); lines.push(`🔜 Próxima semana:`); nw.forEach(l => lines.push(`  • ${l}`)); }
                if (cd.length) { lines.push(``); lines.push(`❓ Pendiente de tu decisión:`); cd.forEach(l => lines.push(`  • ${l}`)); }
                lines.push(``); lines.push(`Saludos,`); lines.push(`Samuel`);
                return lines.join('\n');
              };
              const emailVal = sel.emailCarlo !== undefined ? sel.emailCarlo : '';
              return (
                <div style={{ background: t.bgAlt, border: `1px solid #2563eb44`, borderRadius: 8, overflow: 'hidden' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', cursor: 'pointer' }}
                    onClick={() => setEmailDraftOpen(p => !p)}>
                    <Label style={{ cursor: 'pointer' }}>📧 Borrador email a Carlo (post-status)</Label>
                    <span style={{ fontSize: 11, color: t.textMuted, userSelect: 'none' }}>{emailDraftOpen ? '▲' : '▼'}</span>
                  </div>
                  {emailDraftOpen && (
                    <div style={{ padding: '0 14px 14px 14px' }}>
                      <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 8 }}>
                        <button
                          onClick={e => { e.stopPropagation(); updateSession(sel.id, { emailCarlo: generateEmail() }); }}
                          style={{ background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, color: t.textMuted, fontSize: 10, fontWeight: 700, padding: '4px 10px', cursor: 'pointer' }}>
                          ↻ Generar desde reunión
                        </button>
                      </div>
                      <textarea value={emailVal} onChange={e => updateSession(sel.id, { emailCarlo: e.target.value })}
                        placeholder={`Pulsa "Generar desde reunión" para rellenar automáticamente,\no escribe tu borrador aquí. Copia y pega en tu cliente de correo.`} rows={10}
                        style={{ width: '100%', fontSize: 12, color: t.text, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 5, padding: '7px 9px', resize: 'vertical', lineHeight: 1.6, outline: 'none', fontFamily: 'monospace' }} />
                    </div>
                  )}
                </div>
              );
            })()}

          </div>
        )}
      </div>
    </>
  );
}

// REVENUE TAB
// ═══════════════════════════════════════════════════════════════════════════════
function RevenueTab({ epics, revenue, setRevenue }) {
  const t = useTheme();
  const activeEpics = (epics || []).filter(e => e.status !== 'deferred');
  const [expanded, setExpanded] = useState({});
  const toggleExpanded = (epicId) => setExpanded(p => ({ ...p, [epicId]: !p[epicId] }));

  const getR = (epicId) => {
    const d = revenue[epicId] || {};
    return {
      impact:          d.impact          ?? null,
      type:            d.type            ?? '',
      metric:          d.metric          ?? '',
      baseline:        d.baseline        ?? '',
      delta:           d.delta           ?? '',
      confidence:      d.confidence      ?? 50,
      assumptionNote:  d.assumptionNote  ?? '',
      notes:           d.notes           ?? '',
      estimate:        d.estimate        ?? 0,
    };
  };

  // setR auto-calculates estimate when baseline + delta are present
  const setR = (epicId, updates) => {
    setRevenue(p => {
      const merged = { ...getR(epicId), ...(p[epicId] || {}), ...updates };
      const bl = Number(merged.baseline) || 0;
      const dl = Number(merged.delta)    || 0;
      const cf = Number(merged.confidence ?? 50);
      if (bl > 0 && dl > 0) {
        merged.estimate = Math.round(bl * 12 * (dl / 100) * (cf / 100));
      }
      return { ...p, [epicId]: merged };
    });
  };

  // Summary stats
  const withData  = activeEpics.filter(e => getR(e.id).impact);
  const totalEst  = activeEpics.reduce((sum, e) => sum + (Number(getR(e.id).estimate) || 0), 0);
  const byImpact  = REVENUE_IMPACTS.map(imp => ({ ...imp, count: activeEpics.filter(e => getR(e.id).impact === imp.id).length }));

  const fmtEur = (n) => n > 0 ? '€' + Number(n).toLocaleString('es-ES') : '—';

  return (
    <div style={{ maxWidth: 1150 }}>
      {/* Header */}
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontSize: 18, fontWeight: 800, color: t.heading, marginBottom: 4 }}>📈 Impacto de negocio</div>
        <div style={{ fontSize: 12, color: t.textMuted }}>No somos una fábrica de software. Cada épica tiene un impacto medible en el negocio. Pulsa 🧮 para estimar con supuestos explícitos.</div>
      </div>

      {/* Summary cards */}
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
        <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: '12px 18px', minWidth: 140 }}>
          <div style={{ fontSize: 10, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>Impacto estimado</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: '#22c55e' }}>{totalEst > 0 ? fmtEur(totalEst) : '€0'}</div>
          <div style={{ fontSize: 10, color: t.textDim }}>suma anual estimada</div>
        </div>
        {byImpact.map(imp => (
          <div key={imp.id} style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: '12px 18px', minWidth: 110 }}>
            <div style={{ fontSize: 10, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>Impacto {imp.label}</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: imp.color }}>{imp.count}</div>
            <div style={{ fontSize: 10, color: t.textDim }}>épica{imp.count !== 1 ? 's' : ''}</div>
          </div>
        ))}
        <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 8, padding: '12px 18px', minWidth: 110 }}>
          <div style={{ fontSize: 10, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>Sin datos</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: t.textDim }}>{activeEpics.length - withData.length}</div>
          <div style={{ fontSize: 10, color: t.textDim }}>épica{activeEpics.length - withData.length !== 1 ? 's' : ''}</div>
        </div>
      </div>

      {/* Table */}
      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 10, overflow: 'hidden' }}>
        {/* Column headers */}
        <div style={{ display: 'grid', gridTemplateColumns: '190px 90px 120px 1fr 170px 90px', gap: 0, background: t.bgDeep, padding: '8px 14px', borderBottom: `1px solid ${t.border}` }}>
          {['Épica', 'Impacto', 'Tipo', 'Métrica objetivo', '€ Estimado / año', 'Notas'].map(h => (
            <div key={h} style={{ fontSize: 10, fontWeight: 700, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.5 }}>{h}</div>
          ))}
        </div>
        {activeEpics.length === 0 && (
          <div style={{ padding: 24, textAlign: 'center', color: t.textDim, fontSize: 12 }}>No hay épicas activas.</div>
        )}
        {activeEpics.map((epic, i) => {
          const r = getR(epic.id);
          const impDef = REVENUE_IMPACTS.find(x => x.id === r.impact);
          const isExp  = !!expanded[epic.id];
          const hasCalc = Number(r.baseline) > 0 && Number(r.delta) > 0;
          const isLast  = i === activeEpics.length - 1;
          return (
            <React.Fragment key={epic.id}>
              {/* ── Main row ── */}
              <div style={{ display: 'grid', gridTemplateColumns: '190px 90px 120px 1fr 170px 90px', gap: 0, padding: '10px 14px', borderBottom: `1px solid ${t.border}`, alignItems: 'center' }}>

                {/* Epic name */}
                <div>
                  <div style={{ fontSize: 11, fontWeight: 600, color: t.text, lineHeight: 1.3 }}>{epic.label}</div>
                  <div style={{ fontSize: 9, color: t.textDim }}>{epic.sublabel}</div>
                </div>

                {/* Impact */}
                <div>
                  <select value={r.impact || ''} onChange={e => setR(epic.id, { impact: e.target.value || null })}
                    style={{ fontSize: 10, background: impDef ? impDef.color + '22' : t.bgDeep, border: `1px solid ${impDef ? impDef.color + '88' : t.border}`, borderRadius: 4, color: impDef ? impDef.color : t.textDim, padding: '3px 5px', width: '100%', fontWeight: 700, cursor: 'pointer' }}>
                    <option value="">— sin datos</option>
                    {REVENUE_IMPACTS.map(x => <option key={x.id} value={x.id}>{x.label}</option>)}
                  </select>
                </div>

                {/* Type */}
                <div>
                  <select value={r.type || ''} onChange={e => setR(epic.id, { type: e.target.value })}
                    style={{ fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: r.type ? t.text : t.textDim, padding: '3px 5px', width: '100%', cursor: 'pointer' }}>
                    <option value="">— tipo</option>
                    {REVENUE_TYPES.map(x => <option key={x.id} value={x.id}>{x.label}</option>)}
                  </select>
                </div>

                {/* Metric */}
                <div style={{ paddingRight: 8 }}>
                  <input value={r.metric || ''} onChange={e => setR(epic.id, { metric: e.target.value })}
                    placeholder="ej. Tasa de renovación"
                    style={{ width: '100%', fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '4px 6px' }} />
                </div>

                {/* Auto-calculated estimate + 🧮 button */}
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, paddingRight: 8 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: r.estimate > 0 ? '#22c55e' : t.textDim, whiteSpace: 'nowrap' }}>
                      {r.estimate > 0 ? fmtEur(r.estimate) : '—'}
                    </div>
                    {hasCalc && (
                      <div style={{ fontSize: 9, color: t.textDim, marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                        {fmtEur(Number(r.baseline))}/mes × {r.delta}% × {r.confidence}%
                      </div>
                    )}
                  </div>
                  <button onClick={() => toggleExpanded(epic.id)}
                    title={isExp ? 'Cerrar calculadora' : 'Calcular con supuestos'}
                    style={{ fontSize: 12, lineHeight: 1, background: isExp ? t.accent + '22' : t.bgDeep, border: `1px solid ${isExp ? t.accent : t.border}`, borderRadius: 4, color: isExp ? t.accent : t.textMuted, padding: '4px 7px', cursor: 'pointer', flexShrink: 0, transition: 'all 0.15s' }}>
                    🧮
                  </button>
                </div>

                {/* Notes */}
                <div>
                  <input value={r.notes || ''} onChange={e => setR(epic.id, { notes: e.target.value })}
                    placeholder="Contexto..."
                    style={{ width: '100%', fontSize: 10, background: t.bgDeep, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '4px 6px' }} />
                </div>
              </div>

              {/* ── Assumption calculator (expanded) ── */}
              {isExp && (
                <div style={{ background: t.bgDeep, borderBottom: `1px solid ${t.border}`, padding: '14px 14px 16px 204px' }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: t.accent, marginBottom: 10, textTransform: 'uppercase', letterSpacing: 0.6 }}>
                    🧮 Calculadora de supuestos
                  </div>
                  <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end', flexWrap: 'wrap' }}>

                    {/* Baseline */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      <label style={{ fontSize: 9, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.4 }}>Baseline €/mes</label>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
                        <span style={{ fontSize: 11, color: t.textDim }}>€</span>
                        <input type="number" min="0" value={r.baseline || ''} onChange={e => setR(epic.id, { baseline: e.target.value })}
                          placeholder="8000"
                          style={{ width: 78, fontSize: 11, background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '5px 6px' }} />
                      </div>
                    </div>

                    <div style={{ fontSize: 18, color: t.textDim, paddingBottom: 5 }}>×</div>

                    {/* Delta */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      <label style={{ fontSize: 9, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.4 }}>Mejora esperada</label>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
                        <input type="number" min="0" max="100" step="0.5" value={r.delta || ''} onChange={e => setR(epic.id, { delta: e.target.value })}
                          placeholder="15"
                          style={{ width: 58, fontSize: 11, background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '5px 6px' }} />
                        <span style={{ fontSize: 11, color: t.textDim }}>%</span>
                      </div>
                    </div>

                    <div style={{ fontSize: 18, color: t.textDim, paddingBottom: 5 }}>×</div>

                    {/* Confidence */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      <label style={{ fontSize: 9, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.4 }}>Confianza</label>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
                        <input type="number" min="0" max="100" step="5" value={r.confidence ?? 50} onChange={e => setR(epic.id, { confidence: Number(e.target.value) })}
                          style={{ width: 52, fontSize: 11, background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, color: t.text, padding: '5px 6px' }} />
                        <span style={{ fontSize: 11, color: t.textDim }}>%</span>
                      </div>
                    </div>

                    <div style={{ fontSize: 18, color: t.textDim, paddingBottom: 5 }}>×</div>

                    {/* 12 months (fixed) */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      <label style={{ fontSize: 9, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.4 }}>Periodo</label>
                      <div style={{ background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, padding: '5px 10px', fontSize: 11, color: t.textDim }}>12 meses</div>
                    </div>

                    <div style={{ fontSize: 18, color: t.textDim, paddingBottom: 5 }}>=</div>

                    {/* Result */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      <label style={{ fontSize: 9, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.4 }}>Impacto anual estimado</label>
                      <div style={{ fontSize: 18, fontWeight: 800, color: r.estimate > 0 ? '#22c55e' : t.textDim, padding: '3px 0' }}>
                        {r.estimate > 0 ? '≈ ' + fmtEur(r.estimate) : '—'}
                      </div>
                    </div>

                    {/* Assumption note */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4, marginLeft: 12 }}>
                      <label style={{ fontSize: 9, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 0.4 }}>Fuente / supuesto</label>
                      <input value={r.assumptionNote || ''} onChange={e => setR(epic.id, { assumptionNote: e.target.value })}
                        placeholder="ej. Facturación media renovaciones manuales 2025"
                        style={{ width: 230, fontSize: 10, background: t.bgAlt, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, padding: '5px 7px' }} />
                    </div>
                  </div>

                  {/* Formula hint */}
                  {hasCalc && (
                    <div style={{ marginTop: 10 }}>
                      <div style={{ fontSize: 10, color: t.textDim, fontFamily: 'monospace' }}>
                        {fmtEur(Number(r.baseline))}/mes × {r.delta}% × {r.confidence}% confianza × 12 meses = <span style={{ color: '#22c55e', fontWeight: 700 }}>{fmtEur(r.estimate)}/año</span>
                      </div>
                      <div style={{ marginTop: 6, fontSize: 10, color: '#f59e0b', background: '#f59e0b0d', border: '1px solid #f59e0b33', borderRadius: 5, padding: '5px 8px', lineHeight: 1.5 }}>
                        ⚠ El % de confianza aquí es un <em>descuento subjetivo</em>, no valor esperado estadístico. Sirve para comparar iniciativas entre sí, no como forecast financiero presentable a terceros.
                      </div>
                    </div>
                  )}
                </div>
              )}
            </React.Fragment>
          );
        })}
      </div>

      {/* Type legend */}
      <div style={{ marginTop: 14, display: 'flex', gap: 10, flexWrap: 'wrap' }}>
        {REVENUE_TYPES.map(tp => (
          <div key={tp.id} style={{ fontSize: 10, color: t.textMuted }}>
            <span style={{ fontWeight: 600 }}>{tp.label}</span>: {tp.desc}
          </div>
        ))}
      </div>
    </div>
  );
}
